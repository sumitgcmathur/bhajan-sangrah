title: निर्वाण षट्कम
romantitle: Nirvaan Shatkam
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      मनो-बुद्धि-अहंकार चित्तादि नाहं, न च श्रोत्र-जिह्वे न च घ्राण-नेत्रे।
      न च व्योम-भूमी न तेजो न वायु, चिदानंद-रूपं शिवो-हं शिवो-हं।
    - commentary: |
      मैं न तो मन हूँ, न बुद्धि हूँ, न अहंकार हूँ, न ही चित्त हूँ
      मैं न तो कान हूँ, न जीभ हूँ, न नासिका हूँ, न ही नेत्र हूँ
      मैं न तो आकाश हूँ, न धरती हूँ, न अग्नि हूँ और न ही वायु हूँ
      मैं तो शुद्ध चेतना हूँ, अनादि, अनंत शिव हूँ|
    - |
      न च प्राण-संज्ञो न वै पञ्च-वायु:, न वा सप्त-धातुर्न वा पञ्च-कोष:।
      न वाक्-पाणि-पादौ न चोपस्थ पायु:, चिदानंद-रूपं शिवो-हं शिवो-हं।
    - commentary: |
      मैं न तो प्राण हूँ और न ही पंच वायु हूँ
      मैं न सात धातुं हूँ,
      और न ही पांच कोश हूँ
      मैं न वाणी हूँ, न पैर हूँ, न हाथ हूँ और न ही उत्सर्जन की इन्द्रियां हूँ
      मैं तो शुद्ध चेतना हूँ, अनादि, अनंत शिव हूँ|
    - |
      न मे द्वेष-रागौ न मे लोभ-मोहौ, मदे नैव मे नैव मात्सर्य-भाव:।
      न धर्मो न चार्थो न कामो न मोक्ष:, चिदानंद-रूपं शिवो-हं शिवो-हं।
    - commentary: |
      न मुझमे घृणा है, न ही लगाव है, न मुझे लोभ है और न ही मोह
      न मुझे अभिमान है और न ही ईर्ष्या
      मैं धर्म, धन, काम एवं मोक्ष से परे हूँ
      मैं तो शुद्ध चेतना हूँ, अनादि, अनंत शिव हूँ|
    - |
      न पुण्यं न पापं न सौख्यं न दु:खं, न मंत्रो न तीर्थं न वेदा न यज्ञा:।
      अहं भोजनं नैव भोज्यं न भोक्ता, चिदानंद-रूपं शिवो-हं शिवो-हं।
    - commentary: |
      मैं पुण्य, पाप, सुख और से भिन्न हूँ
      मैं न मंत्र हूँ, न ही तीर्थ हूँ, न ज्ञान हूँ और न ही यज्ञ हूँ
      न मैं भोगने की वस्तु हूँ, न ही भोग का अनुभव हूँ, और न ही भोक्ता हूँ
      मैं तो शुद्ध चेतना हूँ, अनादि, अनंत शिव हूँ|
    - |
      न मे मृत्यु न मे जातिभेद:, पिता नैव मे नैव माता न जन्मो।
      न बन्धुर्न मित्र: गुरुर्नैव शिष्य:, चिदानंद-रूपं शिवो-हं शिवो-हं।
    - commentary: |
      मुझे न तो मृत्यु का भय है, न ही किसी जाती से भेदभाव है
      मेरा न तो कोई पिता है और न ही माता, न ही मैं कभी जन्मा
      मेरा न तो कोई भाई है, न मित्र, न शिष्य और न ही गुरु
      मैं तो शुद्ध चेतना हूँ, अनादि, अनंत शिव हूँ|
    - |
      अहं निर्विकल्पो निराकार रूपो, विभुत्त्वाच्च सर्वत्र सर्वेन्द्रियाणां।
      सदा मे समत्त्वं न मुक्तिर्न बंध:, चिदानंद रूपं शिवो-हं शिवो-हं।
    - commentary: |
      मैं निर्विकल्प हूँ, मैं निराकार हूँ
      मैं चैतन्य के रूप में प्रत्येक स्थान पर व्याप्त हूँ, सभी इन्द्रियों में मैं हूँ
      मुझे न किसी वस्तु में आसक्ति है और न ही मैं उससे मुक्त हूँ
      मैं तो शुद्ध चेतना हूँ, अनादि, अनंत शिव हूँ|
