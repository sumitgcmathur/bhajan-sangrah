title: मेरा भोला है भंडारी
lyrics:
  sthayi: |
    मेरा भोला है भंडारी,
  paragraphs:
    - |
      करे नंदी की सवारी,
    - |
      भोले नाथ रे, शंकर नाथ रे
    - |
      मेरे साथ रे, तूँ मेरे साथ रे।
    - |
      तेरा नाम है तारणहारा,
    - |
      एक तूँ ही है पालनहारा,
    - |
      भोले नाथ रे, शंकर नाथ रे
    - |
      मेरे साथ रे, तूँ मेरे साथ रे।
    - |
      तमाम सृष्टि का सार तूँ है,
    - |
      विकार तूँ निर्विकार तूँ है,
    - |
      कहूँ क्या वारे मैं भोले तेरे,
    - |
      असीम तूँ है, आपार तूँ है।
    - |
      ज़ुबान पे शंभू है वास तेरा,
    - |
      निगाह में भी निवास तेरा,
    - |
      समाए दिल में है तेरी सूरत,
    - |
      वज़ूद मुझमें है ख़ास तेरा।
    - |
      गंगा सोहे जिसके केशा,
    - |
      करता मंगल जो हमेशा,
    - |
      भोले नाथ रे, शंकर नाथ रे…
    - |
      तूँ ही त्रिपुरारी कैलाशी…
    - |
      तूँ ही दुःख भंजन अविनाशी…
    - |
      उदासियों को मिटा दिया है,
    - |
      चिराग दिल में जला दिया है,
    - |
      भोलानाथ तूने सुख का रास्ता दिखा दिया है…
    - |
      पीकर खुद ही विष का प्याला,
    - |
      दुनिया को अमृत दे डाला…
    - |
      भोले नाथ रे, शंकर नाथ रे…
    - |
      नमामि परमेश्वराय शंकर,
    - |
      नमामि सर्वेश्वराय शंकर,
    - |
      नमामि योगेश्वराय शंकर,
    - |
      नमामि भुवनेश्वराय शंकर…
    - |
      मेरा भोला है भंडारी,
    - |
      करे नंदी की सवारी,
    - |
      भोले नाथ रे, शंकर नाथ रे…
    - |
      मेरे साथ रे, तूँ मेरे साथ रे।
