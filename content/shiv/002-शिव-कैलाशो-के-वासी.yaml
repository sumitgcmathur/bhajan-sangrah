title: शिव कैलाशो के वासी
lyrics:
  sthayi: |
    शिव कैलाशो के वासी,
  paragraphs:
    - |
      धौली धारों के राजा,
      शंकर संकट हरना,
      शंकर संकट हरना॥
      तेरे कैलाशों का अंत ना पाया,
      तेरे कैलाशों का अंत ना पाया,
      अंत बेअंत तेरी माया,
      ओ भोले बाबा,
      अंत बेअंत तेरी माया,
      शिव कैलाशों के वासी,
      धौली धारों के राजा,
      शंकर संकट हरना,
      शंकर संकट हरना॥
      बेल की पत्तियां भांग धतुरा,
      बेल की पत्तियां भांग धतुरा,
      शिव जी के मन को लुभायें,
      ओ भोले बाबा,
      शिव जी के मन को लुभायें
      शिव कैलाशों के वासी,
      धौली धारों के राजा,
      शंकर संकट हरना,
      शंकर संकट हरना॥
      एक था डेरा तेरा,
      चम्बे रे चौगाना,
      दुज्जा लायी दित्ता भरमौरा,
    - |
      ओ भोले बाबा,
      दुज्जा लायी दित्ता भरमौरा,
    - |
      शिव कैलाशों के वासी,
      धौली धारों के राजा,
      शंकर संकट हरना,
      शंकर संकट हरना॥
      शिव कैलाशो के वासी,
      धौली धारों के राजा,
      शंकर संकट हरना,
      शंकर संकट हरना॥
