title: आशुतोष शशाँक शेखर
lyrics:
  sthayi: |
    आशुतोष शशाँक शेखर,
    चन्द्र मौली चिदंबरा,
    कोटि कोटि प्रणाम शम्भू,
    कोटि नमन दिगम्बरा॥
  paragraphs:
    - |
      निर्विकार ओमकार अविनाशी,
      तुम्ही देवाधि देव,
      जगत सर्जक प्रलय करता,
      शिवम सत्यम सुंदरा॥
      निरंकार स्वरूप कालेश्वर,
      महा योगीश्वरा,
      दयानिधि दानिश्वर जय,
      जटाधार अभयंकरा॥
      शूल पानी त्रिशूल धारी,
      औगड़ी बाघम्बरी,
      जय महेश त्रिलोचनाय,
      विश्वनाथ विशम्भरा॥
      नाथ नागेश्वर हरो हर,
      पाप साप अभिशाप तम,
      महादेव महान भोले,
      सदा शिव शिव संकरा॥
      जगत पति अनुरकती भक्ति,
      सदैव तेरे चरण हो,
      क्षमा हो अपराध सब,
      जय जयति जगदीश्वरा॥
      जनम जीवन जगत का,
      संताप ताप मिटे सभी,
      ओम नमः शिवाय मन,
      जपता रहे पञ्चाक्षरा॥
      आशुतोष शशाँक शेखर,
      चन्द्र मौली चिदंबरा,
      कोटि कोटि प्रणाम शम्भू,
      कोटि नमन दिगम्बरा॥
      कोटि नमन दिगम्बरा..
