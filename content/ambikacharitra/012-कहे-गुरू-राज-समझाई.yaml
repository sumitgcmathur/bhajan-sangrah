title: कहे गुरू राज समझाई
tarz: उठो रघुनाथ जन प्यारे, सभी धन् देख हिय हारे (गजल)
lyrics:
  sthayi: |
    कहे गुरू राज समझाई, धरो कछूु धीर मन मांई॥
  paragraphs:
    - |
      जगत जननी महामाया, सदा संतन की सूखदाया, परे जब भीर भक्तन में, करे झट आय के सहाई॥
    - |
      हिमालय नाम गिरी भारी, धाम रमणीक मनहारी, चरन रज वहां गहो जाई, जहां चंडी महामाइ॥
    - |
      धार करके जो अवतारा, जिन्होंने महिष को मारा, गहो अब उसही का सहारा, अन्य तदबीर कोऊ नांइ॥
  jabani: |
    जबानी - इस प्रकार गरू के वचन सुन उनकी आज्ञानुसार सब देव गण हिमालय पहाड़ पर जा महामाया श्री भगवती के ध्यान में परायण को हृदय से श्री मायाबीज का जप करते हैं और देवीजी का स्त्रोत मंत्रो से स्तुति करते हैं।
