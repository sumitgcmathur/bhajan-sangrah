title: सुन चंड अरू मंड के बैन
tarz: भजरे मन मेरे बार-बार जगदम्बा मात भवानी है
lyrics:
  sthayi: |
    सुन चंड अरू मंड के बैन, क्रोध कर बोलि अंबिका मांई है॥
  sthayi_marker: टेर
  paragraphs:
    - |
      क्यों बक बक बक बकवास करो, यूँ नाहक गाल बजाई है,
      जो योद्धा होतो युद्ध करो, नही विरथा समय गंवाई है॥
    - |
      क्या शुभ निशुभ नाम लेत, अरू देत हमें धमकाई है,
      ऐसे दानव हमने पहले, अनेक दिये खपाई है॥
    - |
      तुम जान लेवो निश्चय करके हम देत है सफा सुनाई है,
      शुंभ निशुंभ विडारन को, हम काल रूप बन आई है॥
    - |
      हम एक एक करके मारेगी, सब दैत्यन क समुदाई है,
      यह जान विचार भलो अपनो, भगजावो इसी में भलाई है॥
    - |
      जबानी - डुस प्रकार देवी दानवों के बीच भयंकर युद्द होता है। चंड मुंड बाणों की वृष्टि करते है जिसे आकाश आच्छादित हो जाता है। भगवती श्री अंबिकाजी क्रोध करती है और उनके ललाट देश से व्याघ्र चर्म का वस्त्र बनो, अति क्रूर मूंडों की माला पहिन, अति घोर रूप, खडग, पाश को धारण किये, अति रोद्र रूप कालिका प्रगट होती है जो मानो दूसरी कालरात्रि की तरह मुख फैलाये हुए असुर सैनिको को मारती है। देत्यों को हाथ में पकड़ कर मुख में छोड, धीरे-धीरे पीस, घोड़े ऊँट, हाथियों के सहित सवारों को पकड़ कर मुख में डाल, चब्लाकर अट्टहास करती है। इस प्रकार सेना को मारी जाती देख चंड क्रोध कर सूर्य सदृश तेज सहित सुदशन चक्र ही के डोल का चक देवी के ऊपर मारता है और बार-बार गरजता है। काली उस चक्र को एक पैने बाण से काट डालती है और चंडी एक तीक्ष्ण बाण चंड को मारती है जिसके लगने से चंड मर्छित हो पृथ्वी पर गिर पड़ता है। यह देख मुंड चंडी पर बाण वृष्टि करता है। चंडी मुंड के छोड़़े हुए बाणों को मंत्रित लोह शलाका से काट डालती है और उसको अर्ध चन्द्रकार बाण से मारती है जिसके लगने से मुंड भी पथ्वी पर गिर पड़ता है। इतने में चंड मूर्छा से उठ गदा उठाकर कालिका जी की दाहिनी भुजा में मारता है और कालिकाजी बाणों की फांसी से चंड को फांसकर बांध लेती है। इतने में मुंड मूर्छा से उठ दृढ़ शक्ति से उठा कर कालिका को मारता है। कालिका उसी प्रकार उसको बांध फांस से बांध लेती है और दोनों को पकड कर अंबिकाजी के पास ले जाकर उनकी आज्ञानुसार उन दोनों का खड़ग से सिर काट डालती है और आनंद से रूधिर पान कर तृप्त होती है। इस प्रकार चंड मुंड के मारे जाने पर बचे बचाये दैत्य भाग कर शुंभ के पास आते है और कहते है -
