title: होय प्रसन्न भवानी मैया
tarz: भोर भये जब चलो अंबिका पूजन राज दुलारी (टोडी)
lyrics:
  sthayi: |
    होय प्रसन्न भवानी मैया, प्रगट रूप दरशायो हेरी॥
  paragraphs:
    - |
      ज्वाला जाग उठी इक तन से, दिव्य रूप से प्रकटायो हेरी॥
    - |
      कृष्ण वरण विकराल शरीरा, काली नाम कहायो हेरी॥
    - |
      इक भयकारी अरू एक सुन्दर, मनहर रूप धरायो हेरी॥
    - |
      दर्शन कर हरषे सब देवा, मनवांछित वर पायो हेरी॥
    - |
      जबानी - इस प्रकार श्री देवीजी प्रसन्न हो देवताओं को अभयदान दे शुंभ निशुंभ को मारने के हेत् सिंह पर चढ़ उत्कट रूप बना कालीका को गले में दबा शुंभ के पुर को जाती है, और वहाँ जाकर पुष्प वाटिका में स्थित हो संसार को मोहन करने वाला सूक्षम राग गाती है। इतने में शुंभ के सेवक चंड अरू मंड खेलते हुये अकस्मात वहां आ जाते है और दिव्य रूपी अंबिका के स्वरूप को देख विस्मय युक्त हो तुरन्त शुंभ के पास जाते है और कहते है।
