title: क्रोध भरे बैन
lyrics:
  sthayi: |
    राग – प्रभाती
  paragraphs:
    - |
      तर्ज : जागिये गोपाल लाल नन्द के दुलारे।
    - |
      क्रोध भरे बैन शुंभ बोले अकुलाई
    - |
      शूरवीर साथ सारो और प्रिय भाई,
    - |
      मेरे काज आज रण खेत रहे जाई
    - |
      जो अबे मैं भाग कर जान लूं बचाई,
    - |
      कीरती न होय होय लोक में हँसाई
    - |
      काल की गति को कांई सोच मन मांई,
    - |
      होनहार होय अनहोनी होय नांई
    - |
      यह विचार आज हम करेंगे लड़ाई,
    - |
      जाओ जाय सेना सब साज को सजाई
    - |
      जबानी – इस प्रकार युद्ध का दृढ़ निश्चय करके शुंभ हाथी, घोड़े, रथ और पैदल चार प्रकार की सेना ले युद्ध स्थल को जाता है और वहां तीन लोक को मोहित करने वाली सिंह पर चढ़ी हुई सब आभरण और भूषणों से युक्त श्री जगदम्बिकाजी को देखते ही शुंभ मोहित हो जाता है और इस प्रकार कहता है –
