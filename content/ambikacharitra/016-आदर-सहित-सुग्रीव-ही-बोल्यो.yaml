title: आदर सहित सुग्रीव ही बोल्यो
tarz: सावण की बडी तीज सहेल्यां सब मिल नावण चालीजी । (मारू)
lyrics:
  sthayi: |
    आदर सहित सुग्रीव ही बोल्यो, अरू यूं वचन सुनायो जी
    राजा शुम्भ संदेशों भेज्यो, लेकर मैं हूँ आयोजी॥
  sthayi_connect: false
  paragraphs:
    - |
      क्या भूतल पाताल स्वर्ग क्या, तीन लोक के माँई जी
      शुम्भ समान बली नृप दूजो, निश्चय कर कोई नाईजी॥
    - |
      लोक पाल पित्रादी देवता, सहित ही इन्द्र हरायो जी
      स्वर्ग लोक को जीत लियो है, अरू सब वैभव पायोजी॥
    - |
      सुनत रावरो रंग स्वरूपा, राजा मन हरसाई जी
      छिन 2 पल 2 रूप सरावे, अरू बहु करत बढाईजी॥
    - |
      राज, पाट, धन, धाम, भोग सब अरू मोजा मनमानी जी
      राजा शुम्भ दास बन रहसी, आप होऊ पटरानीजी॥
    - |
      मैं हँ दूत मेरो ही कामा, याते क्रोध मत कीजेजी
      सोच विचार शीघ्र मन माँही, उत्तर अब देदीजेजी॥
jabani: |
  जबानी - श्री अम्बिका जी सुग्रीव को उत्तर देती हैं।
