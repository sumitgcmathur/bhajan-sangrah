title: जगदम्ब बने सुरराई है
tarz: मेरे शंकर दर्शन दोनी मुझे।
lyrics:
  sthayi: |
    जगदम्ब बने सुरराई है, काल से कहत समझाई है॥
  paragraphs:
    - |
      देह विस्तारित करो अरू मुँह को फैला लेवो, रक्त की बूँदों को
      नाहि भूमि पै गिरने जो दो, लेवो लोहू को पेट पचाई है॥
    - |
      न रक्त भूमि पै गिरे न दैत्य जनमेंगे कभी, जो हैं इन्हें एक एक
      करके मार डारेंगे अभी, यही जाय करोनी उपाई है॥
jabani: |
  जबानी – इस प्रकार श्री अम्बिकाजी के वचन सुन श्री चामुंडा रक्तबीज के शरीर से उत्पन्न रूधिर का पान करती है और श्री अम्बिकाजी उसे मूसल से कूट डालती है। चामुंडा उसकी देह के सब खण्ड खा डालती है। इस प्रकार उसके रक्त से जितने उत्पन्न हुए कृत्रिम रक्तबीज थे उन सबका नाशकर कालिकाजी अंत में अंतिम रहे हुवे रक्तबीज को भी खा डालती है। फिर शेष बचे हुये राक्षस भागकर शुम्भ के पास जाते हैं और कहते हैं –
