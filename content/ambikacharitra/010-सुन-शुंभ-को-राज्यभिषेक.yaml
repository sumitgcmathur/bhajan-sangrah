title: सुन शुम्भ को राज्यभिषेक
tarz: त्रिपराय मांजी आपरो मानो घनो छै विश्वास (माड)
lyrics:
  sthayi: |
    सुन शुम्भ को राज्यभिषेक हुवो सब आये दैत्य समाज॥
  sthayi_marker: टेर
  paragraphs:
    - |
      चंड अरू मुंड बड़े परचंड जो योद्धा बडे बलवान, लेकर के निज फौजन वृंद यूं आयें करन सम्मान॥
    - |
      धूमर लोचन नाम महाबलि काल समान कराल. रक्तबीज राक्षस रण बका, आये पास नृपाल॥
    - |
      छोटे और बडे कइ दानव सेना सहित अपार, हस्ति, घोड़ा, रथ, अरू पैदल शुम्भ सोहे दरबार॥
