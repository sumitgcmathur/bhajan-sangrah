title: सुन शुम्भ यह बात
tarz: तोरी छल बल है न्यारी
lyrics:
  sthayi: |
    सुन शुम्भ यह बात, बोल लियो है तात, अरू सल्ला करे है विचार चार चार॥
  sthayi_marker: टेर
  paragraphs:
    - |
      धूमर लोचन ओ सब योद्धा, काली ने दिये सभी है खपाय, अब लडे की नांय रहे चुप लगाय, आवो करे यहीं निरधार धार धार॥
    - |
      सुन शुम्भ की बात बोल्यो निशुम्भ भ्रात, कयो वचन भरयो अहंकार, कार कार॥
    - |
      शूरवीर को धर्म यही है, लडे भिडे ओ मरे रण माय, हम जाक ओ भाई, करके जो लड़ाई पकड़ लायेंगे यहां ववह नार नार नार॥ 
jabani: |
  जबानी - निशुम्भ के वचन सुन शुम्भ विचार करता है और प्रथम चंड मंड को ही भेजने का निश्चय कर उनको बला और सेना ले के संग्राम में जाने का हक्म देता है। चंड मुण्ड वहां जा देवीजी को स्थित देख सामपूर्वक वचन बोलते है और कहते है -
