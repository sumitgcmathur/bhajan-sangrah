title: जै जै अंबिके
lyrics: |
  राग – भैरवी
  तर्ज : जै जै जै कन्हैयालाल की रे।
  जै जै अंबिके अंबिके अंबिके रे || टेर ||
  हां हां सारन काज सुरन करे,
  आई रंभा रूप बनाय करे, जै जै || १ ||
  हां हां रक्तबीज को खपाय करे,
  पीयो पीयो है रक्त अघाय करे, जै जै || २ ||
  हां हां चंड अरू मुंड विडार करे,
  मारे शुंभ निशुंभ पछार करे, जै जै || ३ ||
  हां हां विश्व चराचर धार करे,
  कर पालन लेत संहार करे, जै जै || ४ ||
  हां हां नेति नेति बखान करे,
  सब वेद थके गुण गाय करे, जै जै || ५ ||
  हां हां देव सभी कर जोर करे,
  यही वर मांगे सिर नायं करे, जै जै || ६ ||
  हां हां भव भव निज भक्तन करे,
  कीजो सिद्ध काज यूं आय करे, जै जै || ७ ||
  जबानी – इस प्रकार देवताओं की स्तुति से प्रसन्न हो श्री देवीजी उनको अभय वरदान देती है तथा उक्त चरित्र का माहतम्य इस प्रकार वर्णन करती है –
