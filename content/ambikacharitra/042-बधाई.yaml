title: बधाई
lyrics:
  sthayi: |
    तर्ज – रंगीली आज की धरियां।
  paragraphs:
    - |
      रंगीली आज की धरियां
    - |
      बजत है इन्द्र के बाजे, लगी रंग प्रेम की झरियां
    - |
      छवि दरबार की नीकी, करत है नाच सुरपरियां
    - |
      चले सब चाल ठिमठिमरी, करे झंकार नूपरियां
    - |
      कहूँ क्या बात जलसे की, जातबलि &#39;राम&#39; किंकरियां
