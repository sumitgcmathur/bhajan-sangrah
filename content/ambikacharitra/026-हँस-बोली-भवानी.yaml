title: हँस बोली भवानी
tarz: सखी फलन में राजन झूलेरी झूलन
lyrics:
  sthayi: |
    हँस बोली भवानी यूँ रक्तबीज से॥
  paragraphs:
    - |
      मेरे संग यद्ध करजा, हा, हँ, हँ, देवो मोक हराय,
      ए मैं मरूंगी ताही से, हँस बोली॥
    - |
      लेयकर यही सूचना, हाँ, हाँ, हाँ, जावो देवो सनाय,
      सब हाल शुंभ से, हँस बोली॥
    - |
      युद्ध कर चाहे ना, हाँ, हँ, हाँ, जावे जावे पाताल,
      भाग इन्द्र लोक से, हँस बोली॥
  jabani: |
    जबानी – इस प्रकार देवी के वचन सुन रक्तबीज आकर्षित हो अंबिकाजी पर बाणों की वृष्टि करता है। अम्बिकाजी अपने पैने तीरों से उसके आते हुए बाणों को काट डालती है और अन्य तीरों से रक्तबीज को मारती है जिनके लगने से वह मुर्छित हो रथ पर गिर पड़ता है। यह देख दैत्य सेना में हाहाकार मच जाता है और सैनिक 'हाय मारे गये' कह कर रोते हैं। जिसको सुन शुंभ कांबाज संझक और कालकेय संझक नाम के दानवों को और अन्य सेना देकर भेजता है और इस प्रकार शुम्भ से प्रेरित दानव, देवी को अन्य सेना देकर भेजता है। युद्ध के होते ही ब्रह्मादि देवताओं की भेजी हुयी शक्तियां भी युद्ध करने के लिए संग्राम में आती हैं।
