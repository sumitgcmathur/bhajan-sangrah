title: धूम्रलोचन को समझावे
tarz: हो प्रभू प्यारे नन्द दुलारे, करहो कृपा तुम मुरली वाले। (पीलू)
lyrics:
  sthayi: |
    धूम्रलोचन को समझावे, काली क्रोध कर वचन सुनावे॥
  paragraphs:
    - |
      धिक मूरख है बुद्धि तिहारी, गति मति मात की जान न पावे॥
    - |
      तीन लोक को पालन हारी, शिव अरधांगिनी नाम कहावे॥
    - |
      यह किऊं करके शुंभ विवाहे, सिंहनी क्या कोई स्यार सरावे॥
    - |
      हस्तिनी कामातुर हो तो भी, गरदभ से नहीं देह लगावे॥
    - |
      शुंभ से जाय कहो समझ कर, युद्ध करे या पाताल ही जावे॥
  jabani: |
    जबानी - इ्स प्रकार काली के वचन सुन धूम्रलोचन क्रोध कर काली के साथ संग्राम करता है। बाण, खड्ग, गदा, शक्ति और मूसलादि से देवी दानवों के बीच भयंकर यद्ध होता है और श्री कालिकाजी एक एक करके दैत्यों को मार डालती है फिर अति क्रोध करके परिध चलाते हुए धूम्रलोचन को भी 'हुंकार' शब्द से भस्म कर डालती है। उसको पतित जान बची हुई सेना भाग कर शुंभ के पास जाती है और यह कहती है।
