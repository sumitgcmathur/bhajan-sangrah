title: भग दानव सेना आई
tarz: नाथ कैसे गज को फंद छुड़ाया।
lyrics:
  sthayi: |
    भग दानव सेना आई, हाल सब शुम्भ को देत सुनाई॥
  paragraphs:
    - |
      रक्तबीज योद्धा बलवाना, अरू दानव समुदाई,
      जूंज मरे रण खेत परे हैं, किसकी कछु ना चलाई॥
    - |
      ना जाने हैं कहाँ से आई नाना रूप धराई,
      एक नहीं अनेक देवियाँ, लड़ने हेतु लड़ाई॥
    - |
      महा विकराल कराल कालिका चहुँ दिश मुँह पसराई,
      रक्तबीज को रक्त पियो है, पी पी आज अघाई॥
    - |
      हे महाराज आज हम तुमको सत्य कहत समुझाई,
      वह नारी कोई प्राकृत नारी है, है जननी महामाई॥
    - |
      वह नारी लड़ने के योगु निश्चय कर है नाई,
      जान भलो अपनो अरू कुल को, लीजे जाय मनाई॥
jabani: |
  जबानी – इस प्रकार दैत्यों के सत्य वचन सुन काल से प्रेरित और मरने इच्छा किये शुम्भ, ओष्ठ कांपता हुआ उन राक्षसों को तुरंत ही पाताल को भाग जाने का हुक्म देता है और अपने भाई निशुम्भ को बुलाकर सलाह करता है। निशुम्भ भुजा ठोक अति क्रोध कर उस माननीय स्त्री को मान युक्त ही पकड़ लाने की प्रतिज्ञा करता है और एक बड़ी सेना ले रण क्षेत्र को प्रयाण करता है। उसको मय सेना के इस प्रकार मरने के लिए उद्यत देख भगवती श्री अम्बिकाजी हँस कर कालिकाजी से इस प्रकार कहती है –
