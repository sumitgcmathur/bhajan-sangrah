title: चरित्र महात्म
romantitle: Charitra Mahaatma
tarz: भैरवी
lyrics:
  sthayi: |
    अब सुनिये चरित्र महात्म, हेरी अब सुनिये चरित्र महात्म॥
  sthayi_connect: false
  paragraphs:
    - |
      ॥दोहा॥
      मेरे उत्तम चरित्र को, सुने करे गुणगान।
      ताको फल महात्म कहूँ, सुनो देव दे कान॥
    - |
      चोर, राज, हथियारों, अग्नि शत्रु महान।
      इनका भय व्यापे नहीं, जो गुण करें बखान॥
    - |
      सुख सम्पत्ति संतति बढ़े, मिटे तीन संताप।
      जन्म जन्म के पुनि कटे, कोटि प्रबल जो पाप॥
    - |
      पुत्र जन्म पूजा तथा, ब्याव यज्ञ बलिदान।
      ऐते मंगल कार्य में, अवश्य करो गुणगान॥
    - |
      या घर में नित होत है, चंडी का गुणगान।
      वहां पर मैं निशिदिन रहूँ करन हेतु कल्याण॥
  post_shlok: |
    जबानी – तदपश्चात श्री देवीजी अपनी सब विभूतियों को ले अंतर्ध्यान हो जाती है और देवता लोग अपने अपने स्थानों को चले जाते हैं।
