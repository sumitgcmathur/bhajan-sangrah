title: हँस बोली आद भवानी
tarz: काहु विध मिलजा गिरधारी। (भैरवी)
lyrics:
  sthayi: |
    हँस बोली आद भवानी॥
  paragraphs:
    - |
      कारन रूप करन सुर कारज, मैं हूँ यूं प्रकटानी॥
    - |
      यह मेरा ही और रूप है, काली काल निशानी॥
    - |
      याके संग में युद्ध करो तुम, है यह तुमरे ही समानी॥
  post_shlok: |
    जबानी – इस प्रकार काल रूपिणी कालिका काल से प्रेरित किये जाने पर वेग से गदा उठाके संग्राम में खड़ी होती हैं और शुम्भ व कालिका के बीच भयंकर युद्ध होता है।
    
    – दोहा –
    अस कहि बोली अम्बिका, काली से समझाय।
    जाओ तुम संग्राम कर देवो शुम्भ खपाय॥
