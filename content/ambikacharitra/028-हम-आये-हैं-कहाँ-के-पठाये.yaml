title: हम आये हैं कहाँ के पठाये
tarz: जियातर से बदरिया बरसे, सखीरी दिन कैसे कटेंगे बहार के।
lyrics:
  sthayi: |
    हम आये हैं कहाँ के पठाये, सोई अब कहत तुम्हें समझाय के॥
  sthayi_marker: टेर
  paragraphs:
    - |
      तीन लोक को हूँ संहारी, नाम मेरो त्रिपुरारी, शिव दूती का लाया
      हूँ मैं संवादा, सुन लेवो यह चित लगाय के, हो हम आये॥
    - |
      स्वर्ग लोक का वैभव सारा सुरगन का अधिकारा, तज भग जाओ
      इसी में भलाई, नहीं मारो यूं गाल बजाय के, हो हम आये॥
    - |
      जबानी – इस प्रकार शुंभ को समझा कर, श्री महादेवजी लौट जाते हैं। शुंभ, श्री महादेवजी के वचन सुन अति क्रोध कर पुनः बहुत से दानवों को संग्राम में भेजता है, जो श्री देवी के साथ भयंकर युद्ध करते हैं। ब्रह्माणी कमण्डल के जल से दैत्यों को प्राण रहित करती हैं, माहेश्वरी त्रिशुल से दानवों को मार-मार कर भूमि पर गिराती है और वैष्णवी चक्र गदा के पात से दानवों को प्राण रहित करती है। इस प्रकार सब देवियों द्वारा सब दानवों की सेना का नाश हो जाता है और कुछ एक बचे बचाये दानव रो कर भागने लगते हैं। इतने में रक्तबीज मूर्छा से उठ भागते हुए सैनिकों को रोकता है और युद्ध करने लगता है।
