title: घनघोर युद्ध मचायारी
tarz: मेरा जगा के जोबन लुटारी।
lyrics:
  sthayi: |
    
  paragraphs:
    - |
      घनघोर युद्ध मचायारी॥
      आय निशुंभ जुड़ा चंडी संग, खींच के बारण चलायारी
    - |
      चंडी निज सर सांध तुरत ही, ताको काट गिरायारी
    - |
      ले निज सेना अन्य असुर गण, गरज गरज चढ़ आयारी
    - |
      दांत कटा कट, जीभ लपालप, करते दानव धायारी
    - |
      सिंह गरज कर दैत्य पछारे, चीर चीर गटकायारी
    - |
      जबानी – इस प्रकार देवी और दानवों में घोर युद्ध होता है। दानवों को मारे जाते देख निशुंभ अति रोषयुक्त हो, दारूण गदा ले देवी के निकट जा मारता है और फिर हँस कर देवीजी को भी मारता है। देवीजी कुपित हो मारते हुये निशुंभ को आगे स्थित देख खड्ग से उसका देवीजी को भी मारता है। देवीजी कुपित हो मारते हुये निशुंभ को आगे स्थित देख खड्ग से उसका मस्तक हीन धड़ अति दारूण सुरूप गदा हाथ में लिये हुए मुण्ड अर्थात् मस्तक हीन धड़ अति दारूण देव गणों को त्रास दिखाता है। तब श्री देवीजी उसके हाथ पैरों को बाण से छेदन कर डालती है और वह प्राण रहित हो पृथ्वी पर पर्वत की तरह गिर पड़ता है। दैत्यो की सेना में हाहाकार मच जाता है और बचे हुए सैनिक भाग कर राज मन्दिर में जा शुम्भ से कहते हैं –
