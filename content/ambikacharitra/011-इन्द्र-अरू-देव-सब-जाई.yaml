title: इन्द्र अरू देव सब जाई
romantitle: Indr Aroo Dev Sab Jaaee
tarz: राम दशरथ के घर जन्मे, घराना हो तो ऐसा हो (गज़ल)
lyrics:
  sthayi: |
    इन्द्र अरू देव सब जाई, कहे गुरू से यूं सिरनाई॥
  paragraphs:
    - |
      वेद अरू शास्त्र के ज्ञाता, सर्व गुणवान हो ताता, बता तदबीर कछ दीजे, विडारे दैत्य दुखदाई॥
  post_shlok: |
    जबानी - गुरू वृहस्पतिजी देवताओं से इस प्रकार अभयदान दे दैत्यों के नाश का उपाय बताते हैं।
