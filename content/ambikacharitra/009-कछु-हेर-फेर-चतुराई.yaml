title: कछु हेर फेर चतुराई
tarz: नरसिंघ रूप हरी धारे ।
lyrics:
  sthayi: |
    कछु हेर फेर चतुराई, कर बोले वचन बनाई
  sthayi_marker: टेर
  paragraphs:
    - |
      पशु-पक्षी परूष कहावे, नहीं मारन हमें सकावे, यह वर मांगे सिर नाई ||
    - |
      फिर स्त्री से जगमाई, कछ हमको भय भी नाई, वह अबला नाम कहाई ||
    - |
      यदि देना ही जो विचारा, अब देदो यही करतारा, हम सफल होवे वर पाइ ||
    - |
      जबानी - शुम्भ निशुम्भ के वचन सुन ब्रह्माजी प्रसन्न हो &#39;तथास्तु&quot; ऐसा कह वर दे अपने स्थान को चले जाते है। तत्पश्चात् वे दानव भी अपने घर पाताल लोक में भृगु मुनि को अपना पुरोहित बना कर उसका पूजन करते हैं। भृगुजी शुम दिन देख स्वर्ग का सिंहासन बनवा ज्येष्ठ भ्राता शुंभ को उस पर बैठा कर उसका राज्याभिषेक करते है। इस प्रकार शुंभ के राजा हो जाने का समाचार सुन के दैत्यगण उनकी सेवा करने के निमित आते हैं।
