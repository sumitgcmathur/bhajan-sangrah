title: निज निज रूप समान शक्तियां
tarz: पिया मिलन के काज आज जोगन बन आऊंगी।
lyrics:
  sthayi: |
    निज निज रूप समान शक्तियां, सुरन पठाई है॥
  paragraphs:
    - |
      ब्रह्माणी हंसा असवारी, सूत्र कमण्डल कर में धारी,
      कंठ बीच रूद्राक्ष माल धारण कर आई है॥
    - |
      गरूड़ासन पीताम्बर धारे, शंख चक्र अरू गदा प्रहारे,
      विमल कमल कर मांय वैष्णवी नाम कहाई है॥
    - |
      माहेश्वरी वृषभा आरूढ़ा, हाथ लिये खप्पर तिरशुला,
      कंकन कारी नाग माल मुंडन लटकाई है॥
    - |
      एक एक करके सबही आई, देव्यां निज निज रूप बनाई,
      चढ़ वाहन निज लेय अस्त्र अरू शस्त्र सजाई है॥
    - |
      जबानी – इस प्रकार इन शक्तियों को आई हुई देखकर देवीजी आनन्द को प्राप्त होती है और दैत्यगण डरने लगते हैं। इसी समय लोक कल्याण करने वाले श्री महादेवजी संग्राम में आते हैं और श्री अम्बिका जी से शुंभ निशुंभ तथा अन्य दानवो को मार शीघ्र ही समस्त जगत को निर्भय करने का आदेश देते हैं। श्री महादेवजी के इस प्रकार वचन सुनते ही चंडी के शरीर से एक अति भयानक, अति प्रचंड सौ श्रगालियों के समान नाद करती हुई एक अद्भुत शक्ति निकलती है जो 'शिवदूती' के नाम से प्रख्यात है। वह शक्ति श्री प्राप्त महादेवजी से शुंभ के पास जाने तथा उसको समझने का आग्रह करती है। तदनुसार श्री महादेवजी शुंभ के पास जाते हैं और कहते हैं –
