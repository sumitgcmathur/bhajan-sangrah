title: कर जोर अरज गुदरावें
romantitle: Kara Jora Araja Gudaraaveं
tarz: गुरुनाथ है प्राण हमारा, विधि ऐसा बचन उचारा।
lyrics:
  sthayi: |
    कर जोर अरज गुदरावें, वरदान यही हम पावें॥
  paragraphs:
    - |
      संसार चक्र के माँही कोई काल बली सम नाहींजी, क्या राज रंक सब जावे वरदान यही हम पावें॥
    - |
      यर अभयदान बगसीजे, अरू मनवांछित वर दीजेजी, हम अजर अमर होय जावें, वरदान यही पावें॥
  post_shlok: |
    जबानी - ब्रह्माजी शुम्भ निशुम्भ को इस प्रकार उत्तर देते हैं
