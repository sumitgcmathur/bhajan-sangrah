title: जावोरे सेना ले जाओ
tarz: नाचे गावे नारी प्यारी चली जाओ बलिहारी तिहारी
lyrics:
  sthayi: |
    जावोरे सेना ले जाओ डरावो धमकाओ समझा ले आवो॥
  paragraphs:
    - |
      मार पीट वा को कछुना, और कोई सहाई, मारो और भगाऊ, डरावो धमकाओ समझा ले आवो
    - |
      जो विकराल कालिका कराल, छोड़ो नाई वांको भाई, मंडन काट गिरावो, डरावा धमकाओ समझा ले आवो
  post_shlok: |
    जबानी - धूम्रलोचन  महामाया को समझाने का प्रयत्न करता है। तब श्री कलिकाजी क्रोध करती है, और धूम्रलोचन को फटकार कर कहती है। इस प्रकार शुम्भ द्वारा समझाया हुआ धूम्र लोचन साठ हजार दैत्यों के साथ संग्राम करने के हेतु उपवन में जाता है और भगवती
