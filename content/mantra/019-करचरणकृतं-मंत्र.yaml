title: करचरणकृतं मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      शिव स्तुति
  paragraphs:
    - |
      करचरणकृतं वाक्‍कायजं कर्मजं वा।
      श्रवणनयनजं वा मानसं वापराधम्।
      विहितमविहितं वा सर्वमेतत् क्षमस्व।
      जय जय करुणाब्धे श्री महादेव शम्भो॥
    - commentary: |
      हाथ-पैर, वाणी, शरीर, कर्म, कान, नेत्र या मन से किया गया — चाहे विहित हो या अविहित — सब पाप क्षमा करो। हे करुणा के सागर, महादेव शम्भु! आपकी जय हो।
