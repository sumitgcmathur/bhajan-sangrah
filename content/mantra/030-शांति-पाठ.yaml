title: शांति पाठ
lyrics:
  sthayi_connect: false
  pre_shlok: |
      यजुर्वेद — शांति पाठ
  paragraphs:
    - |
      ॐ द्यौः शान्तिरन्तरिक्षं शान्तिः
      पृथिवी शान्तिरापः शान्तिरोषधयः शान्तिः।
      वनस्पतयः शान्तिर्विश्वेदेवाः शान्तिर्ब्रह्म शान्तिः
      सर्वं शान्तिः शान्तिरेव शान्तिः सा मा शान्तिरेधि॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      आकाश में शांति हो, अंतरिक्ष में शांति हो, पृथ्वी, जल, ओषधि (औषधि वनस्पति), वृक्ष, समस्त देवता, ब्रह्म — सबमें शांति हो; सब कुछ शांति है, केवल शांति है — वह शांति मुझमें स्थिर हो। ॐ — शांति हो, शांति हो, शांति हो। (तीन बार: आध्यात्मिक, भौतिक और दैवीय स्तर पर।)
