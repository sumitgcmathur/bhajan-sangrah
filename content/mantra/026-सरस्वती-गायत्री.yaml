title: सरस्वती गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      सरस्वती उपासना
  paragraphs:
    - |
      ॐ वाग्देव्यै विद्महे कामराजाय धीमहि।
      तन्नो देवी प्रचोदयात्॥
    - commentary: |
      हम वाणी की देवी को जानते हैं, कामराज (ब्रह्मा) के साथ ध्यान करते हैं; वह देवी हमारी बुद्धि को प्रेरित करें।
