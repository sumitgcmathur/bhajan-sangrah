title: श्री राम स्तुति मंत्र
group: श्री राम स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      श्री राम राम रामेति रमे रामे मनोरमे।
      सहस्रनाम तत्तुल्यं रामनाम वरानने॥
    - commentary: |
      (राम नाम तारक — पद्म पुराण) हे सुंदर मुख वाली! जो 'राम राम राम' इस मनोहर नाम का जप करता है, उसे सहस्रनाम जप के समान फल मिलता है।
    - |
      ॐ श्रीरामाय विद्महे
      कोसलाय धीमहि
      तन्नो रामः प्रचोदयात्॥
    - commentary: |
      (राम गायत्री — पारंपरिक) हम श्रीराम को जानें, कोसलनंदन का ध्यान करें; वह राम हमारी बुद्धि को प्रेरित करें।
    - |
      रामाय रामभद्राय रामचन्द्राय वेधसे।
      रघुनाथाय नाथाय सीतायाः पतये नमः॥
    - commentary: |
      (राम षड़नाम — अग्नि पुराण) राम, रामभद्र, रामचन्द्र, वेधस, रघुनाथ, नाथ और सीतापति को नमस्कार।
    - |
      श्री रामचन्द्रचरणौ मनसा स्मरामि
      श्री रामचन्द्रचरणौ वचसा गृणामि।
      श्री रामचन्द्रचरणौ शिरसा नमामि
      श्री रामचन्द्रचरणौ शरणं प्रपद्ये॥
    - commentary: |
      (राम रक्षा — राम रक्षा स्तोत्र / रामायण) मन से रामचन्द्र के चरणों का स्मरण, वाणी से गुणगान, शिर से नमस्कार और उन चरणों की शरण — राम भक्ति का प्रसिद्ध मंगल मंत्र।
    - |
      नीलाम्बुजश्यामलकोमलाङ्गं
      सीतासमारोपितवामभागम्।
      पाणौ महासायकचारुचापं
      नमामि रामं रघुवंशनाथम्॥
    - commentary: |
      (रघुवंशनाथ स्तोत्र — रघुवंशानुचरित) नील कमल के समान श्याम, कोमल अंग, सीता से विभूषित वाम भाग, हाथ में महान शर और सुंदर धनुष धारण करने वाले रघुवंशनाथ श्री राम को नमस्कार।
