title: नमोस्तु राघवेन्द्राय
lyrics:
  sthayi_connect: false
  pre_shlok: |
      राम स्तुति
  paragraphs:
    - |
      नमोस्तु राघवेन्द्राय वेदकीर्णां जलेक्षणे।
      कोसलेन्द्राय गोविन्द्ये राका सीताशतप्रभे॥
    - commentary: |
      वेदों से कीर्तित, जल के समान नेत्र, कोसलेश, गोविन्द, चंद्रमा के समान तेज और सीता के समान शोभा वाले रaghuvendra को नमस्कार।
