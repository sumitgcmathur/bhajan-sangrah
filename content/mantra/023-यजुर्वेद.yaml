title: यजुर्वेद
group: वेद और गीता
lyrics:
  sthayi_connect: false
  pre_shlok: |
    यजुर्वेद में यज्ञ-विधि, मंत्र और गद्य-पद्य मिलकर कर्मकांड का विस्तृत वर्णन है। इसकी दो प्रमुख शाखाएँ हैं — शुक्ल (वाजसनेयी) और कृष्ण (तैत्तिरीय) यजुर्वेद। शुक्ल यजुर्वेद में ईश, कठ, तैत्तिरीय और बृहदारण्यक उपनिषद् भी संलग्न हैं।

    यजुर्वेद के मंत्र अग्निहोत्र, सोमयाग, राजसूय आदि यज्ञों में पढ़े जाते हैं। महामृत्युंजय, श्री रुद्रम्, दुर्गा सूक्त और शांति पाठ आज के पूजन में सर्वाधिक प्रचलित हैं।

    नीचे यजुर्वेद के दस प्रमुख मंत्र — स्रोत और अर्थ सहित।
  paragraphs:
    - |
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्।
      उर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय माऽमृतात्॥
    - commentary: |
      (महामृत्युंजय — शुक्ल यजुर्वेद ३.६०) हम तीन नेत्रों वाले, सुगंधित और जीवन-पुष्टि करने वाले (शिव) की उपासना करते हैं। जैसे ककड़ी पेड़ से अलग हो, वैसे मृत्यु के बंधन से मुक्त होकर अमरत्व को प्राप्त हों।
    - |
      ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते।
      पूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते॥
    - commentary: |
      (ईशोपनिषद् — शुक्ल यजुर्वेद, ईशावास्य १) वह (परमात्मा) पूर्ण है, यह जगत भी पूर्ण है; पूर्ण से पूर्ण निकलता है। पूर्ण को पूर्ण से लेने पर भी पूर्ण ही शेष रहता है।
    - |
      ॐ असतो मा सद्गमय।
      तमसो मा ज्योतिर्गमय।
      मृत्योर्मामृतं गमय॥
    - commentary: |
      (बृहदारण्यक शांति — यजुर्वेद, बृहदारण्यक उपनिषद् १.३.२८) हे परमात्मा! मुझे असत्य से सत्य, अंधकार से प्रकाश, मृत्यु से अमरत्व की ओर ले चलो।
    - |
      नमस्ते रुद्र मन्यव उतोत इषवे नमः।
      नमस्ते अस्तु धन्वने बाहुभ्यामुत ते नमः॥
    - commentary: |
      (श्री रुद्रम् — कृष्ण यजुर्वेद, तैत्तिरीयसंहिता ४.५.१) हे रुद्र! आपके क्रोध और बाण को नमस्कार; धनुष और दोनों भुजाओं को भी नमस्कार।
    - |
      ॐ सह नाववतु सह नौ भुनक्तु सह वीर्यं करवावहै।
      तेजस्वि नावधीतमस्तु मा विद्विषावहै॥
    - commentary: |
      (शिक्षावल्ली — यजुर्वेद, तैत्तिरीयोपनिषद् २.१.१) हम साथ सुरक्षित रहें, साथ भोजन करें, साथ शक्ति पाएँ; हमारा अध्ययन तेजस्वी हो, हम आपस में द्वेष न करें।
    - |
      ॐ द्यौः शान्तिरन्तरिक्षं शान्तिः
      पृथिवी शान्तिरापः शान्तिरोषधयः शान्तिः।
      वनस्पतयः शान्तिर्विश्वेदेवाः शान्तिर्ब्रह्म शान्तिः
      सर्वं शान्तिः शान्तिरेव शान्तिः सा मा शान्तिरेधि॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      (शांति पाठ — यजुर्वेद, तैत्तिरीयारण्यक १.१) आकाश, अंतरिक्ष, पृथ्वी, जल, ओषधि, वृक्ष, देवता, ब्रह्म — सबमें शांति; वह शांति मुझमें स्थिर हो। ॐ — शांति, शांति, शांति।
    - |
      ॐ अग्ने नय सुपथा राये अस्मान्
      विश्वानि देव वयुनानि विद्वान्।
      युयोध्यस्मज्जुहुराणमेनो
      भूयिष्ठां ते नम उक्तिं विधेम॥
    - commentary: |
      (अग्नि प्रार्थना — यजुर्वेद, तैत्तिरीयसंहिता १.१.८) हे अग्नि! हमें कल्याण के मार्ग पर ले चलो; हमारे पाप दूर करो — आपको बार-बार नमस्कार।
    - |
      या देवी सर्वभूतेषु शक्तिरूपेण संस्थिता।
      नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः॥
    - commentary: |
      (दुर्गा सूक्त — कृष्ण यजुर्वेद, तैत्तिरीयारण्यक १०.१) जो देवी सब प्राणियों में शक्ति के रूप में स्थित हैं, उन्हें बार-बार नमस्कार।
    - |
      ॐ भूर्भुवः स्वः
      तत्सवितुर्वरेण्यं
      भर्गो देवस्य धीमहि
      धियो यो नः प्रचोदयात्॥
    - commentary: |
      (गायत्री — यजुर्वेद, वाजसनेयी संहिता ३६.३) ऋग्वेद से यजुर्वेद में भी प्रचलित; सविता देव का ध्यान — बुद्धि को सन्मार्ग की ओर प्रेरित करने की प्रार्थना।
    - |
      ॐ वाङ् मे मनसि प्रतिष्ठिता
      मनो मे वाचि प्रतिष्ठितम्।
      आविरावीर्म एधि वेदस्य म अणिस्तु
      वागस्तु शुष्मिणा पुनः॥
    - commentary: |
      (वाक्-मन संयोग — यजुर्वेद, तैत्तिरीयसंहिता) मेरी वाणी मन में और मन वाणी में स्थिर हो; वेद का अग्नि प्रज्वलित हो — वाणी शक्तिशाली होकर पुनः उदित हो।
