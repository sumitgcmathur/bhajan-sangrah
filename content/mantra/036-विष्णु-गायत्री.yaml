title: विष्णु गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      विष्णु उपासना
  paragraphs:
    - |
      ॐ नारायणाय विद्महे वासुदेवाय धीमहि।
      तन्नो विष्णुः प्रचोदयात्॥
    - commentary: |
      हम नारायण को जानते हैं, वासुदेव का ध्यान करते हैं; वह विष्णु हमारी बुद्धि को प्रेरित करें।
