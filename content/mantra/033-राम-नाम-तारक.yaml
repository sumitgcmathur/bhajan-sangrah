title: राम नाम तारक
lyrics:
  sthayi_connect: false
  pre_shlok: |
      पद्म पुराण
  paragraphs:
    - |
      श्री राम राम रामेति रमे रामे मनोरमे।
      सहस्रनाम तत्तुल्यं रामनाम वरानने॥
    - commentary: |
      हे सुंदर मुख वाली! जो 'राम राम राम' इस मनोहर नाम का जप करता है, उसे सहस्रनाम जप के समान फल मिलता है।
