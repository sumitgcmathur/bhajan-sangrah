title: मनोजवं मारुततुल्यवेगम्
lyrics:
  sthayi_connect: false
  pre_shlok: |
      हनुमान स्तोत्र
  paragraphs:
    - |
      मनोजवं मारुततुल्यवेगं जितेन्द्रियं बुद्धिमतां वरिष्ठम्।
      वातात्मजं वानरयूथमुख्यं श्रीरामदूतं शिरसा नमामि॥
    - commentary: |
      मैं मन के समान वेग वाले, वायु के समान तीव्र, जितेन्द्रिय, बुद्धिमानों में श्रेष्ठ, वायुपुत्र, वानर सेना के मुखिया और श्रीराम के दूत हनुमान को शिर से नमस्कार करता हूँ।
