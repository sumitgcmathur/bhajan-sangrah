title: बृहदारण्यक शांति प्रार्थना
lyrics:
  sthayi_connect: false
  pre_shlok: |
      बृहदारण्यक उपनिषद् १.३.२८
  paragraphs:
    - |
      ॐ असतो मा सद्गमय।
      तमसो मा ज्योतिर्गमय।
      मृत्योर्मामृतं गमय॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      हे परमात्मा! मुझे असत्य से सत्य की ओर, अंधकार से प्रकाश की ओर, मृत्यु से अमरत्व की ओर ले चलो। शांति हो, शांति हो, शांति हो।
