title: या कुन्देन्दु तुषारहार
lyrics:
  sthayi_connect: false
  pre_shlok: |
      सरस्वती स्तोत्र
  paragraphs:
    - |
      या कुन्देन्दु तुषारहार धवला या शुभ्र वस्त्रावृता।
      या वीणा वरदण्ड मण्डितकरा या श्वेत पद्मासना॥
      या ब्रह्माच्युत शङ्करप्रभृतिभिर्देवैः सदा वन्दिता
      सा मां पातु सरस्वती भगवती निःशेष जाड्यापहा॥
    - commentary: |
      जो कुंद-चंद्रमा-हिम की माला के समान श्वेत, वीणा-वरदण्ड धारिणी, श्वेत कमल पर आसीन, ब्रह्मा-विष्णु-शिवादि से वंदित और सारी जड़ता दूर करने वाली भगवती सरस्वती मेरी रक्षा करें।
