title: आदित्य हृदय
lyrics:
  sthayi_connect: false
  pre_shlok: |
      वाल्मीकि रामायण
  paragraphs:
    - |
      आदित्यस्य नमस्कारान् ये कुर्वन्ति दिने दिने।
      जन्मान्तरसहस्रेषु दारिद्र्यं नोपजायते॥
      न च व्याधि शोक दुःखं न च मानापमानम्।
      तस्य नश्यन्ति सर्वशः॥
    - commentary: |
      जो प्रतिदिन सूर्य को नमस्कार करते हैं, उन्हें जन्म-जन्मांतर दारिद्र्य, रोग, शोक, दुःख, अपमान नहीं होता — उनके सब कष्ट नष्ट हो जाते हैं।
