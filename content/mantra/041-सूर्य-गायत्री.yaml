title: सूर्य गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      सूर्य उपासना
  paragraphs:
    - |
      ॐ भास्कराय विद्महे महाद्युतिकराय धीमहि।
      तन्नो आदित्यः प्रचोदयात्॥
    - commentary: |
      हम भास्कर को जानते हैं, महान प्रकाश करने वाले का ध्यान करते हैं; वह आदित्य हमारी बुद्धि को प्रेरित करें।
