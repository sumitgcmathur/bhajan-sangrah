title: या देवी सर्वभूतेषु
lyrics:
  sthayi_connect: false
  pre_shlok: |
      देवी स्तुति
  paragraphs:
    - |
      या देवी सर्वभूतेषु शक्तिरूपेण संस्थिता।
      नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः॥
    - commentary: |
      जो देवी सब प्राणियों में शक्ति के रूप में विराजमान हैं, उन्हें बार-बार नमस्कार।
