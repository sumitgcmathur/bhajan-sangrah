title: गणेश गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      गणेश उपासना
  paragraphs:
    - |
      ॐ एकदन्ताय विद्महे वक्रतुण्डाय धीमहि।
      तन्नो दन्तिः प्रचोदयात्॥
    - commentary: |
      हम एकदंत को जानते हैं, वक्रतुण्ड का ध्यान करते हैं; वह दंती (गणेश) हमारी बुद्धि को प्रेरित करें।
