title: परित्राणाय साधूनां
lyrics:
  sthayi_connect: false
  pre_shlok: |
      भगवद्गीता ४.८
  paragraphs:
    - |
      परित्राणाय साधूनां विनाशाय च दुष्कृताम्।
      धर्मसंस्थापनार्थाय सम्भवामि युगे युगे॥
    - commentary: |
      साधुओं की रक्षा, दुष्टों के विनाश और धर्म की स्थापना के लिए मैं युग-युग में अवतरित होता हूँ।
