title: हरे कृष्ण महामंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      कलिसन्तरणोपनिषद्
  paragraphs:
    - |
      हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे।
      हरे राम हरे राम राम राम हरे हरे॥
    - commentary: |
      हे हरि (कृष्ण)! हे कृष्ण! हे हरि! हे राम! इस षोडश नाम मंत्र से कलियुग में मोक्ष और भक्ति की प्राप्ति होती है।
