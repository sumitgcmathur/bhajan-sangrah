title: आनन्दं ब्रह्मणो विद्वान्
lyrics:
  sthayi_connect: false
  pre_shlok: |
      तैत्तिरीयोपनिषद् २.९.१
  paragraphs:
    - |
      यतो वाचो निवर्तन्ते अप्राप्य मनसा सह।
      आनन्दं ब्रह्मणो विद्वान् न बिभेति कुतश्चन॥
    - commentary: |
      जहाँ से वाणी और मन लौट आते हैं, उस ब्रह्म के आनंद को जानने वाला किसी से भी नहीं डरता।
