title: श्री गणेश स्तुति मंत्र
group: श्री गणेश स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ।
      निर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा॥
    - commentary: |
      (वक्रतुण्ड महाकाय — गणेश स्तोत्र, पारंपरिक) हे वक्रदंष्ट्र, विशाल शरीर वाले, करोड़ों सूर्य के समान तेजस्वी देव! मेरे सभी कार्यों में सदा विघ्न न करें।
    - |
      गजाननं भूतगणादिसेवितं
      कपित्थ जम्बूफलचारु भक्षणम्।
      उमासुतं शोकविनाशकारकम्
      नमामि विघ्नेश्वर पादपङ्कजम्॥
    - commentary: |
      (गजाननं — गणेश स्तोत्र, मुद्गल पुराण) गजानन, भूतगण से सेवित, कपित्थ-जम्बूफल भक्षण करने वाले, उमा-पुत्र, शोक नाश करने वाले विघ्नेश्वर के चरणकमलों को मैं नमस्कार करता हूँ।
    - |
      प्रथमं वक्रतुण्डं च एकदन्तं द्वितीयकम्।
      तृतीयं कृष्णपिङ्गाक्षं गजवक्त्रं चतुर्थकम्॥
    - commentary: |
      (गणेश चतुर्व्यूह — गणपत्यथर्वशीर्ष उपनिषद्) सर्वप्रथम वक्रतुण्ड, दूसरे एकदंत, तीसरे कृष्णपिङ्गाक्ष और चौथे गजवक्त्र — चारों गणेश स्वरूपों का स्मरण।
    - |
      मूषिकवाहन मोदकहस्त चामरकर्ण विलम्बित सूत्र।
      वामनरूप महेश्वर तव सेवनमिहोपुक्तम्॥
    - commentary: |
      (मूषिकवाहन स्तोत्र — आदि शङ्कराचार्य) मूषक वाहन, मोदक हस्त, चामर कर्ण और विलम्बित सूत्र वाले, वामन रूप महेश्वर! आपकी सेवा यहाँ वर्णित है।
    - |
      ॐ एकदन्ताय विद्महे
      वक्रतुण्डाय धीमहि
      तन्नो दन्तिः प्रचोदयात्॥
    - commentary: |
      (गणेश गायत्री — पारंपरिक) हम एकदंत को जानें, वक्रतुण्ड का ध्यान करें; वह गणेश हमारी बुद्धि को प्रेरित करें।
