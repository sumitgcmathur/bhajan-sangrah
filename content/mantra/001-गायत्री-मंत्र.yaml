title: गायत्री मंत्र
group: गायत्री मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      ॐ भूर्भुवः स्वः
      तत्सवितुर्वरेण्यं
      भर्गो देवस्य धीमहि
      धियो यो नः प्रचोदयात्॥
    - commentary: |
      (सावितृ गायत्री — ऋग्वेद ३.६२.१०) हम उस प्राणस्वरूप, दुःखों का नाश करने वाले, सुखस्वरूप, श्रेष्ठ, तेजस्वी, पापों से रहित, देवस्वरूप परमात्मा का ध्यान करते हैं। वह परमात्मा हमारी बुद्धि को सन्मार्ग की ओर प्रेरित करे।
    - |
      ॐ नारायणाय विद्महे
      वासुदेवाय धीमहि
      तन्नो विष्णुः प्रचोदयात्॥
    - commentary: |
      (विष्णु गायत्री — पारंपरिक) हम नारायण को जानें, वासुदेव का ध्यान करें; वह विष्णु हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ महादेवाय विद्महे
      रुद्रमूर्तये धीमहि
      तन्नो शिवः प्रचोदयात्॥
    - commentary: |
      (शिव गायत्री — पारंपरिक) हम महादेव को जानें, रुद्रस्वरूप का ध्यान करें; वह शिव हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ एकदन्ताय विद्महे
      वक्रतुण्डाय धीमहि
      तन्नो दन्तिः प्रचोदयात्॥
    - commentary: |
      (गणेश गायत्री — पारंपरिक) हम एकदंत को जानें, वक्रतुण्ड का ध्यान करें; वह गणेश हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ कात्यायन्यै विद्महे
      कन्यकुमारि धीमहि
      तन्नो दुर्गिः प्रचोदयात्॥
    - commentary: |
      (दुर्गा गायत्री — पारंपरिक) हम कात्यायनी को जानें, कन्याकुमारी का ध्यान करें; वह दुर्गा हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ सरस्वत्यै विद्महे
      ब्रह्मपुत्र्यै धीमहि
      तन्नः सरस्वती प्रचोदयात्॥
    - commentary: |
      (सरस्वती गायत्री — पारंपरिक) हम सरस्वती को जानें, ब्रह्मपुत्री का ध्यान करें; वह सरस्वती हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ महालक्ष्म्यै विद्महे
      विष्णुपत्न्यै धीमहि
      तन्नो लक्ष्मीः प्रचोदयात्॥
    - commentary: |
      (लक्ष्मी गायत्री — पारंपरिक) हम महालक्ष्मी को जानें, विष्णुपत्नी का ध्यान करें; वह लक्ष्मी हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ आञ्जनेयाय विद्महे
      वायुपुत्राय धीमहि
      तन्नो हनुमानः प्रचोदयात्॥
    - commentary: |
      (हनुमान गायत्री — पारंपरिक) हम आञ्जनेय को जानें, वायुपुत्र का ध्यान करें; वह हनुमान हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ भास्कराय विद्महे
      महादुत्याय धीमहि
      तन्नः सूर्यः प्रचोदयात्॥
    - commentary: |
      (सूर्य गायत्री — पारंपरिक) हम भास्कर को जानें, महातेजस्वी का ध्यान करें; वह सूर्य हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ दामोदराय विद्महे
      भूताद्याय धीमहि
      तन्नः कृष्णः प्रचोदयात्॥
    - commentary: |
      (कृष्ण गायत्री — पारंपरिक) हम दामोदर को जानें, भूतादि का ध्यान करें; वह कृष्ण हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ श्रीरामाय विद्महे
      कोसलाय धीमहि
      तन्नो रामः प्रचोदयात्॥
    - commentary: |
      (राम गायत्री — पारंपरिक) हम श्रीराम को जानें, कोसलनंदन का ध्यान करें; वह राम हमारी बुद्धि को प्रेरित करें।
