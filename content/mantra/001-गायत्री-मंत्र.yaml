title: गायत्री मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      ऋग्वेद ३.६२.१०
  paragraphs:
    - |
      ॐ भूर्भुवः स्वः
      तत्सवितुर्वरेण्यं
      भर्गो देवस्य धीमहि
      धियो यो नः प्रचोदयात्॥
    - commentary: |
      हम उस प्राणस्वरूप, दुःखों का नाश करने वाले, सुखस्वरूप, श्रेष्ठ, तेजस्वी, पापों से रहित, देवस्वरूप परमात्मा का ध्यान करते हैं। वह परमात्मा हमारी बुद्धि को सन्मार्ग की ओर प्रेरित करे।
