title: गजाननं भूतगणादिसेवितम्
lyrics:
  sthayi_connect: false
  pre_shlok: |
      गणेश स्तोत्र
  paragraphs:
    - |
      गजाननं भूतगणादिसेवितं
      कपित्थ जम्बूफलचारु भक्षणम्।
      उमासुतं शोकविनाशकारकम्
      नमामि विघ्नेश्वर पादपङ्कजम्॥
    - commentary: |
      गजानन, भूतगण से सेवित, कपित्थ-जम्बूफल भक्षण करने वाले, उमा-पुत्र, शोक नाश करने वाले विघ्नेश्वर के चरणकमलों को मैं नमस्कार करता हूँ।
