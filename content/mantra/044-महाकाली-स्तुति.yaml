title: महाकाली स्तुति
lyrics:
  sthayi_connect: false
  pre_shlok: |
      देवी स्तुति
  paragraphs:
    - |
      करालबदने कालि कालिके कालरूपिणि।
      शमशाननिवासिनि महाकालि महेश्वरि॥
      काली काली महाकालि कालिके परमेश्वरि।
      कालरूपे महाकालि कालिके परमेश्वरि॥
    - commentary: |
      हे कराल वदन, काली, कालरूपिणी, श्मशान निवासिनी, महाकाली और परमेश्वरी! आपकी स्तुति।
