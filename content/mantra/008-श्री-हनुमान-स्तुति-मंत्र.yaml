title: श्री हनुमान स्तुति मंत्र
group: श्री हनुमान स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      मनोजवं मारुततुल्यवेगं जितेन्द्रियं बुद्धिमतां वरिष्ठम्।
      वातात्मजं वानरयूथमुख्यं श्रीरामदूतं शिरसा नमामि॥
    - commentary: |
      (मनोजवं — रामायण / हनुमान स्तोत्र) मैं मन के समान वेग वाले, वायु के समान तीव्र, जितेन्द्रिय, बुद्धिमानों में श्रेष्ठ, वायुपुत्र, वानर सेना के मुखिया और श्रीराम के दूत हनुमान को शिर से नमस्कार करता हूँ।
    - |
      ॐ आञ्जनेयाय विद्महे
      वायुपुत्राय धीमहि
      तन्नो हनुमानः प्रचोदयात्॥
    - commentary: |
      (हनुमान गायत्री — पारंपरिक) हम आञ्जनेय को जानें, वायुपुत्र का ध्यान करें; वह हनुमान हमारी बुद्धि को प्रेरित करें।
    - |
      अतुलितबलधामं हेमशैलाभदेहम्।
      दनुजवनकृशानुं ज्ञानिनामग्रगण्यम्॥
    - commentary: |
      (सङ्कट मोचन — सङ्कट मोचन हनुमान अष्टक, गोस्वामी तुलसीदास) अतुलित बल के धाम, स्वर्ण पर्वत के समान शरीर, दानव वन को जलाने वाले अग्नि और ज्ञानियों में अग्रण्य हनुमान को नमस्कार।
    - |
      बुद्धिर्बलं यशो धैर्यं निर्भयत्वमरोगता।
      अजाड्यं वाक्पटुत्वं च हनुमत् स्मरणाद्भवेत्॥
    - commentary: |
      (हनुमान स्मरण फल — हनुमान चालीसा / रामचरितमानस) हनुमान के स्मरण से बुद्धि, बल, यश, धैर्य, निर्भयता, स्वास्थ्य, चतुराई और वाक्पटुता प्राप्त होती है।
    - |
      अञ्जनानन्दनं वीरं जानकीशोकनाशनम्।
      कपीशमक्षहन्तारं वन्दे लङ्काविभीषणम्॥
    - commentary: |
      (हनुमान स्तुति — पारंपरिक) अञ्जना-नंदन वीर, जानकी के शोक नाश करने वाले, वानरों के स्वामी, अक्षय कुमार के वध करने वाले और लंका को भयभीत करने वाले हनुमान को वंदन।
