title: नवार्ण मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      दुर्गा सप्तशती
  paragraphs:
    - |
      ॐ ऐं ह्रीं क्लीं चामुण्डायै विच्चे।
      जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते॥
    - commentary: |
      चामुण्डा (दुर्गा) को नमस्कार — ऐं, ह्रीं, क्लीं बीजों सहित नौ अक्षरों का नवार्ण मंत्र; हे महिषासुर मर्दिनी, शैलकन्या! आपकी जय हो।
