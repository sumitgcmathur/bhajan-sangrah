title: श्री देवी स्तुति मंत्र
group: स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके।
      शरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते॥
    - commentary: |
      (सर्वमंगल मांगल्ये — दुर्गा सप्तशती) हे सर्व मंगलों में मंगलमय, शिवस्वरूपिणी, सभी कार्यों की सिद्धि करने वाली, शरण देने योग्य, तीन नेत्रों वाली गौरी नारायणि! तुम्हें नमस्कार।
    - |
      ॐ ऐं ह्रीं क्लीं चामुण्डायै विच्चे।
      जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते॥
    - commentary: |
      (नवार्ण मंत्र — दुर्गा सप्तशती) चामुण्डा (दुर्गा) को नमस्कार — ऐं, ह्रीं, क्लीं बीजों सहित नौ अक्षरों का नवार्ण मंत्र; हे महिषासुर मर्दिनी, शैलकन्या! आपकी जय हो।
    - |
      या देवी सर्वभूतेषु शक्तिरूपेण संस्थिता।
      नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः॥
    - commentary: |
      (या देवी सर्वभूतेषु — दुर्गा सप्तशती ४.१४) जो देवी सब प्राणियों में शक्ति के रूप में विराजमान हैं, उन्हें बार-बार नमस्कार।
    - |
      ॐ जयन्ती मङ्गला काली भद्रकाली कपालिनी।
      दुर्गा क्षमा शिवा धात्री स्वाहा स्वधा नमोऽस्तु ते॥
    - commentary: |
      (देवी नाम स्तोत्र — दुर्गा सप्तशती ५.१३६) जयन्ती, मंगला, काली, भद्रकाली, कपालिनी, दुर्गा, क्षमा, शिवा, धात्री, स्वाहा, स्वधा — इन देवी नामों को नमस्कार।
    - |
      ॐ कात्यायन्यै विद्महे
      कन्यकुमारि धीमहि
      तन्नो दुर्गिः प्रचोदयात्॥
    - commentary: |
      (दुर्गा गायत्री — पारंपरिक) हम कात्यायनी को जानें, कन्याकुमारी का ध्यान करें; वह दुर्गा हमारी बुद्धि को प्रेरित करें।
