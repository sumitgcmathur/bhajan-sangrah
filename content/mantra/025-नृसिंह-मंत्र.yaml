title: नृसिंह मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      नृसिंह पुराण
  paragraphs:
    - |
      ॐ उग्रं वीरं महाविष्णुं ज्वलन्तं सर्वतोमुखम्।
      नृसिंहं भीषणं भद्रं मृत्युमृत्युं नमाम्यहम्॥
    - commentary: |
      मैं उग्र, वीर, महाविष्णु, सर्वत्र प्रज्वलित, नृसिंह, भयंकर परंतु कल्याणकारी और मृत्यु की भी मृत्यु को नमस्कार करता हूँ।
