title: विश्वरूप दर्शन मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      भगवद्गीता ११.१३
  paragraphs:
    - |
      सर्वतः पाणिपादं तत् सर्वतोऽक्षिशिरोमुखम्।
      सर्वतः श्रुतिमल्लोके सर्वमावृत्य तिष्ठति॥
    - commentary: |
      उस (विश्वरूप) के हाथ-पैर, नेत्र, मुख सब ओर हैं; सब ओर कान; वह सारे लोक को व्याप्त करके स्थित है।
