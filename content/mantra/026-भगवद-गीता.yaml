title: भगवद् गीता
group: वेद और गीता
lyrics:
  sthayi_connect: false
  pre_shlok: |
    भगवद् गीता महाभारत के भीष्म पर्व में श्रीमद्भगवद्गीता नामक अध्याय है — इसमें कुरुक्षेत्र के युद्ध से पूर्व भगवान श्रीकृष्ण ने अर्जुन को अठारह अध्यायों में ज्ञान, कर्म, भक्ति और योग का उपदेश दिया। गीता में ७०० श्लोक हैं और यह संपूर्ण भारतीय दर्शन का सार मानी जाती है।

    गीता में कर्मयोग, सांख्य, भक्तियोग, राजयोग और गुणातीतता का वर्णन है। यह न केवल धर्मशास्त्र है, बल्कि जीवन के हर क्षेत्र — कर्तव्य, त्याग, ध्यान, भक्ति और मोक्ष — में मार्गदर्शन करती है। स्वामी विवेकानंद, महात्मा गांधी और अनेक आचार्यों ने गीता को अपने जीवन का आधार बनाया।

    नीचे भगवद् गीता के दस सर्वाधिक प्रचलित श्लोक — अध्याय-श्लोक सहित अर्थ।
  paragraphs:
    - |
      कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।
      मा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥
    - commentary: |
      (कर्मयोग — भगवद् गीता २.४७) तेरा अधिकार केवल कर्म में है, फल में कभी नहीं; कर्मफल का हेतु मत बन और अकर्म (कर्म न करने) में भी आसक्ति मत रख। — गीता का सर्वप्रसिद्ध श्लोक।
    - |
      वासांसि जीर्णानि यथा विहाय
      नवानि गृह्णाति नरोऽपराणि।
      तथा शरीराणि विहाय जीर्णानि
      अन्यानि संयाति नवानि देही॥
    - commentary: |
      (आत्मा की अमरता — भगवद् गीता २.२२) जैसे पुराने वस्त्र त्यागकर नए पहनता है, वैसे ही आत्मा पुराने शरीर छोड़कर नए शरीर को प्राप्त होती है — पुनर्जन्म का दर्शन।
    - |
      योगः कर्मसु कौशलम्॥
    - commentary: |
      (योग की परिभाषा — भगवद् गीता २.५०) योग कर्म में कुशलता (निष्काम भाव से सिद्ध कर्म) है — कर्मयोग का सार।
    - |
      यदा यदा हि धर्मस्य ग्लानिर्भवति भारत।
      अभ्युत्थानमधर्मस्य तदात्मानं सृजाम्यहम्॥
    - commentary: |
      (देवावतार — भगवद् गीता ४.७) हे भारत! जब-जब धर्म की हानि और अधर्म की वृद्धि होती है, तब-तब मैं अपने रूप को रचता (अवतार लेता) हूँ।
    - |
      परित्राणाय साधूनां विनाशाय च दुष्कृताम्।
      धर्मसंस्थापनार्थाय सम्भवामि युगे युगे॥
    - commentary: |
      (अवतार का उद्देश्य — भगवद् गीता ४.८) साधुओं की रक्षा, दुष्कृतियों का विनाश और धर्म की स्थापना के लिए मैं युग-युग में प्रकट होता हूँ।
    - |
      मन्मना भव मद्भक्तो मद्याजी मां नमस्कुरु।
      मामेवैष्यसि सत्यं ते प्रतिजाने प्रियोऽसि मे॥
    - commentary: |
      (भक्तियोग — भगवद् गीता ९.३४) मुझमें मन लगाओ, मेरे भक्त बनो, मेरी पूजा करो, मुझे नमस्कार करो — तुम निश्चय ही मुझे प्राप्त होगे; तुम मेरे प्रिय हो, यह सत्य है।
    - |
      सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।
      अहं त्वां सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥
    - commentary: |
      (शरणागति — भगवद् गीता १८.६६) सब धर्मों को छोड़कर केवल मेरी शरण में आओ — मैं तुम्हें सब पापों से मुक्त कर दूँगा, शोक मत करो। — गीता का चरमोपदेश।
    - |
      उद्धरेदात्मनात्मानं नात्मानमवसादयेत्।
      आत्मैव ह्यात्मनो बन्धुरात्मैव रिपुरात्मनः॥
    - commentary: |
      (आत्म-उद्धार — भगवद् गीता ६.५) मनुष्य को अपने द्वारा अपना उद्धार करना चाहिए, अपना पतन नहीं — आत्मा ही आत्मा का बंधु है और आत्मा ही शत्रु।
    - |
      अद्वेष्टा सर्वभूतानां मैत्रः करुण एव च।
      निर्ममो निरहङ्कारः समदुःखसुखः क्षमी॥
    - commentary: |
      (प्रेमी भक्त के लक्षण — भगवद् गीता १२.१३) जो सब प्राणियों से द्वेष नहीं करता, मित्रवत, करुणामय, ममता-रहित, अहंकार-रहित, सुख-दुःख में सम और क्षमाशील है — वह मुझे प्रिय है।
    - |
      सर्वस्य चाहं हृदि सन्निविष्टो
      मत्तः स्मृतिर्ज्ञानमपोहनं च।
      वेदैश्च सर्वैरहमेव वेद्यो
      वेदान्तकृद्वेदविदेव चाहम्॥
    - commentary: |
      (परमात्मा का वर्णन — भगवद् गीता १५.१५) मैं सबके हृदय में स्थित हूँ; मुझसे स्मृति, ज्ञान और उनका अपोहन (विस्मरण) होता है। सब वेदों द्वारा मैं ही जानने योग्य हूँ — मैं वेदान्त का कर्ता और वेदों को जानने वाला भी हूँ।
