title: अतुलित बलधाम
lyrics:
  sthayi_connect: false
  pre_shlok: |
      हनुमान चालीसा
  paragraphs:
    - |
      अतुलित बलधामं हेमशैलाभदेहम्।
      दनुजवनकृशानुं ज्ञानिनामग्रगण्यम्॥
      सकल गुणनिधानं वानराणामधीशम्
      रघुपति प्रियभक्तं वातजातं नमामि॥
    - commentary: |
      अतुल बल वाले, सुवर्ण पर्वत के समान शरीर, दैत्यों के विनाशक, ज्ञानियों में श्रेष्ठ, सब गुणों के भंडार, वानरों के स्वामी, रघुपति के प्रिय भक्त और वायुपुत्र हनुमान को नमस्कार।
