title: ललिता गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      श्री विद्या
  paragraphs:
    - |
      ॐ पञ्चप्रेतासनासीनां विद्महे
      पराबत्यै धीमहि तन्नो ललिता प्रचोदयात्॥
    - commentary: |
      हम पंचप्रेतासन पर विराजमान पराशक्ति का ध्यान करते हैं; वह ललिता हमारी बुद्धि को प्रेरित करें।
