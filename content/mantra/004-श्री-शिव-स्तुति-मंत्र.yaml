title: श्री शिव स्तुति मंत्र
group: श्री शिव स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्।
      उर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय माऽमृतात्॥
    - commentary: |
      (महामृत्युंजय मंत्र — यजुर्वेद, शुक्ल यजुर्वेद ३.६०) हम तीन नेत्रों वाले, सुगंधित और जीवन की पुष्टि करने वाले शिव की उपासना करते हैं। जैसे कटा हुआ ककड़ी पेड़ से अलग हो जाता है, वैसे ही हम मृत्यु के बंधन से मुक्त होकर अमरत्व को प्राप्त हों।
    - |
      कर्पूरगौरं करुणावतारं
      संसारसारं भुजगेन्द्रहारम्।
      सदा वसन्तं हृदयारविन्दे
      भवं भवानीसहितं नमामि॥
    - commentary: |
      (कर्पूर गौरम् — शिव स्तोत्र, आदि शङ्कराचार्य) कर्पूर के समान गौर, करुणा के अवतार, संसार के सार, सर्पों के राजा को हार धारण, सदा हृदय कमल में निवास करने वाले भव (शिव) और भवानी सहित उन्हें नमस्कार।
    - |
      करचरणकृतं वाक्‍कायजं कर्मजं वा।
      श्रवणनयनजं वा मानसं वापराधम्।
      विहितमविहितं वा सर्वमेतत् क्षमस्व।
      जय जय करुणाब्धे श्री महादेव शम्भो॥
    - commentary: |
      (करचरणकृतं — शिव स्तुति, पारंपरिक) हाथ-पैर, वाणी, शरीर, कर्म, कान, नेत्र या मन से किया गया — चाहे विहित हो या अविहित — सब पाप क्षमा करो। हे करुणा के सागर, महादेव शम्भु! आपकी जय हो।
    - |
      नमस्ते रुद्र मन्यव उतोत इषवे नमः।
      नमस्ते अस्तु धन्वने बाहुभ्यामुत ते नमः॥
    - commentary: |
      (नमस्ते रुद्र — श्री रुद्रम्, कृष्ण यजुर्वेद तैत्तिरीयसंहिता ४.५) हे रुद्र! आपके क्रोध और बाण को नमस्कार; धनुष और भुजों को भी नमस्कार।
    - |
      ॐ महादेवाय विद्महे
      रुद्रमूर्तये धीमहि
      तन्नो शिवः प्रचोदयात्॥
    - commentary: |
      (शिव गायत्री — पारंपरिक) हम महादेव को जानें, रुद्रस्वरूप का ध्यान करें; वह शिव हमारी बुद्धि को प्रेरित करें।
