title: सह नाववतु मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      तैत्तिरीयोपनिषद् २.१.१
  paragraphs:
    - |
      ॐ सह नाववतु सह नौ भुनक्तु सह वीर्यं करवावहै।
      तेजस्वि नावधीतमस्तु मा विद्विषावहै॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      हम साथ सुरक्षित रहें, साथ भोजन करें, साथ शक्ति पाएँ; हमारा अध्ययन तेजस्वी हो, हम आपस में द्वेष न करें। शांति हो, शांति हो, शांति हो।
