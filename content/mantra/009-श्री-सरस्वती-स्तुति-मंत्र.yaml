title: श्री सरस्वती स्तुति मंत्र
group: श्री सरस्वती स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      या कुन्देन्दु तुषारहार धवला या शुभ्र वस्त्रावृता।
      या वीणा वरदण्ड मण्डितकरा या श्वेत पद्मासना॥
      या ब्रह्माच्युत शङ्करप्रभृतिभिर्देवैः सदा वन्दिता
      सा मां पातु सरस्वती भगवती निःशेष जाड्यापहा॥
    - commentary: |
      (या कुन्देन्दु — सरस्वती स्तोत्र, वेद व्यास) जो कुंद-चंद्रमा-हिम की माला के समान श्वेत, वीणा-वरदण्ड धारिणी, श्वेत कमल पर आसीन, ब्रह्मा-विष्णु-शिवादि से वंदित और सारी जड़ता दूर करने वाली भगवती सरस्वती मेरी रक्षा करें।
    - |
      ॐ सरस्वत्यै विद्महे
      ब्रह्मपुत्र्यै धीमहि
      तन्नः सरस्वती प्रचोदयात्॥
    - commentary: |
      (सरस्वती गायत्री — पारंपरिक) हम सरस्वती को जानें, ब्रह्म-पुत्री का ध्यान करें; वह सरस्वती हमारी बुद्धि को प्रेरित करें।
    - |
      नमामि यज्ञविद्यायै नमामि यज्ञविनाशिनीम्।
      माहेन्द्र्यै च विद्यायै नमामि रुद्रभाषिणीम्॥
    - commentary: |
      (सरस्वती विद्या स्तोत्र — सरस्वती स्तोत्र, पारंपरिक) यज्ञ विद्या, यज्ञ विनाशिनी, माहेन्द्री विद्या और रुद्र भाषिणी सरस्वती को नमस्कार।
    - |
      सरस्वति महाभागे विद्ये कमललोचने।
      विद्यारूपे विशालाक्षि विद्यां देहि नमोऽस्तु ते॥
    - commentary: |
      (सरस्वती वंदना — पारंपरिक) हे महाभाग सरस्वती, विद्यारूपे कमलनेत्र, विशालाक्षी! विद्या प्रदान करो, तुम्हें नमस्कार।
    - |
      या देवी सर्वभूतेषु विद्यारूपेण संस्थिता।
      नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः॥
    - commentary: |
      (विद्या रूप देवी — दुर्गा सप्तशती ५.३७) जो देवी सब प्राणियों में विद्या के रूप में स्थित हैं, उन्हें बार-बार नमस्कार।
