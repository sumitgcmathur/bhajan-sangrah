title: वक्रतुण्ड महाकाय
lyrics:
  sthayi_connect: false
  pre_shlok: |
      गणेश स्तोत्र
  paragraphs:
    - |
      वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ।
      निर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा॥
    - commentary: |
      हे वक्रदंष्ट्र, विशाल शरीर वाले, करोड़ों सूर्य के समान तेजस्वी देव! मेरे सभी कार्यों में सदा विघ्न न करें।
