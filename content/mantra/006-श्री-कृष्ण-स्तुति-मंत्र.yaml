title: श्री कृष्ण स्तुति मंत्र
group: श्री कृष्ण स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे।
      हरे राम हरे राम राम राम हरे हरे॥
    - commentary: |
      (हरे कृष्ण महामंत्र — कलिसन्तरणोपनिषद्) हे हरि (कृष्ण)! हे कृष्ण! हे हरि! हे राम! इस षोडश नाम मंत्र से कलियुग में मोक्ष और भक्ति की प्राप्ति होती है।
    - |
      वसुदेवसुतं देवं कंसचाणूरमर्दनम्।
      देवकी परमानन्दं कृष्णं वन्दे जगद्गुरुम्॥
    - commentary: |
      (वसुदेव सुतं — विष्णु स्तोत्र, पारंपरिक) वसुदेव-पुत्र, कंस और चाणूर के वध करने वाले, देवकी के परमानंद और जगत के गुरु कृष्ण को मैं वंदता हूँ।
    - |
      ॐ दामोदराय विद्महे
      भूताद्याय धीमहि
      तन्नः कृष्णः प्रचोदयात्॥
    - commentary: |
      (कृष्ण गायत्री — पारंपरिक) हम दामोदर को जानें, भूतादि का ध्यान करें; वह कृष्ण हमारी बुद्धि को प्रेरित करें।
    - |
      मूकं करोति वाचालं पङ्गुं लङ्घयते गिरिम्।
      यत्कृपा तमहं वन्दे परमानन्दमाधवम्॥
    - commentary: |
      (माधव स्तुति — गुरु गीता / कृष्ण स्तोत्र) जिनकी कृपा से मूक वाणी वाला हो जाता है और पंगु पर्वत भी लांघ जाता है, उस परमानंद माधव (कृष्ण) को मैं वंदता हूँ।
    - |
      ॐ कृष्णाय वासुदेवाय हरये परमात्मने।
      प्रणतः क्लेशनाशाय गोविन्दाय नमो नमः॥
    - commentary: |
      (गोविन्द मंत्र — विष्णु पुराण १.१९) कृष्ण, वासुदेव, हरि, परमात्मा, क्लेश नाश करने वाले गोविन्द को बार-बार नमस्कार।
