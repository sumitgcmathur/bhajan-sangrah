title: ऋग्वेद
group: वेद और गीता
lyrics:
  sthayi_connect: false
  pre_shlok: |
    ऋग्वेद चारों वेदों में सबसे प्राचीन माना जाता है। इसमें दस मंडल, करीब एक हज़ार सूक्त और साढ़े दस हज़ार ऋचाएँ हैं। ऋषियों ने अग्नि, इन्द्र, वरुण, सूर्य, उषा, सरस्वती (वाक्) आदि देवताओं की स्तुति में ये मंत्र रचे; इनसे भारतीय संस्कृति, यज्ञ-परंपरा और दार्शनिक चिंतन की नींव पड़ी।

    ऋग्वेद में सृष्टि, पुरुष की महिमा, सामाजिक व्यवस्था और आध्यात्मिक साधना के गहन विचार मिलते हैं। गायत्री, पुरुष सूक्त, नासदीय सूक्त और गणपति सूक्त जैसे मंत्र आज भी पूजा, अध्ययन और ध्यान में प्रयुक्त होते हैं।

    नीचे ऋग्वेद के दस सर्वाधिक प्रचलित मंत्र दिए गए हैं — प्रत्येक के साथ स्रोत और हिंदी में अर्थ।
  paragraphs:
    - |
      ॐ भूर्भुवः स्वः
      तत्सवितुर्वरेण्यं
      भर्गो देवस्य धीमहि
      धियो यो नः प्रचोदयात्॥
    - commentary: |
      (सावितृ गायत्री — ऋग्वेद ३.६२.१०) हम उस प्राणस्वरूप, दुःखों का नाश करने वाले, सुखस्वरूप, श्रेष्ठ, तेजस्वी, पापों से रहित, देवस्वरूप परमात्मा (सविता) का ध्यान करते हैं। वह हमारी बुद्धि को सन्मार्ग की ओर प्रेरित करे।
    - |
      अग्निमीळे पुरोहितं यज्ञस्य देवं ऋत्विजम्।
      होतारं रत्नधातमम्॥
    - commentary: |
      (अग्नि सूक्त — ऋग्वेद १.१.१) मैं अग्नि की स्तुति करता हूँ — यज्ञ के पुरोहित, देव, ऋत्विज, होता और रत्नों के धाता अग्नि की। ऋग्वेद का प्रथम मंत्र।
    - |
      सहस्रशीर्षा पुरुषः सहस्राक्षः सहस्रपात्।
      स भूमिं विश्वतो वृत्वा अत्यतिष्ठद्दशाङ्गुलम्॥
    - commentary: |
      (पुरुष सूक्त — ऋग्वेद १०.९०.१) सहस्र शीर्ष, सहस्र नेत्र और सहस्र पाद वाले पुरुष ने समस्त पृथ्वी को व्याप्त कर अंगूठे के बराबर ऊपर स्थित हैं — यह ब्रह्मांडीय पुरुष की महिमा का वर्णन है।
    - |
      नासदासीन्नो सदासीत्तदानीं नासीद्रजो नो व्योमा परो यत्।
      किमावरीवः कुह कस्य शर्मन्नम्भः किमासीद्गहनं गभीरम्॥
    - commentary: |
      (नासदीय सूक्त — ऋग्वेद १०.१२९.१) उस समय न असत् था न सत्; न रजस (मूल पदार्थ) था, न आकाश। तब क्या था? कहाँ? किसका आश्रय? क्या जल गहन था? — सृष्टि-पूर्व अवस्था का दार्शनिक प्रश्न।
    - |
      हिरण्यगर्भः समवर्तताग्रे भूतस्य जातः पतिरेक आसीत्।
      स दाधार पृथिवीं द्यामुतेमां कस्मै देवाय हविषा विधेम॥
    - commentary: |
      (हिरण्यगर्भ सूक्त — ऋग्वेद १०.१२१.१) प्रारंभ में हिरण्यगर्भ (सुवर्ण गर्भ) उत्पन्न हुआ; वह समस्त भूतों के स्वामी एकमात्र था। उसने पृथ्वी और आकाश धारण किए — उस देव को हविष से हम पूजें।
    - |
      गणानां त्वा गणपतिं हवामहे
      कविं कवीनामुपमश्रवस्तमम्।
      ज्येष्ठराजं ब्रह्मणां ब्रह्मणस्पत
      आ नः शृण्वन्नूतिभिः सीद सादनम्॥
    - commentary: |
      (गणपति सूक्त — ऋग्वेद २.२३.१) हे गणों के अधिपति गणपति! हम आपको आवाहन करते हैं — कवियों में श्रेष्ठ, ज्येष्ठ राजा, ब्रह्मणस्पति; हमारी स्तुति सुनकर आसन पर विराजें।
    - |
      विश्वानि देव सवितर्दुरितानि परा सुव।
      यद्भद्रं तन्न आ सुव॥
    - commentary: |
      (सविता प्रार्थना — ऋग्वेद १.८९.१) हे देव सवित! हमारी समस्त दु:खताओं को दूर करो और जो कल्याणकारी है वही हमें प्रदान करो।
    - |
      उदु त्यं जातं देवस्य श्रवसो मन्यमानः।
      उत सूर्यस्य संदृशि॥
    - commentary: |
      (उषा सूक्त — ऋग्वेद १.९२.१) देव की महिमा से उत्पन्न उषा (प्रभात) को और सूर्य के दर्शन को हम स्मरण करते हैं — प्रकाश और नवजीवन का मंगल मंत्र।
    - |
      अहं रुद्रेभिर्वसुभिश्चरामि
      अहमादित्यैरुत विश्वदेवैः।
      अहं मित्रावरुणोभा बिभर्मि
      अहमिन्द्राग्नी अहमश्विनोभा॥
    - commentary: |
      (देवी वाक् सूक्त — ऋग्वेद १०.१२५.१) मैं रुद्रों और वसुओं के साथ विचरती हूँ, आदित्यों और विश्वदेवों के साथ; मैं मित्र-वरुण, इन्द्राग्नी और अश्विनी को धारण करती हूँ — वाक् (वाणी/सरस्वती) की महिमा।
    - |
      ॐ आ नो भद्राः क्रतवो यन्तु विश्वतः।
      अदब्धासो अपरीतास उद्भिदः।
      देवा नो यथा सदमिद्वृधे असन्
      ऋतस्य योग आ न वयं दधात॥
    - commentary: |
      (मंगल प्रार्थना — ऋग्वेद १.८९.१, सूक्तान्त) चारों दिशाओं से कल्याणकारी कर्म हमारे पास आएँ; देव हमारे वृद्धि के लिए सदा सहायक हों — ऋत (सत्य/धर्म) के योग में हमें स्थापित करें।
