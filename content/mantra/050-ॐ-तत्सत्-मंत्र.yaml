title: ॐ तत्सत् मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      भगवद्गीता १७.२३–२७
  paragraphs:
    - |
      ॐ तत्सदिति निर्देशो ब्रह्मणस्त्रिविधः स्मृतः।
      ब्राह्मणास्तेन वेदाश्च यज्ञाश्च विहिताः पुरा॥
      यज्ञे तपसि दाने च स्थितिः सदिति चोच्यते।
      कर्म चैव तदर्थीयं सदित्येवाभिधीयते॥
    - commentary: |
      ॐ, तत्, सत् — ये तीन ब्रह्म के नाम हैं; वेद और यज्ञ इन्हीं से विहित हैं। यज्ञ, तप और दान में 'सत्' कहा जाता है; उसी के लिए किया गया कर्म भी 'सत्' है।
