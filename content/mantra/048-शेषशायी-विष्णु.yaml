title: शेषशायी विष्णु
lyrics:
  sthayi_connect: false
  pre_shlok: |
      विष्णु स्तुति
  paragraphs:
    - |
      शेषशायी गरुडस्थं पद्मनाभं सुरेश्वरम्।
      विष्णुं चन्द्रागतं वन्दे सर्वलोकमहेश्वरम्॥
    - commentary: |
      शेषशायी, गरुड पर विराजमान, पद्मनाभ, देवों के स्वामी, चंद्रमा के समान तेज वाले सर्वलोक महेश्वर विष्णु को वंदता हूँ।
