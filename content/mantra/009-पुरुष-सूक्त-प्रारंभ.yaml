title: पुरुष सूक्त प्रारंभ
lyrics:
  sthayi_connect: false
  pre_shlok: |
      ऋग्वेद १०.९०.१
  paragraphs:
    - |
      सहस्रशीर्षा पुरुषः सहस्राक्षः सहस्रपात्।
      स भूमिं विश्वतो वृत्वा अत्यतिष्ठद्दशाङ्गुलम्॥
    - commentary: |
      सहस्र शिर वाले, सहस्र नेत्र और सहस्र चरण वाले पुरुष ने सारी पृथ्वी को व्याप्त करके दस अंगुल ऊपर तक विराजमान हैं।
