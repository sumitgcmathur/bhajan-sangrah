title: सामवेद
group: वेद और गीता
lyrics:
  sthayi_connect: false
  pre_shlok: |
    सामवेद वेदों में संगीत और गान का वेद है। इसकी अधिकांश ऋचाएँ ऋग्वेद से ली गई हैं, परंतु इन्हें विशेष स्वर (उदात्त, अनुदात्त, स्वरित) और गान-शैली (गन्धर्व) में पढ़ा जाता है। सामगान यज्ञ में सोम-पात्र के समय और उपासना में केंद्रीय है।

    सामवेद में उषा, अग्नि, सोम, इन्द्र और सविता की स्तुतियाँ गायी जाती हैं। भगवान कृष्ण ने गीता में «वेदानां सामवेदोऽस्मि» कहकर इसकी श्रेष्ठता बताई है। साम का गान मन को शांत कर ध्यान और भक्ति में सहायक माना जाता है।

    नीचे सामवेद से संबंधित दस प्रमुख मंत्र — स्रोत और अर्थ सहित।
  paragraphs:
    - |
      ॐ भूर्भुवः स्वः
      तत्सवितुर्वरेण्यं
      भर्गो देवस्य धीमहि
      धियो यो नः प्रचोदयात्॥
    - commentary: |
      (गायत्री साम — सामवेद, गान-रूप) सविता देव की गायत्री सामवेद में विशेष स्वरों में गाई जाती है — बुद्धि को प्रकाश की ओर प्रेरित करने का मंगल मंत्र।
    - |
      अग्निमीळे पुरोहितं यज्ञस्य देवं ऋत्विजम्।
      होतारं रत्नधातमम्॥
    - commentary: |
      (अग्नि साम — सामवेद, ऋग्वेद १.१.१ का गान) यज्ञ के देव अग्नि की स्तुति — सामगान में अग्नि को आह्वान और प्रसन्न करने का प्रथम मंत्र।
    - |
      इन्द्रं मित्रं वरुणमग्निमाहुः
      अथो दिव्यः स सुपर्णो गरुत्मान्।
      एकं सद् विप्रा बहुधा वदन्ति
      अग्निं यमं मातरिश्वानमाहुः॥
    - commentary: |
      (एकं सत् — सामवेद, ऋग्वेद १.१६४.४६ का गान) विद्वान् एक ही सत्य को अनेक नामों से कहते हैं — इन्द्र, मित्र, वरुण, अग्नि, यम, मातरिश्वा; एक परम सत्ता की अनेक अभिव्यक्ति।
    - |
      उद्वयं तमसस्परि स्वः पश्यन्त उत्तरम्।
      देवं देवत्रा सूर्यमगन्म ज्योतिरुत्तमम्॥
    - commentary: |
      (सूर्य साम — सामवेद, ऋग्वेद १.५०.५) अंधकार के ऊपर उठकर हमने परम ज्योति — देवों में देव सूर्य को देखा; प्रकाश और ज्ञान की प्राप्ति का मंत्र।
    - |
      पवमानः सोमः अमृतं जनयति
      देवानां पवित्रमिदं सोमः॥
    - commentary: |
      (सोम साम — सामवेद, सोमयाग) पवित्र होते हुए सोम अमृत उत्पन्न करता है — देवताओं का पवित्र सोम; यज्ञ में सोम-पात्र के समय गाया जाने वाला प्रसिद्ध साम।
    - |
      ॐ आपो ज्योती रसोऽमृतं ब्रह्म
      भूर्भुवः स्वरोम्॥
    - commentary: |
      (महावाक्य साम — सामवेद, उपनिषद् संबंध) जल, ज्योति, रस, अमृत और ब्रह्म — भूः, भुवः, स्वः, ॐ; सामवेदीय उपासना में ब्रह्म-साक्षात्कार का संक्षिप्त मंत्र।
    - |
      ॐ असतो मा सद्गमय
      तमसो मा ज्योतिर्गमय
      मृत्योर्मामृतं गमय॥
    - commentary: |
      (शांति साम — सामवेद गान-परंपरा) असत्य से सत्य, अंधकार से प्रकाश, मृत्यु से अमरत्व — सामगान के अंत में शांति और मोक्ष की प्रार्थना।
    - |
      ॐ सह नाववतु सह नौ भुनक्तु
      सह वीर्यं करवावहै
      तेजस्वि नावधीतमस्तु
      मा विद्विषावहै॥
    - commentary: |
      (शिक्षा साम — सामवेद, तैत्तिरीय) साथ रहें, साथ भोजन करें, साथ शक्ति पाएँ; अध्ययन तेजस्वी हो, द्वेष न हो — विद्यारंभ का मंगल मंत्र।
    - |
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      (त्रैकालिक शांति — सामवेद गान-परंपरा) आध्यात्मिक, भौतिक और दैवीय — तीनों स्तरों पर शांति की प्रार्थना; सामगान के समापन का सर्वाधिक प्रचलित मंत्र।
    - |
      ॐ इष्टं मनसा वाचा च
      यज्ञं देवेषु यजामहे
      सामानि गायन्तु नः सुता
      देवा भवत वाजिनः॥
    - commentary: |
      (यज्ञ साम — सामवेद परंपरा) मन और वाणी से यज्ञ करें; देव हमारे लिए साम गाएँ — देवता वीर (वाजिन) बनें; सामवेद के यज्ञ-गान का सार मंत्र।
