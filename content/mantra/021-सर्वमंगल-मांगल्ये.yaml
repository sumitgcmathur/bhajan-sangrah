title: सर्वमंगल मांगल्ये
lyrics:
  sthayi_connect: false
  pre_shlok: |
      दुर्गा सप्तशती
  paragraphs:
    - |
      सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके।
      शरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते॥
    - commentary: |
      हे सर्व मंगलों में मंगलमय, शिवस्वरूपिणी, सभी कार्यों की सिद्धि करने वाली, शरण देने योग्य, तीन नेत्रों वाली गौरी नारायणि! तुम्हें नमस्कार।
