title: लक्ष्मी गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      लक्ष्मी उपासना
  paragraphs:
    - |
      ॐ महादेव्यै विद्महे विष्णुपत्न्यै धीमहि।
      तन्नो लक्ष्मीः प्रचोदयात्॥
    - commentary: |
      हम महादेवी को जानते हैं, विष्णुपत्नी का ध्यान करते हैं; वह लक्ष्मी हमारी बुद्धि को प्रेरित करें।
