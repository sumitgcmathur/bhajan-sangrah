title: महामृत्युंजय मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      यजुर्वेद
  paragraphs:
    - |
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्।
      उर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय माऽमृतात्॥
    - commentary: |
      हम तीन नेत्रों वाले, सुगंधित और जीवन की पुष्टि करने वाले शिव की उपासना करते हैं। जैसे कटा हुआ ककड़ी पेड़ से अलग हो जाता है, वैसे ही हम मृत्यु के बंधन से मुक्त होकर अमरत्व को प्राप्त हों।
