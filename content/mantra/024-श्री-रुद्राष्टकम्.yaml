title: श्री रुद्राष्टकम्
group: संस्कृत स्तोत्र
also_in:
  - shiv
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      नमामीशमीशान निर्वाणरूपं, 
      विभुं व्यापकं ब्रह्मवेदस्वरूपम्,
      निजं निर्गुणं निर्विकल्पं निरीहं, चिदाकाशमाकाशवासं भजेऽहम्।
    - commentary: |
      मैं मोक्षस्वरूप, सर्वव्यापक, ब्रह्म और वेदस्वरूप, ईशान (समस्त दिशाओं के ईश्वर) और सबके स्वामी को नमस्कार करता हूँ। जो अपने वास्तविक स्वरूप में स्थित (मायादि से रहित), गुणों से परे, भेदरहित, इच्छारहित, ज्ञानस्वरूप और आकाश के समान सर्वत्र व्याप्त हैं, उन दिगंबर शिव को मैं भजता हूँ।
    - |
      निराकारमोंकारमूलं तुरीयं, 
      गिरा ज्ञान गोतीतमीशं गिरीशम्,
      करालं महाकाल कालं कृपालं, 
      गुणागार संसारपारं नतोऽहम्।
    - commentary: |
      जो निराकार, ओंकार (प्रणव) के मूल, तीनों गुणों से अतीत (तुरीय), वाणी, ज्ञान और इंद्रियों से परे, कैलाशपति और महाकाल के भी काल (महामृत्युंजय) हैं; उन कराल (प्रलयंकारी), कृपालु, गुणों के धाम और संसार रूपी सागर से पार लगाने वाले परमेश्वर को मैं प्रणाम करता हूँ।
    - |
      तुषाराद्रि संकाश गौरं गभीरं, 
      मनोभूत कोटिप्रभा श्री शरीरम्,
      स्फुरन्मौलि कल्लोलिनी चारु गङ्गा, 
      लसद्भालबालेन्दु कण्ठे भुजङ्गा।
    - commentary: |
      जो हिमालय के समान श्वेत वर्ण और गंभीर हैं, जिनके शरीर में करोड़ों कामदेवों की कांति है। जिनके सिर पर लहराती हुई गंगाजी सुशोभित हैं, जिनके मस्तक पर द्वितीया का बाल-चंद्रमा और गले में सर्प सुशोभित हैं।
    - |
      चलत्कुण्डलं भ्रू सुनेत्रं विशालं, 
      प्रसन्नाननं नीलकण्ठं दयालम्,
      मृगाधीशचर्माम्बरं मुण्डमालं, 
      प्रियं शंकरं सर्वनाथं भजामि।
    - commentary: |
      जिनके कानों में कुंडल हिल रहे हैं, भौंहें सुंदर हैं, नेत्र विशाल हैं, मुख प्रसन्नता से परिपूर्ण है, जिनका कंठ नीला है और जो दयालु हैं। जो बाघ की खाल पहने हुए हैं और मुंडों की माला धारण किए हुए हैं, उन सबके प्यारे और सबके स्वामी श्री शंकर जी को मैं भजता हूँ।
    - |
      प्रचण्डं प्रकृष्टं प्रगल्भं परेशं, 
      अखण्डं अजं भानुकोटिप्रकाशम्,
      त्रयः शूल निर्मूलनं शूलपाणिं, 
      भजेऽहं भवानीपतिं भावगम्यम्।
    - commentary: |
      जो प्रचंड, उत्कृष्ट, प्रगल्भ (तेजस्वी) और परमेश्वर हैं। जो अखंड, अजन्मे और करोड़ों सूर्यों के समान प्रकाशमान हैं। जो तीनों प्रकार के तापों (शूलों) का नाश करने वाले, हाथ में त्रिशूल धारण करने वाले, भाव (भक्ति) के द्वारा प्राप्त होने वाले और भवानी (पार्वती) के पति हैं, उन शिव का मैं भजन करता हूँ।
    - |
      कलातीत कल्याण कल्पान्तकारी, 
      सदा सज्जनानन्ददाता पुरारी,
      चिदानन्द संदोह मोहापहारी, 
      प्रसीद प्रसीद प्रभो मन्मथारी।
    - commentary: |
      जो कलाओं से परे, कल्याणस्वरूप और कल्प के अंत (प्रलय) करने वाले हैं। जो सदा सज्जनों को आनंद देने वाले और त्रिपुरासुर का वध करने वाले हैं। जो ज्ञान-आनंद के समूह और मोह का नाश करने वाले हैं, हे कामदेव के शत्रु (शिव)! मुझ पर प्रसन्न हों, प्रसन्न हों।
    - |
      न यावत् उमानाथ पादारविन्दं, 
      भजन्तीह लोके परे वा नराणाम्,
      न तावत् सुखं शान्ति सन्तापनाशं, 
      प्रसीद प्रभो सर्वभूताधिवासम्।
    - commentary: |
      हे उमानाथ! जब तक मनुष्य इस लोक या परलोक में आपके चरणकमलों को नहीं भजते हैं, तब तक उन्हें न तो सुख-शांति मिलती है और न ही उनके संताप (दुःख) मिटते हैं। हे समस्त प्राणियों के हृदय में निवास करने वाले प्रभो! मुझ पर प्रसन्न हों।
    - |
      न जानामि योगं जपं नैव पूजां, 
      नतोऽहं सदा सर्वदा शम्भु तुभ्यम्,
      जरा जन्म दुःखौघ तातप्यमानं, 
      प्रभो पाहि आपन्नमामीश शम्भो।
    - commentary: |
      भगवान शिव को संतुष्ट करने के लिए ब्राह्मण (गोस्वामी तुलसीदास) द्वारा यह रुद्राष्टक स्तोत्र कहा गया है। जो मनुष्य इसे भक्ति के साथ पढ़ते हैं, उन पर शंभु (भगवान शिव) अवश्य प्रसन्न होते हैं।
  post_shlok: |
    रुद्राष्टकमिदं प्रोक्तं विप्रेण हरतोषये, 
    ये पठन्ति नरा भक्त्या तेषां शम्भुः प्रसीदति॥
    
    इति श्रीगोस्वामितुलसीदासकृतं श्रीरुद्राष्टकं संपूर्णम्॥
