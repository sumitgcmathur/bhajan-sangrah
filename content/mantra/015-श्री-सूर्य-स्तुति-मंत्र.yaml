title: श्री सूर्य स्तुति मंत्र
group: स्तुति मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      जपाकुसुमसंकाशं काश्यपेयं महाद्युतिम्।
      तमोरिं सर्वपापघ्नं प्रणतोऽस्मि दिवाकरम्॥
    - commentary: |
      (सूर्याष्टक — सूर्य स्तोत्र, पारंपरिक) जपा पुष्प के समान संकाश, कश्यप-पुत्र, महातेजस्वी, अंधकार के शत्रु और सर्व पाप नाशक दिवाकर (सूर्य) को मैं नमस्कार करता हूँ।
    - |
      ॐ भास्कराय विद्महे
      महादुत्याय धीमहि
      तन्नः सूर्यः प्रचोदयात्॥
    - commentary: |
      (सूर्य गायत्री — पारंपरिक) हम भास्कर को जानें, महातेजस्वी का ध्यान करें; वह सूर्य हमारी बुद्धि को प्रेरित करें।
    - |
      आदित्यहृदयं पुण्यं सर्वशत्रुविनाशनम्।
      जयावहं जपेन्नित्यं अक्षय्यं परमं शिवम्॥
    - commentary: |
      (आदित्य हृदय — रामायण, युद्धकाण्ड १०६) आदित्य हृदय पुण्य, सब शत्रुओं का नाश करने वाला, जय दिलाने वाला, अक्षय और परम शिव स्वरूप — इसका नित्य जप करें।
    - |
      यानि कानि च पापानि जन्मान्तरकृतानि च।
      तानि तानि विनश्यन्ति प्रदक्षिणं पदे पदे॥
    - commentary: |
      (सूर्य प्रदक्षिणा — आदित्यहृदय स्तोत्र) जन्म-जन्मांतर के जितने भी पाप हैं, वे सूर्य प्रदक्षिणा के प्रत्येक कदम पर नष्ट हो जाते हैं।
    - |
      आदित्यस्य नमस्कारान् ये कुर्वन्ति दिने दिने।
      जन्मान्तरसहस्रेषु दारिद्र्यं नोपजायते॥
      न च व्याधि शोक दुःखं न च मानापमानम्।
      तस्य नश्यन्ति सर्वशः॥
    - commentary: |
      (आदित्यहृदय — फलश्लोक, रामायण) जो प्रतिदिन सूर्य को नमस्कार करते हैं, उन्हें दारिद्र्य, रोग, शोक, दुःख, अपमान नहीं होता — उनके सब कष्ट नष्ट हो जाते हैं।
