title: दुर्गे स्मृता
lyrics:
  sthayi_connect: false
  pre_shlok: |
      दुर्गा सप्तशती
  paragraphs:
    - |
      दुर्गे स्मृता हरसि भीतिमशेषजन्तोः
      स्वस्थैः स्मृता मति मतिभुवः शुभां ददासि॥
      दैन्यैः स्मृता हृदयगे भवद्भावना
      ततः सर्वदुःखहरा सततं प्रसीद॥
    - commentary: |
      हे दुर्गे! स्मरण करने पर तुम सब भय हर लेती हो; स्वस्थ मन से स्मरण करने पर शुभ बुद्धि देती हो; दीन हृदय में भक्ति जगाकर सब दुःख दूर करती हो — सदा प्रसन्न रहो।
