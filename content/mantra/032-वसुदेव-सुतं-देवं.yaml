title: वसुदेव सुतं देवं
lyrics:
  sthayi_connect: false
  pre_shlok: |
      कृष्ण स्तोत्र
  paragraphs:
    - |
      वसुदेवसुतं देवं कंसचाणूरमर्दनम्।
      देवकी परमानन्दं कृष्णं वन्दे जगद्गुरुम्॥
    - commentary: |
      वसुदेव-पुत्र, कंस और चाणूर के वध करने वाले, देवकी के परमानंद और जगत के गुरु कृष्ण को मैं वंदता हूँ।
