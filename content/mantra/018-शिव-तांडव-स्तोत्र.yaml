title: शिव तांडव स्तोत्र
group: संस्कृत स्तोत्र
also_in:
  - shiv
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      जटाटवीगलज्जलप्रवाहपावितस्थले,
      गलेऽवलम्ब्य लम्बितां भुजङ्गतुङ्गमालिकाम्।
      डमड्डमड्डमड्डमन्निनादवड्डमर्वयं,
      चकार चण्डताण्डवं तनोतु नः शिवः शिवम्॥
    - commentary: |
      जिन शिव जी की सघन, वनरूपी जटा से प्रवाहित होती गंगा की धाराएँ उनके कंठ को पवित्र करती हैं, जिनके गले में बड़े एवं लम्बे सर्पों की मालाएँ लटक रही हैं, तथा जो डम-डम डमरू बजाकर प्रचण्ड ताण्डव करते हैं, वे शिव जी हमारा कल्याण करें।
    - |
      जटाकटाहसम्भ्रमभ्रमन्निलिम्पनिर्झरी,
      विलोलवीचिवल्लरीविराजमानमूर्धनि।
      धगद्धगद्धगज्ज्वलल्ललाटपट्टपावके,
      किशोरचन्द्रशेखरे रतिः प्रतिक्षणं मम॥
    - commentary: |
      जिन शिव जी की जटाओं में अतिवेग से विलासपूर्वक भ्रमण कर रही देवी गंगा की लहरें उनके शीश पर लहरा रही हैं, जिनके मस्तक पर अग्नि की प्रचण्ड ज्वालाएँ धधक-धधक करके प्रज्वलित हो रही हैं, उन बालचन्द्रमा से विभूषित शिव जी में मेरा अनुराग प्रतिक्षण बढ़ता रहे।
    - |
      धराधरेन्द्रनन्दिनीविलासबन्धुबन्धुर,
      स्फुरद्दिगन्तसन्ततिप्रमोदमानमानसे।
      कृपाकटाक्षधोरणीनिरुद्धदुर्धरापदि,
      क्वचिद्दिगम्बरे मनो विनोदमेतु वस्तुनि॥
    - commentary: |
      जो पर्वतराज की पुत्री (पार्वती जी) के विलासमय रमणीय कटाक्षों में परम आनन्दित चित्त रहते हैं, जिनके मस्तक में सम्पूर्ण सृष्टि एवं प्राणीगण वास करते हैं, तथा जिनकी कृपादृष्टि मात्र से भक्तों की समस्त विपत्तियाँ दूर हो जाती हैं, ऐसे दिगम्बर शिव जी की आराधना से मेरा चित्त सर्वदा आनन्दित रहे।
    - |
      जटाभुजङ्गपिङ्गलस्फुरत्फणामणिप्रभा,
      कदम्बकुङ्कुमद्रवप्रलिप्तदिग्वधूमुखे।
      मदान्धसिन्धुरस्फुरत्त्वगुत्तरीयमेदुरे,
      मनो विनोदमद्भुतं बिभर्तु भूतभर्तरि॥
    - commentary: |
      मैं उन शिव जी की भक्ति में आनन्दित रहूँ जो सभी प्राणियों के आधार एवं रक्षक हैं, जिनकी जटाओं में लिपटे सर्पों के फण की मणियों का प्रकाश केसर की कान्ति से दिशाओं को प्रकाशित करता है और जो गजचर्म से विभूषित हैं।
    - |
      सहस्रलोचनप्रभृत्यशेषलेखशेखर,
      प्रसूनधूलिधोरणीविधूसराङ्घ्रिपीठभूः।
      भुजङ्गराजमालया निबद्धजाटजूटक,
      श्रियै चिराय जायतां चकोरबन्धुशेखरः॥
    - commentary: |
      जिन शिव जी के चरण इन्द्र-विष्णु आदि देवताओं के मस्तक के पुष्पों की धूल से रंजित हैं, जिनकी जटाओं में सर्पराज विराजमान है, वे चन्द्रशेखर हमें चिरकाल के लिए सम्पदा दें।
    - |
      ललाटचत्वरज्वलद्धनञ्जयस्फुलिङ्गभा,
      निपीतपञ्चसायकं नमन्निलिम्पनायकम्।
      सुधामयूखलेखया विराजमानशेखरं,
      महाकपालिसम्पदे शिरोजटालमस्तु नः॥
    - commentary: |
      जिन शिव जी ने इन्द्रादि देवताओं का गर्व दहन करते हुए कामदेव को अपने मस्तक की अग्निज्वाला से भस्म कर दिया, तथा जो सभी देवों द्वारा पूज्य हैं और चन्द्रमा तथा गंगा द्वारा सुशोभित हैं, वे मुझे सिद्धि प्रदान करें।
    - |
      करालभालपट्टिकाधगद्धगद्धगज्ज्वल,
      द्धनञ्जयाहुतीकृतप्रचण्डपञ्चसायके।
      धराधरेन्द्रनन्दिनीकुचाग्रचित्रपत्रक,
      प्रकल्पनैकशिल्पिनि त्रिलोचने रतिर्मम॥
    - commentary: |
      जिनके मस्तक से धक-धक करती प्रचण्ड ज्वाला ने कामदेव को भस्म कर दिया तथा जो पार्वती जी के स्तन के अग्रभाग पर चित्रकारी करने में अति चतुर हैं, उन त्रिलोचन शिव जी में मेरी प्रीति अटल हो।
    - |
      नवीनमेघमण्डली निरुद्धदुर्धरस्फुरत्,
      कुहूनिशीथिनीतमः प्रबन्धबद्धकन्धरः।
      निलिम्पनिर्झरीधरस्तनोतु कृत्तिसिन्धुरः,
      कलानिधानबन्धुरः श्रियं जगद्धुरंधरः॥
    - commentary: |
      जिनका कण्ठ नवीन मेघों की घटाओं से परिपूर्ण अमावस्या की रात्रि के समान काला है, जो गजचर्म, गंगा एवं बालचन्द्र द्वारा शोभायमान हैं तथा जो जगत का बोझ धारण करने वाले हैं, वे शिव जी हमें सभी प्रकार की सम्पन्नता प्रदान करें।
    - |
      प्रफुल्लनीलपङ्कजप्रपञ्चकालिमप्रभा,
      वलम्बिकण्ठकन्दलीरुचिप्रबद्धकन्धरम्।
      स्मरच्छिदं पुरच्छिदं भवच्छिदं मखच्छिदं,
      गजच्छिदान्धकच्छिदं तमन्तकच्छिदं भजे॥
    - commentary: |
      जिनका कण्ठ और कन्धा नीलकमल की श्याम प्रभा से विभूषित है, जो कामदेव, त्रिपुरासुर, संसार के दुःख, दक्षयज्ञ, गजासुर, अन्धकासुर के विनाशक हैं तथा जो मृत्यु को वश में करने वाले हैं, मैं उन शिव जी को भजता हूँ।
    - |
      अगर्वसर्वमङ्गलाकलाकदम्बमञ्जरी,
      रसप्रवाहमाधुरीविजृम्भणामधुव्रतम्।
      स्मरान्तकं पुरान्तकं भवान्तकं मखान्तकं,
      गजान्तकान्धकान्तकं तमन्तकान्तकं भजे॥
    - commentary: |
      जो कल्याणमय, अविनाशी, समस्त कलाओं के रस का आस्वादन करने वाले हैं, जो कामदेव, त्रिपुर, संसार, यज्ञ, गजासुर, अन्धक तथा यम के भी अंत करने वाले हैं, मैं उन शिव जी को भजता हूँ।
    - |
      जयत्वदभ्रविभ्रमभ्रमद्भुजङ्गमश्व,
      सद्विनिर्गमत्क्रमस्फुरत्करालभालहव्यवाट्।
      धिमिद्धिमिद्धिमिध्वनन्मृदङ्गतुङ्गमङ्गल,
      ध्वनिक्रमप्रवर्तित प्रचण्डताण्डवः शिवः॥
    - commentary: |
      अत्यंत वेग से भ्रमण कर रहे सर्पों के फूँफकार से ललाट की प्रचण्ड अग्नि के मध्य मृदंग की मंगलकारी धिम-धिम ध्वनि के साथ ताण्डव नृत्य में लीन शिव जी सर्वप्रकार सुशोभित हों।
    - |
      दृषद्विचित्रतल्पयोर्भुजङ्गमौक्तिकस्रजोर्गरिष्ठरत्नलोष्ठयोः,
      सुहृद्विपक्षपक्षयोः,
      तृणारविन्दचक्षुषोः प्रजामहीमहेन्द्रयोः,
      समं प्रवर्तयन्मनः कदा सदाशिवं भजे॥
    - commentary: |
      कठोर पत्थर एवं कोमल शय्या, सर्प एवं मोतियों की माला, बहुमूल्य रत्न एवं मिट्टी, शत्रु एवं मित्र, तृण एवं कमल, प्रजा एवं महाराज — सब पर समान दृष्टि रखने वाले सदाशिव को मैं कब भजूँ?
    - |
      कदा निलिम्पनिर्झरीनिकुञ्जकोटरे वसन्,
      विमुक्तदुर्मतिः सदा शिरःस्थमञ्जलिं वहन्।
      विमुक्तलोललोचनो ललामभाललग्नकः,
      शिवेति मन्त्रमुच्चरन् कदा सुखी भवाम्यहम्॥
    - commentary: |
      कब मैं गंगा जी के कुञ्ज की कोटर में निवास करता हुआ, दुर्मति से मुक्त, सिर पर अंजलि धारण कर, चंचल नेत्रों से मुक्त, ललाट पर तिलक लगाए, ‘शिव’ मंत्र का उच्चारण करते हुए अक्षय सुख को प्राप्त करूँगा?
    - |
      निलिम्पनाथनागरीकदम्बमौलमल्लिका,
      निगुम्फनिर्भरक्षरन्मधूष्णिकामनोहरः।
      तनोतु नो मनोमुदं विनोदिनीमहर्निशं,
      परं पदं तदङ्गजत्विषां चयः॥
    - commentary: |
      देवांगनाओं के सिर में गुंथे पुष्पों की मालाओं से झरती सुगंधमय धारा से मनोहर, परम शोभा के धाम महादेव जी की अंगों की सुंदरता हमारे मन की प्रसन्नता सर्वदा बढ़ाती रहे।
    - |
      प्रचण्डवाडवानलप्रभाशुभप्रचारणी,
      महाष्टसिद्धिकामिनीजनावहूतजल्पना।
      विमुक्तवामलोचनो विवाहकालिकध्वनिः,
      शिवेति मन्त्रभूषणा जगज्जयाय जायताम्॥
    - commentary: |
      प्रचण्ड अग्नि की प्रभा से शुभ प्रचारण करने वाली, अष्टसिद्धि की कामना करने वाली देवियों के आह्वान से ‘शिव’ मंत्रध्वनि से विभूषित शिव जी जगत् की विजय के लिए सदा विजयी रहें।
    - |
      इदमहि नित्यमेवमुक्तमुत्तमोत्तमं,
      स्तवं पठन् स्मरन्ब्रुवन्नरो विशुद्धिमेति संततम्।
      हरे गुरौ सुभक्तिमाशु याति नान्यथा गतिं,
      विमोहनं हि देहिनां सुशङ्करस्य चिन्तनम्॥
    - commentary: |
      इस उत्तमोत्तम शिव ताण्डव स्तोत्र को नित्य पढ़ने या श्रवण करने मात्र से प्राणी पवित्र हो जाता है, परमगुरु शिव में स्थापित होता है तथा सभी प्रकार के भ्रमों से मुक्त हो जाता है।
  post_shlok: |
    पूजावसानसमये दशवक्त्रगीतं,
    यः शम्भुपूजनपरं पठति प्रदोषे।
    तस्य स्थिरां रथगजेन्द्रतुरङ्गयुक्तां,
    लक्ष्मीं सदैव सुमुखिं प्रददाति शम्भुः॥

    इति श्रीरावणविरचितं शिवताण्डवस्तोत्रं सम्पूर्णम्॥
