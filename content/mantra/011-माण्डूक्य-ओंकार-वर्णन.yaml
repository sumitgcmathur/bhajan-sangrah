title: माण्डूक्य ओंकार वर्णन
lyrics:
  sthayi_connect: false
  pre_shlok: |
      माण्डूक्योपनिषद् १
  paragraphs:
    - |
      ॐ इत्येतदक्षरमिदं सर्वं
      तस्योपव्याख्यानं भूतं भवद्भविष्यदिति सर्वमोङ्कार एव।
      यच्चान्यत् त्रिकालातीतं तदप्योङ्कार एव॥
    - commentary: |
      ॐ यह अक्षर ही सब कुछ है — अतीत, वर्तमान और भविष्य सब ॐ ही है; त्रिकालातीत जो कुछ भी है, वह भी ॐ ही है।
