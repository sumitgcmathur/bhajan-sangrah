title: अथर्ववेद
group: वेद और गीता
lyrics:
  sthayi_connect: false
  pre_shlok: |
    अथर्ववेद चारों वेदों में सबसे विविध है — इसमें औषध, रोग-निवारण, गृह्य कर्म, राज्य-रक्षा, प्रेम, शांति और देवी-उपासना के मंत्र मिलते हैं। अथर्ववेद में अग्नि, इन्द्र, सूर्य, वरुण के साथ-साथ भूमि, प्राण, औषधि और देवी (दुर्गा/रुद्राणी) की स्तुति प्रमुख है।

    गणपत्यथर्वशीर्ष, देवी अथर्वशीर्ष, भूमि सूक्त और शिरशा सूक्त जैसे मंत्र आज के पूजन में अत्यंत लोकप्रिय हैं। अथर्ववेद जीवन की व्यावहारिक और आध्यात्मिक दोनों आवश्यकताओं को संबोधित करता है।

    नीचे अथर्ववेद के दस प्रमुख मंत्र — स्रोत और अर्थ सहित।
  paragraphs:
    - |
      ॐ नमस्ते गणपतये
      त्वमेव प्रत्यक्षं ब्रह्मासि।
      त्वमेव केवलं कर्तासि
      त्वमेव केवलं धर्तासि
      त्वमेव केवलं हर्तासि
      त्वमेव सर्वं खल्विदं ब्रह्म
      त्वं साक्षादात्मासि नित्यम्॥
    - commentary: |
      (गणपत्यथर्वशीर्ष — अथर्ववेद, उपनिषद्) हे गणपति! आपको नमस्कार — आप ही प्रत्यक्ष ब्रह्म हैं; आप ही एकमात्र कर्ता, धर्ता और हर्ता; यह सब कुछ ब्रह्म है — आप साक्षात् आत्मा हैं।
    - |
      ॐ भूमि मातः पृथिवि पुत्रोऽहं
      पृथिव्या पृथिवी रेतसि
      मा हिंसीर्मा त्वं हिंसीः॥
    - commentary: |
      (भूमि सूक्त — अथर्ववेद १२.१.१२) हे भूमि माता! मैं पृथ्वी का पुत्र हूँ; पृथ्वी मुझे जन्म दे — न तुम मुझे हानि पहुँचाओ, न मैं तुम्हें।
    - |
      ॐ दुर्गे दुर्गे रक्षिणि सर्वशोके
      संहारिणि सर्वदुःखानि सर्वव्याधीनि।
      सर्वत्र सर्वदा मां रक्ष रक्ष
      सर्वोपद्रवभयानि नाशय नाशय॥
    - commentary: |
      (देवी स्तुति — अथर्ववेद, देवी सूक्त परंपरा) हे दुर्गे! सर्व शोक, दुःख और व्याधि का नाश करने वाली — सर्वत्र सर्वदा मेरी रक्षा करो; सब उपद्रव और भय नष्ट करो।
    - |
      ॐ शं नो मित्रः शं वरुणः
      शं नो भवत्वर्यमा
      शं न इन्द्रो बृहस्पतिः
      शं नो विष्णुरुरुक्रमः॥
    - commentary: |
      (शांति मंत्र — अथर्ववेद ७.६०.१) मित्र, वरुण, अर्यमा, इन्द्र, बृहस्पति और विष्णु हमारे लिए कल्याणकारी हों — सर्वदेव शांति प्रदान करें।
    - |
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्।
      उर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय माऽमृतात्॥
    - commentary: |
      (महामृत्युंजय — अथर्ववेद ७.५९.१२) अथर्ववेद में भी महामृत्युंजय मंत्र मिलता है — मृत्यु के बंधन से मुक्ति और अमरत्व की प्रार्थना।
    - |
      ॐ श्रेयां देवानां वसिष्ठ
      श्रेयां ऋषीणां वसिष्ठ
      श्रेयां पृथिव्या वसिष्ठ
      श्रेयां मम वसिष्ठ॥
    - commentary: |
      (वसिष्ठ प्रार्थना — अथर्ववेद ७.५०.१) देवताओं, ऋषियों और पृथ्वी के समान कल्याण मेरे लिए हो — वसिष्ठ (श्रेष्ठ) बनने की प्रार्थना।
    - |
      ॐ आयुर्यज्ञेन कल्पताम्
      प्रजा यज्ञेन कल्पताम्
      पशवो यज्ञेन कल्पताम्
      वाजश्च यज्ञेन कल्पताम्॥
    - commentary: |
      (यज्ञ कल्पना — अथर्ववेद १०.२.२) यज्ञ से आयु, प्रजा, पशु और वाज (शक्ति) सिद्ध हों — यज्ञ के कल्याणकारी फल का मंत्र।
    - |
      ॐ सर्वे भवन्तु सुखिनः
      सर्वे सन्तु निरामयाः।
      सर्वे भद्राणि पश्यन्तु
      मा कश्चिद्दुःखभाग्भवेत्॥
    - commentary: |
      (लोक कल्याण — अथर्ववेद परंपरा) सब सुखी हों, सब निरोग हों, सब कल्याण देखें — कोई भी दुःख का भागी न बने; अथर्ववेदीय शांति और कल्याण की प्रार्थना।
    - |
      ॐ अन्नं ब्रह्म रसो वै सः
      अन्नाद्भूतानि जायन्ते
      जातानि जीवन्ति
      अन्नं प्रयन्त्यभिसंविशन्ति॥
    - commentary: |
      (अन्न ब्रह्म — अथर्ववेद, तैत्तिरीय संबंध) अन्न ब्रह्म है, रस वही है; अन्न से भूत उत्पन्न होते हैं, जीवित रहते हैं और अन्न में ही लौटते हैं — जीवन-चक्र का मंत्र।
    - |
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      (त्रैकालिक शांति — अथर्ववेद समापन) आध्यात्म, भौतिक और दैवीय — तीनों स्तरों पर शांति; अथर्ववेद पाठ के समापन का सर्वाधिक प्रचलित मंत्र।
