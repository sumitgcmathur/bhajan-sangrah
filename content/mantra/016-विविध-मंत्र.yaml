title: विविध मंत्र
group: विविध मंत्र
lyrics:
  sthayi_connect: false
  paragraphs:
    - |
      ॐ असतो मा सद्गमय।
      तमसो मा ज्योतिर्गमय।
      मृत्योर्मामृतं गमय॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      (बृहदारण्यक शांति प्रार्थना — बृहदारण्यक उपनिषद् १.३.२८) हे परमात्मा! मुझे असत्य से सत्य की ओर, अंधकार से प्रकाश की ओर, मृत्यु से अमरत्व की ओर ले चलो। शांति हो, शांति हो, शांति हो।
    - |
      ॐ पूर्णमादः पूर्णमिदं पूर्णात्पूर्णमुदच्यते।
      पूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      (पूर्णमादः — ईशावास्योपनिषद् / बृहदारण्यक) वह परमात्मा पूर्ण है, यह जगत भी पूर्ण है; पूर्ण से पूर्ण निकलता है। पूर्ण को पूर्ण से लेने पर भी पूर्ण ही शेष रहता है। शांति हो, शांति हो, शांति हो।
    - |
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्।
      उर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय माऽमृतात्॥
    - commentary: |
      (महामृत्युंजय — शुक्ल यजुर्वेद ३.६०) हम तीन नेत्रों वाले, सुगंधित और जीवन-पुष्टि करने वाले (शिव) की उपासना करते हैं। जैसे ककड़ी पेड़ से अलग हो, वैसे मृत्यु के बंधन से मुक्त होकर अमरत्व को प्राप्त हों।
    - |
      ॐ सर्वे भवन्तु सुखिनः
      सर्वे सन्तु निरामयाः।
      सर्वे भद्राणि पश्यन्तु
      मा कश्चिद्दुःखभाग्भवेत्॥
    - commentary: |
      (लोक कल्याण — अथर्ववेद परंपरा) सब सुखी हों, सब निरोग हों, सब कल्याण देखें — कोई भी दुःख का भागी न बने; अथर्ववेदीय शांति और कल्याण की प्रार्थना।
    - |
      कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।
      मा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥
    - commentary: |
      (कर्मयोग — भगवद् गीता २.४७) तेरा अधिकार केवल कर्म में है, फल में कभी नहीं; कर्मफल का हेतु मत बन और अकर्म (कर्म न करने) में भी आसक्ति मत रख। — गीता का सर्वप्रसिद्ध श्लोक
    - |
      यदा यदा हि धर्मस्य ग्लानिर्भवति भारत।
      अभ्युत्थानमधर्मस्य तदात्मानं सृजाम्यहम्॥
    - commentary: |
      (देवावतार — भगवद् गीता ४.७) हे भारत! जब-जब धर्म की हानि और अधर्म की वृद्धि होती है, तब-तब मैं अपने रूप को रचता (अवतार लेता) हूँ।
    - |
      परित्राणाय साधूनां विनाशाय च दुष्कृताम्।
      धर्मसंस्थापनार्थाय सम्भवामि युगे युगे॥
    - commentary: |
      (अवतार का उद्देश्य — भगवद् गीता ४.८) साधुओं की रक्षा, दुष्कृतियों का विनाश और धर्म की स्थापना के लिए मैं युग-युग में प्रकट होता हूँ।
    - |
      ॐ भूर्भुवः स्वः
      तत्सवितुर्वरेण्यं
      भर्गो देवस्य धीमहि
      धियो यो नः प्रचोदयात्॥
    - commentary: |
      (सावितृ गायत्री — ऋग्वेद ३.६२.१०) हम उस प्राणस्वरूप, दुःखों का नाश करने वाले, सुखस्वरूप, श्रेष्ठ, तेजस्वी, पापों से रहित, देवस्वरूप परमात्मा का ध्यान करते हैं। वह परमात्मा हमारी बुद्धि को सन्मार्ग की ओर प्रेरित करे।
    - |
      वक्रतुण्ड महाकाय सूर्यकोटि समप्रभ।
      निर्विघ्नं कुरु मे देव सर्वकार्येषु सर्वदा॥
    - commentary: |
      (वक्रतुण्ड महाकाय — गणेश स्तोत्र, पारंपरिक) हे वक्रदंष्ट्र, विशाल शरीर वाले, करोड़ों सूर्य के समान तेजस्वी देव! मेरे सभी कार्यों में सदा विघ्न न करें।
    - |
      सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके।
      शरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तु ते॥
    - commentary: |
      (सर्वमंगल मांगल्ये — दुर्गा सप्तशती) हे सर्व मंगलों में मंगलमय, शिवस्वरूपिणी, सभी कार्यों की सिद्धि करने वाली, शरण देने योग्य, तीन नेत्रों वाली गौरी नारायणि! तुम्हें नमस्कार।
    - |
      या देवी सर्वभूतेषु शक्तिरूपेण संस्थिता।
      नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः॥
    - commentary: |
      (या देवी सर्वभूतेषु — दुर्गा सप्तशती ४.१४) जो देवी सब प्राणियों में शक्ति के रूप में विराजमान हैं, उन्हें बार-बार नमस्कार।
    - |
      ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम्।
      उर्वारुकमिव बन्धनान्मृत्योर्मुक्षीय माऽमृतात्॥
    - commentary: |
      (महामृत्युंजय मंत्र — यजुर्वेद, शुक्ल यजुर्वेद ३.६०) हम तीन नेत्रों वाले, सुगंधित और जीवन की पुष्टि करने वाले शिव की उपासना करते हैं। जैसे कटा हुआ ककड़ी पेड़ से अलग हो जाता है, वैसे ही हम मृत्यु के बंधन से मुक्त होकर अमरत्व को प्राप्त हों।
    - |
      कर्पूरगौरं करुणावतारं
      संसारसारं भुजगेन्द्रहारम्।
      सदा वसन्तं हृदयारविन्दे
      भवं भवानीसहितं नमामि॥
    - commentary: |
      (कर्पूर गौरम् — शिव स्तोत्र, आदि शङ्कराचार्य) कर्पूर के समान गौर, करुणा के अवतार, संसार के सार, सर्पों के राजा को हार धारण, सदा हृदय कमल में निवास करने वाले भव (शिव) और भवानी सहित उन्हें नमस्कार।
    - |
      शान्ताकारं भुजगशयनं पद्मनाभं सुरेशम्
      विश्वाधारं गगनसदृशं मेघवर्णं शुभाङ्गम्॥
      लक्ष्मीकान्तं कमलनयनं योगिभिर्ध्यानगम्यम्
      वन्दे विष्णुं भवभयहरं सर्वलोकैकनाथम्॥
    - commentary: |
      (शान्ताकारं — विष्णु स्तोत्र, विष्णु सहस्रनाम) शान्त स्वरूप, शेषशायी, पद्मनाभ, देवों के स्वामी, विश्व के आधार, आकाश के समान, मेघ वर्ण, शुभ अंग, लक्ष्मीपति, कमलनेत्र, योगियों द्वारा ध्येय और संसार के भय हरने वाले सर्वलोकनाथ विष्णु को मैं वंदता हूँ।
    - |
      जिष्णुं नारायणं देवं गरुडध्वजमच्युतम्।
      श्रीनिवासं महाबाहुं शरणं प्रपद्ये सदा॥
    - commentary: |
      (नारायण शरण — भागवत पुराण १.१.१) जिष्णु, नारायण, गरुडध्वज, अच्युत, श्रीनिवास, महाबाहु देव को मैं सदा शरण करता हूँ।
    - |
      मङ्गलं भगवान विष्णुर्मङ्गलाय तनो हरिः।
      मङ्गलानि च सर्वत्र सर्वत्रैर्वतोऽशिवाः॥
    - commentary: |
      (मङ्गलमन्त्र — महाभारत, उद्योगपर्व) भगवान विष्णु (हरि) मंगल करें; सब जगह मंगल हो, अशुभ दूर हो।
    - |
      ॐ नारायणाय विद्महे
      वासुदेवाय धीमहि
      तन्नो विष्णुः प्रचोदयात्॥
    - commentary: |
      (विष्णु गायत्री — पारंपरिक) हम नारायण को जानें, वासुदेव का ध्यान करें; वह विष्णु हमारी बुद्धि को प्रेरित करें।
    - |
      ॐ उग्रं वीरं महाविष्णुं ज्वलन्तं सर्वतोमुखम्।
      नृसिंहं भीषणं भद्रं मृत्युमृत्युं नमाम्यहम्॥
    - commentary: |
      (नृसिंह मंत्र — नृसिंह पुराण) मैं उग्र, वीर, महाविष्णु, सर्वत्र प्रज्वलित, नृसिंह, भयंकर परंतु कल्याणकारी और मृत्यु की भी मृत्यु को नमस्कार करता हूँ। नृसिंह विष्णु के अवतार हैं।
    - |
      ॐ कृष्णाय वासुदेवाय हरये परमात्मने।
      प्रणतः क्लेशनाशाय गोविन्दाय नमो नमः॥
    - commentary: |
      (गोविन्द मंत्र — विष्णु पुराण १.१९) कृष्ण, वासुदेव, हरि, परमात्मा, क्लेश नाश करने वाले गोविन्द को बार-बार नमस्कार।
    - |
      श्री राम राम रामेति रमे रामे मनोरमे।
      सहस्रनाम तत्तुल्यं रामनाम वरानने॥
    - commentary: |
      (राम नाम तारक — पद्म पुराण) हे सुंदर मुख वाली! जो 'राम राम राम' इस मनोहर नाम का जप करता है, उसे सहस्रनाम जप के समान फल मिलता है।
    - |
      ॐ श्रीरामाय विद्महे
      कोसलाय धीमहि
      तन्नो रामः प्रचोदयात्॥
    - commentary: |
      (राम गायत्री — पारंपरिक) हम श्रीराम को जानें, कोसलनंदन का ध्यान करें; वह राम हमारी बुद्धि को प्रेरित करें।
    - |
      रामाय रामभद्राय रामचन्द्राय वेधसे।
      रघुनाथाय नाथाय सीतायाः पतये नमः॥
    - commentary: |
      (राम षड़नाम — अग्नि पुराण) राम, रामभद्र, रामचन्द्र, वेधस, रघुनाथ, नाथ और सीतापति को नमस्कार।
    - |
      मनोजवं मारुततुल्यवेगं जितेन्द्रियं बुद्धिमतां वरिष्ठम्।
      वातात्मजं वानरयूथमुख्यं श्रीरामदूतं शिरसा नमामि॥
    - commentary: |
      (मनोजवं — रामायण / हनुमान स्तोत्र) मैं मन के समान वेग वाले, वायु के समान तीव्र, जितेन्द्रिय, बुद्धिमानों में श्रेष्ठ, वायुपुत्र, वानर सेना के मुखिया और श्रीराम के दूत हनुमान को शिर से नमस्कार करता हूँ।
