title: आदित्य हृदय मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      वाल्मीकि रामायण
  paragraphs:
    - |
      आदित्यस्य नमस्कारान् ये कुर्वन्ति दिने दिने।
      जन्मान्तरसहस्रेषु दारिद्र्यं नोपजायते॥
    - commentary: |
      जो प्रतिदिन सूर्य को नमस्कार करते हैं, उन्हें हजारों जन्मों में भी दारिद्र्य नहीं होता। (आदित्य हृदय स्तोत्र का फलश्लोक)
