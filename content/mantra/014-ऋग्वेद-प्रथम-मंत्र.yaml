title: ऋग्वेद प्रथम मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      ऋग्वेद १.१.१
  paragraphs:
    - |
      अग्निमीळे पुरोहितं यज्ञस्य देवं ऋत्विजम्।
      होतारं रत्नधातमम्॥
    - commentary: |
      मैं अग्नि की स्तुति करता हूँ — यज्ञ के पुरोहित, देव, ऋत्विज, होता और रत्नों के धाता अग्नि की। यह ऋग्वेद का प्रथम मंत्र है।
