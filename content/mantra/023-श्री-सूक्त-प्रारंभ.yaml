title: श्री सूक्त प्रारंभ
lyrics:
  sthayi_connect: false
  pre_shlok: |
      ऋग्वेद / श्री सूक्त
  paragraphs:
    - |
      ॐ हिरण्यवर्णां हरिणीं सुवर्णरजतस्रजाम्।
      चन्द्रां हिरण्मयीं लक्ष्मीं जातवेदो म आ वह॥
      तां म आ वह जातवेदो लक्ष्मीमनपगामिनीम्।
      यस्यां हिरण्यं प्रभूतं गावो दास्योऽश्वान् विन्देयम्॥
    - commentary: |
      हे अग्नि! सुवर्ण वर्ण, हरिणी के समान, सुवर्ण-रजत माला वाली, चंद्रमा के समान तेजस्वी, अमोघ लक्ष्मी को मेरे पास लाओ — जिससे धन, गाय, सेवक और अश्व प्राप्त हों।
