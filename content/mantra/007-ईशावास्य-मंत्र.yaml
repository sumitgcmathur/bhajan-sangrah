title: ईशावास्य मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      ईशावास्योपनिषद् १
  paragraphs:
    - |
      ॐ ईशावास्यमिदं सर्वं यत्किञ्च जगत्यां जगत्।
      तेन त्यक्तेन भुञ्जीथा मा गृधः कस्यस्विद्धनम्॥
    - commentary: |
      यह सारा जगत ईश्वर से व्याप्त है। उस परमात्मा के भोग से त्यागपूर्वक भोग करो; किसी और के धन के लिए लोभ मत करो।
