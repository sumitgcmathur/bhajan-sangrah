title: आदित्य हृदय फलश्लोक
lyrics:
  sthayi_connect: false
  pre_shlok: |
      वाल्मीकि रामायण
  paragraphs:
    - |
      आदित्यहृदयं पुण्यं सर्वशत्रुविनाशनम्।
      जयावहं जपेन्नित्यं अक्षय्यं परमं शिवम्॥
      सर्वमङ्गलमाङ्गल्यं सर्वपापप्रणाशनम्।
      चिन्ताशोकप्रशमनं आयुर्वर्धनमुत्तमम्॥
    - commentary: |
      आदित्य हृदय पुण्य, सब शत्रुओं का नाश करने वाला, जय दिलाने वाला, अक्षय और परम शिव है — सब मंगलों में मंगल, पाप नाशक, चिंता-शोक शांत करने वाला और आयु बढ़ाने वाला है।
