title: पवमान मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      बृहदारण्यक उपनिषद् १.३.२८
  paragraphs:
    - |
      ॐ अस्माद् भाव इन्द्रियं मनसा सह।
      प्राणैः सह शरीरं सुवर्चसं विदधे।
      पवमानं देवेभ्यो मा भूयासम्॥
    - commentary: |
      इस (ब्रह्म) से उत्पन्न इन्द्रियाँ, मन, प्राण और शरीर को तेजस्वी बनाऊँ और देवताओं के लिए पवित्र (पवमान) बनूँ।
