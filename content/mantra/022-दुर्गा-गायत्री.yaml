title: दुर्गा गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      दुर्गा उपासना
  paragraphs:
    - |
      ॐ कात्यायन्यै विद्महे कन्यकुमारि धीमहि।
      तन्नो दुर्गिः प्रचोदयात्॥
    - commentary: |
      हम कात्यायनी को जानते हैं, कन्याकुमारी का ध्यान करते हैं; वह दुर्गा हमारी बुद्धि को सन्मार्ग पर लाए।
