title: शान्ताकारं मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      विष्णु स्तोत्र
  paragraphs:
    - |
      शान्ताकारं भुजगशयनं पद्मनाभं सुरेशम्
      विश्वाधारं गगनसदृशं मेघवर्णं शुभाङ्गम्॥
      लक्ष्मीकान्तं कमलनयनं योगिभिर्ध्यानगम्यम्
      वन्दे विष्णुं भवभयहरं सर्वलोकैकनाथम्॥
    - commentary: |
      शान्त स्वरूप, शेषशायी, पद्मनाभ, देवों के स्वामी, विश्व के आधार, आकाश के समान, मेघ वर्ण, शुभ अंग, लक्ष्मीपति, कमलनेत्र, योगियों द्वारा ध्येय और संसार के भय हरने वाले सर्वलोकनाथ विष्णु को मैं वंदता हूँ।
