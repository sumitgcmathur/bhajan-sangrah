title: त्वमेव माता च पिता
lyrics:
  sthayi_connect: false
  pre_shlok: |
      भक्ति प्रार्थना
  paragraphs:
    - |
      त्वमेव माता च पिता त्वमेव
      त्वमेव बन्धुश्च सखा त्वमेव।
      त्वमेव विद्या द्रविणं त्वमेव
      त्वमेव सर्वं मम देव देव॥
    - commentary: |
      आप ही माता, पिता, बंधु और सखा हैं; आप ही विद्या और धन हैं — हे देवों के देव! आप ही मेरे सब कुछ हैं।
