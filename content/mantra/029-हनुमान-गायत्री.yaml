title: हनुमान गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      हनुमान उपासना
  paragraphs:
    - |
      ॐ आञ्जनेयाय विद्महे वायुपुत्राय धीमहि।
      तन्नो हनुमानः प्रचोदयात्॥
    - commentary: |
      हम आञ्जनेय को जानते हैं, वायुपुत्र का ध्यान करते हैं; वह हनुमान हमारी बुद्धि को प्रेरित करें।
