title: महामृत्युंजय गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      शिव उपासना
  paragraphs:
    - |
      ॐ त्र्यम्बकाय विद्महे सुगन्धिं पुष्टिवर्धनाय धीमहि।
      तन्नो रुद्रः प्रचोदयात्॥
    - commentary: |
      हम त्र्यम्बक को जानते हैं, पुष्टिवर्धक सुगंधि शिव का ध्यान करते हैं; वह रुद्र हमारी बुद्धि को प्रेरित करें।
