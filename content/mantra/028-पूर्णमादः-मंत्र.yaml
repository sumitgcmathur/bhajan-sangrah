title: पूर्णमादः मंत्र
lyrics:
  sthayi_connect: false
  pre_shlok: |
      ईशावास्योपनिषद् / बृहदारण्यक
  paragraphs:
    - |
      ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते।
      पूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते॥
      ॐ शान्तिः शान्तिः शान्तिः॥
    - commentary: |
      वह परमात्मा पूर्ण है, यह जगत भी पूर्ण है; पूर्ण से पूर्ण निकलता है। पूर्ण को पूर्ण से लेने पर भी पूर्ण ही शेष रहता है। शांति हो, शांति हो, शांति हो।
