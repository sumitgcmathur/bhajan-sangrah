title: कृष्ण गायत्री
lyrics:
  sthayi_connect: false
  pre_shlok: |
      कृष्ण उपासना
  paragraphs:
    - |
      ॐ देवकीनन्दनाय विद्महे वासुदेवाय धीमहि।
      तन्नो कृष्णः प्रचोदयात्॥
    - commentary: |
      हम देवकीपुत्र को जानते हैं, वासुदेव का ध्यान करते हैं; वह कृष्ण हमारी बुद्धि को प्रेरित करें।
