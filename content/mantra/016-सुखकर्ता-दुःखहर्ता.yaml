title: सुखकर्ता दुःखहर्ता
lyrics:
  sthayi_connect: false
  pre_shlok: |
      गणेश प्रार्थना
  paragraphs:
    - |
      सुखकर्ता दुःखहर्ता वात सरोजनम्।
      भूतानां भूतपुत्राणो गणेशस्ते नमो नमः॥
    - commentary: |
      हे सुख देने वाले, दुःख हरने वाले, वात-सरोज के समान कोमल गणेश! भूतों के पुत्र, तुम्हें बार-बार नमस्कार।
