title: स्वीकारो मेरे प्रणाम
romantitle: Sveekaaro Mere Pranaama
lyrics:
  sthayi: |
    हे सुख हरण प्रभु नारायण,
    हे दुख हरण प्रभु नारायण,
    हे त्रिलोक पति दाता सुख धाम,
    स्वीकारो मेरे प्रणाम,
    स्वीकारो मेरे प्रणाम,
    स्वीकारो मेरे प्रणाम प्रभु,
    स्वीकारो मेरे प्रणाम।
  sthayi_connect_text: स्वीकारो मेरे प्रणाम
  paragraphs:
    - |
      मन वाणी में वो शक्ति कहां, जो महिमा तुमरी गान करे।
      हे अगम अगोचर अविकारी, निर्लेप हो हर शक्ति से परे।
      हम और तो कुछ भी जाने ना,
      केवल गाते हैं पावन नाम।
    - |
      आदि मध्य और अंत तुम ही, और तुम ही आत्म आधारे।
      हो भगतो के तुम प्राण प्रभु, इस जीवन के रखवारे।
      हो तुम में जीवे जन्म, तुम में और अंत करे,तुम में विश्राम।
    - |
      चरण कमल का ध्यान धरू, और प्राण करें सुमिरन तेरा।
      दीना श्रय दीनानाथ प्रभु, भव बंधन काटो हरि मेरा।
      शरणागत के श्याम हरि, हे नाथ मुझे तुम लेना थाम।
