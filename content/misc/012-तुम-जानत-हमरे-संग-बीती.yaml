title: तुम जानत हमरे संग बीती
romantitle: Tuma Jaanata Hamare Snga Beetee
lyrics:
  sthayi: |
    तुम जानत हमरे संग बीती,
    इक इक बार सभी संग बीती।
  paragraphs:
    - |
      राम लखन सिया वन को सिधारे,
      सीता हरण उनके संग बीती।
    - |
      जल की मछलियाँ जल में रहत हैं,
      जाल पड़े उनके संग बीती।
    - |
      सूर्य चंद्र गगन मंडल में
      ग्रहण लगे उनके संग बीती।
    - |
      पांचो पाण्डव छठी द्रौपदी,
      चीर हरण उनके संग बीती।
    - |
      राजा हरिश्चंद्र तारामती रानी,
      राज गयो उनके संग बीती।
    - |
      सूरदास प्रभु तुमरे भजन में,
      नैन गए हमरे संग बीती।
