title: भगवान मेरी नैया
romantitle: Bhagavaan Meri Naiyaa
lyrics:
  sthayi: |
    भगवान मेरी नैया, उस पार लगा देना।
    अब तक तो निभाया है, आगे भी निभा देना॥
  sthayi_connect: false
  paragraphs:
    - |
      हम दीन दुखी निर्बल, नित नाम रहे प्रतिपल, 
      यह सोच दरश दोगे, प्रभु आज नही तो कल, 
      जो बाग लगाया है, फूलों से सजा देना, 
      भगवान मेरी नैया, उस पार लगा देना, 
      अब तक तो निभाया है, आगे भी निभा देना॥
    - |
      तुम शांति सुधाकर हो, तुम ज्ञान दिवाकर हो,
      मम हँस चुगे मोती, तुम मान सरोवर हो,
      दो बूंद सुधारस की, हमको भी पिला देना,
      भगवान मेरी नैया, उस पार लगा देना,
      अब तक तो निभाया है, आगे भी निभा देना॥
    - |
      रोकोगे भला कबतक, दर्शन को मुझे तुमसे,
      चरणों से लिपट जाऊं, वृक्षों से लता जैसे,
      अब द्वार खड़ी तेरे, मुझे राह दिखा देना,
      भगवान मेरी नैया, उस पार लगा देना,
      अब तक तो निभाया है, आगे भी निभा देना ॥
    - |
      मजधार पड़ी नैया, डगमग डोले भव में,
      आओ त्रिशला नंदन, हम ध्यान धरे मन में,
      अब ‘तनवर’ करे विनती, मुझे अपना बना लेना,
      भगवान मेरी नैया, उस पार लगा देना,
      अब तक तो निभाया है, आगे भी निभा देना॥
