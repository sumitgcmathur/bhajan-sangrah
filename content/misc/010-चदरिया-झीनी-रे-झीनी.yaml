title: चदरिया झीनी रे झीनी
romantitle: Chadariyaa Jheenee Re Jheenee
lyrics:
  pre_shlok: |
    कबीरा जब हम पैदा हुए,
    जग हँसे, हम रोये।
    ऐसी करनी कर चलो,
    हम हँसे, जग रोये।।
  sthayi: |
    चदरिया झीनी रे झीनी,
    राम नाम रस भीनी,
    चदरिया झीनी रे झीनी।।
  paragraphs:
    - |
      अष्ट-कमल का चरखा बनाया,
      पांच तत्व की पूनी।
      नौ-दस मास बुनन को लागे,
      मूरख मैली कीन्ही।।
    - |
      जब मोरी चादर बन घर आई,
      रंगरेज को दीन्ही।
      ऐसा रंग रंगा रंगरेज ने,
      के लालो लाल कर दीन्ही।।
    - |
      चादर ओढ़ शंका मत करियो,
      ये दो दिन तुमको दीन्ही।
      मूरख लोग भेद नहीं जाने,
      दिन-दिन मैली कीन्ही।।
    - |
      ध्रुव प्रह्लाद सुदामा ने ओढ़ी चदरिया,
      शुकदेव ने निर्मल कीन्ही।
      दास कबीर ने ऐसी ओढ़ी,
      ज्यूँ की त्यूं धर दीन्ही।।
