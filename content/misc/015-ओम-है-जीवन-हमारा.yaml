title: ओम है जीवन हमारा
lyrics:
  sthayi: |
    ओम है जीवन हमारा, ओम प्राणाधार है,
    ओम है कर्ता विधाता, ओम पालनहार है।
  paragraphs:
    - |
      ओम है दुख का विनाशक, ओम सर्वानंद है,
      ओम है बल तेज धारी, ओम करुणानंद है,
      ओम करुणानंद है।
    - |
      ओम सबका पूज्य है, हम ओम का पूजन करें,
      ओम ही के ध्यान से, हम शुद्ध अपना मन करें,
      शुद्ध अपना मन करें।
    - |
      ओम के गुरु मंत्र जपने से, रहेगा शुद्ध मन,
      बुद्धि दिन प्रतिदिन बढ़ेगी,धर्म में होगी लगन,
      धर्म में होगी लगन।
    - |
      ओम के जप से हमारा ज्ञान बढ़ता जाएगा,
      ओम का ये जाप हमको मुक्ति तक पहुंचाएगा,
      मुक्ति तक पहुंचाएगा।
