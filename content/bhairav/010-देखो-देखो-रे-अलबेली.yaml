title: देखो देखो रे अलबेली
lyrics: |
  देखो देखो रे, अलबेली सैंया भैरू नाथ मनाय ।टेर।।
  माली पन्ना रंग बिरंगा, लेकर कर मन माय उमंगा ।
  तेल सिंदूर मिलाय दियो है, बागो शुम पदराय, देखो देखो || १ ||
  जुई गुलाब अरु चम्पा चमेली, चुन चुन कलियां कर कर भेली ।
  निज निज कर से हार बनाकर, के दीनों पहराय. देखो देखो || २ ||
  मूंग चणा तो आखा आखा, अध उबाला काचा पाका ।
  अरु चक चक तो चर चरमो, दीनो भोग लगाय, देखो देखो || ३ ||
  मद में मस्त हुओं मतवालो, छोटी लम्बी लटियां वालो ।
  स्वान चढयो घमे लटियालो, ले लकुटी कर मांय, देखो देखो || ४ ||
  धूप धकाय दीप दरशायो, आरती कर मन हरष बधायो ।
  विघिवत पूजन कर हिल मिल सब, रहीं है मंगल गाय, देखो देखो || ५ ||
  लटियालो तो कामण गारो, दरशन याको हद हित कारो ।
  &#39;राम&quot; कहे कर जोर को ओ, लुल लुल शीश नवाय, देखो देखो || ६ ||
