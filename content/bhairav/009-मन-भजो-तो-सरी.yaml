title: मन भजो तो सरी
lyrics:
  sthayi: |
    मन भजो तो सरी रे, सिद्ध करो तो सरी
  paragraphs:
    - |
      इण छैल छबीला भैंरू रा गूण गावों तो सरी...मन भजो तो
    - |
      हे अम्बा जी रो लाडलो ने डयोडी रो दरबान,
    - |
      हे सोहन चिटियो हाथ में और वाहन जाको स्वान...मन भजो तो
    - |
      हे तेल सिन्दूर ले मालीपन्ना बागो शुभ पदराय,
    - |
      हे पुष्प नारियल रोली मोली दीप देवा दरसाय...मन भजो तो
    - |
      हे भोग जिणारे माया तीरथ, बाकलिया अधिकाय,
    - |
      हे चक चक तो कर चूर चूरमो, देंसा भोग लगाय...मन भजो तो
    - |
      हे मद में मस्त सदा मतवालो, घूघरड़ा धमकाय,
    - |
      हे दुष्टा ने तो मार भगावे करें भक्तन की साय...मन भजो तो
