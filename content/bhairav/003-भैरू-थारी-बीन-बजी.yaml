title: भैरू थारी बीन बजी
tarz: ओ सांवरा बंशी शुभकारी
lyrics:
  sthayi: |
    भैरू थारी बीन (बंशरियों) बजी शुभकारी
  paragraphs:
    - |
      ओ कालो गोरो स्वामी रिक्तेश्वर स्वामी नामी ।
    - |
      जिनके चरणों में दंडोत हमारी ॥१
    - |
      में सेवा कछु नहीं जाणू, नहीं भक्ति भाव पहचाणू ।
    - |
      पर विश्वास तुम्हारो भारी ॥२
    - |
      में आयो शरण तिहारी आया री लाजा राखो मोरी ।
    - |
      मोहे दृढ विश्वास, तुम्हारो स्वामी ॥३
    - |
      ये दास &#39;कान&#39; की अरजी, अरजी पर करदो मरजी ।
    - |
      दास का संकट काटो स्वामी ॥४
