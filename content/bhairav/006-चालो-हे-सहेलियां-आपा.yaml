title: चालो हे सहेलियां आपा
lyrics:
  sthayi: |
    चालो हे सहेलियां आपा, भैरू ने मनासा हे,
  paragraphs:
    - |
      भैरू ने मनासा आपा गुण गोरे (काले) रा गासां हे, ...चालो
    - |
      भैरू कालो भैरू गोरो भैरू सदा मतवालो है,
    - |
      हाथ में सोने रो चिटियो कड़ा किलंगो वालो है...चालो
    - |
      मंडोवर री बाडिया मैं, भैरू बीन वजावे है,
    - |
      बीन बजावे छंवर दुलावे, मालणिया रंग लावे है...चालो
    - |
      घाचण लागो मोचण लागो, लागो लाल लवारी है,
    - |
      दड़िया रमतो दर्जन लागो, भोग करे सुनारी रे...चालो
    - |
      साठ कली री सूथन सोहे, अस्सी कली रो बागो है,
    - |
      तोबा &#39;तोबा करे तुरकनी, &#39;देव हिन्दुरो लागो है...चालो
    - |
      कलालण ने कालो लागो, बिरयाणी ने गोरा है,
    - |
      ढोल फोड़ ढोलण ने लागो, नायण कर निवेडो है...चालो
    - |
      साठ मणा रा बाकला ने, अस्सी मणा री बाटी है,
    - |
      सेवगणी ने पचो दियो,गूगरीयां री घाटी है...चालो
    - |
      मंडोवरारो कालो गोरो, बडली वालो वीर है,
    - |
      नयाबास रो आन्द भैरू, हरे संता री भीड़ है...चालो
