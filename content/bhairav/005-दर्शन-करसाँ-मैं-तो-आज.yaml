title: दर्शन करसाँ मैं तो आज
lyrics: |
  तर्ज : मेझते मसीद मुहावणी
  दर्शन करसाँ मैं आज रे छल छबीला भैरू नाथ रा ॥टेर॥
  हाँ भैरू अम्बाजी रो लाडलो, है... सोहे डोडी रो दरबान-२, भैरू अम्बाजी रो लाडलो, सोहे डोडी रो दरबान-२ रे छैल छबीला भैरू नाथ रा ॥१॥
  हां स्वान सदा वाहन सोहे है हांँ ...सोहन चिटियो हाथ-२ स्वान सदा वाहन सोहे, सोहन चिटियो हाथ-२ रे रंग रंगीला भैरु नाथ रा ॥२॥
  हांँ तेल सिंदूर माली पना, है हांँ ...देसां बागो पदराय-२ तेल सिंदूर माली पना, देसां बागो पदराय-२ रे अजब हटीला भैरु नाथ रा॥३॥
  हांँ बारे रे मण रा बाकला, है हांँ ...ऊपर मद री धार-२, बारे रे मण रा बाकला, ऊपर मद री धार-२ रे छैल छबीला भैरु नाथ रा॥४॥
  हांँ चक चक तो सो चूरमो, है हांँ ...देसां भोग लगाय-२, चक चक तो सो चूरमो, देसां भोग लगाय-२रे अजब हटीला भैरु नाथ रा॥५॥
  हांँ ज्यू ज्यू भैरुं नाच करे है हांँ ... बाजे गुगर माल-२, ज्यू ज्यू भैरुं नाच करे, बाजे गुगर माल-२ रे छैल छबीला भैरु नाथ रा॥६॥
  हांँ दास ‘राम’ कर जोर के है हांँ... चरना शीश नवाय-२, दास ‘राम’ कर जोर के, चरना शीश नवाय-२ रे छैल छबीला भैरु नाथ रा॥७॥
