title: दर्शन करसाँ मैं तो आज
tarz: मेझते मसीद मुहावणी
lyrics:
  sthayi: |
    दर्शन करसाँ मैं तो आज रे छल छबीला भैंरु नाथ रा॥
  paragraphs:
    - |
      हाँ भैंरु अम्बाजी रो लाडलो, है सोहे डोडी रो दरबान-२, भैंरु अम्बाजी रो लाडलो, सोहे डोडी रो दरबान-२ रे छैल छबीला भैंरु नाथ रा॥
    - |
      हाँ स्वान सदा वाहन सोहे है हाँ सोहन चिटियो हाथ-२ स्वान सदा वाहन सोहे, सोहन चिटियो हाथ-२ रे रंग रंगीला भैरू नाथ रा॥
    - |
      हाँ तेल सिंदूर माली पना, है हाँ देसा बागो पदराय-२ तेल सिंदूर माली पना, देसा बागो पदराय-२ रे अजब हटीला भैरू नाथ रा॥
    - |
      हाँ बारे रे मण रा बाकला, है हाँ ऊपर मद री धार-२, बारे रे मण रा बाकला, ऊपर मद री धार-२ रे छैल छबीला भैरू नाथ रा॥
    - |
      हाँ चक चक तो सो चूरमो, है हाँ देसा भोग लगाय-२, चक चक तो सो चूरमो, देसा भोग लगाय-२रे अजब हटीला भैरू नाथ रा॥
    - |
      हाँ ज्यू ज्यू भैरुं नाच करे है हाँ बाजे गुगर माल-२, ज्यू ज्यू भैरुं नाच करे, बाजे गुगर माल-२ रे छैल छबीला भैरू नाथ रा॥
    - |
      हाँ दास ‘राम’ कर जोर के है हाँ चरना शीश नवाय-२, दास ‘राम’ कर जोर के, चरना शीश नवाय-२ रे छैल छबीला भैरू नाथ रा॥
