title: में तो भैरु जी थाने नोतियो
lyrics:
  sthayi: |
    में तो भैरु जी थाने नोतियो हो, भरिया भाद्रवा री तीज,
  paragraphs:
    - |
      हाँ हो भैरु तीज, में तो थाने नोतियो...
    - |
      कठडे भैंरु जी थारी थापना, हो कठडे भैंरु जी थारो थान, में तो थाने नोतियो...
    - |
      जोधाणे भैंरु जी थारी थापना हो, बड़ली बालकिया रो थान, में तो थाने नोतियो...
    - |
      बारह तो मन रा भैरू बाकला हो, ऊपर मदरी धार, में तो थाने नोतियो...
    - |
      मैं तो गावों हो भैरू मोद सू, थे मारी आशा मनसा पूर, में तो थाने नोतियो...
