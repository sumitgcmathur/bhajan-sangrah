title: वावा लटियालो
lyrics: |
  तर्ज : वावाआनन्दी ले घोटो
  वावा लटियालो (लाँकड़ियो) मन भावे, ओतो अम्बारो
  दास कहावे रे लटियालो ॥टेर॥
  भैरू स्वान सोहे थारी असवारी, भैरू हाय लिवी वीणाधारी ॥॥
  ओतो मधुरी सी तान सुनावे रे , लटियालो ।
  थारे पग माई गूगर माला, थे तो ठिम ठिम ठिम चालो चाला ॥१॥
  थारा गुगरड़ा घमकावे रे लटियालो ॥२॥
  थारा सेवक नित दर्शन आवे, कर दर्शन थांरा गुन गावे।
  मन आनन्द हरष बधावे रे लटियालो।
  थारे तेल सिंदूर रो बागो करे, थारे चूर चूरमो भोग धरे।
  थाने रुच रुच ने जीमावे रे लाँकड़ियो।
  ओ तो लटियालोत कामण गारो, याको दर्शन है हद हितकारी।
  ओतो ‘रामचन्द्र’ गुन गावे रे लटियालो।
