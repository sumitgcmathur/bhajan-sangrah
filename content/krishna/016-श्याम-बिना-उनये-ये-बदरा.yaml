title: श्याम बिना उनये ये बदरा
romantitle: Shyaam Binaa Unaye Ye Badaraa
lyrics:
  sthayi: |
    श्याम बिना उनये ये बदरा, 
    आज श्याम सपने में देखे, 
    भर आई नैन, धुरक गयो कजरा।
  paragraphs:
    - |
      चचल चपल अति ही चितचोर, निसि जागतम क भयो पागोर।
      सूरदास प्रभु कबही मिलोगे, तज गयें गोकुल मिट गयो झगड़ा।
