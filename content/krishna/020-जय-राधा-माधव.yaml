title: जय राधा माधव
lyrics:
  sthayi: |
    जय राधा माधव जय कुंज बिहारी, जय गोपी जन वल्लभ, जय गिरिधरधारी।
    यशोदा नंदन ब्रज जन रंजन, जमुना तीर बन चारी।
  paragraphs:
    - |
      मुरली मनोहर करुणा सागर, जय गोवर्धनधारी।
      हरे कृष्णा हरे कृष्णा कृष्णा कृष्णा हरे हरे, हरे रामा हरे रामा रामा रामा हरे हरे
