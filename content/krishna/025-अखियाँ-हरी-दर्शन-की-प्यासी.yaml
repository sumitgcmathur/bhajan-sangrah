title: अखियाँ हरी दर्शन की प्यासी
lyrics:
  sthayi: |
    हरी दर्शन की प्यासी अखियाँ, अखियाँ हरी दर्शन की प्यासी, 
    देखियो चाहत कमल नैन को, निशिदिन रहेत उदासी॥
  paragraphs:
    - |
      केसर तिलक मोतियन की माला, वृन्दावन को वासी, 
      नेह लगाए त्याग गए तन सम, डारी गए गर फँसी॥
    - |
      काहू के मन की कोवु जाने, लोगन के मन हासी, 
      सूरदास प्रभु तुम्हरे दरस बिन, लेहो करवट कासी॥
