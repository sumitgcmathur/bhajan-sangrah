title: बाट निहारे घनश्याम
lyrics:
  sthayi: |
    बाट निहारे घनश्याम, नैना नीर भरे
  paragraphs:
    - |
      जोग ध्यान में चित नहीं लागे
      मन की पीर ही पल पल जागे
    - |
      बांके बिहारी कृष्ण कन्हाई
      काहे सखे सुध बुध बिसराई
    - |
      पतित पावन शरण में लीजो
      नाथ सखा हरि दर्शन दीजो
