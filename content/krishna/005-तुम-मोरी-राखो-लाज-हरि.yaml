title: तुम मोरी राखो लाज हरि
lyrics:
  sthayi: |
    तुम मोरी राखो लाज हरि,
  paragraphs:
    - |
      तूम जानत सब अंतरयामी, करनी कछु न करी,
      तुम मोरी राखो लाज हरि।
      ओगुन मो से बिसरत ना ही,
      बिसरत ना ही, मोसे बिसरत ना ही
    - |
      सब परपंच की ओट बाँध के,
    - |
      दारा सूत मन मोह लिए है,
      मोह लिए है मन मोह लिए है,
    - |
      सुर पतित को बेग उबारो,
