title: तन के तम्बूरे में दो
lyrics:
  sthayi: |
    तन तम्बूरा, तार मन,
  paragraphs:
    - |
      अद्भुत है ये साज ।
    - |
      हरी के कर से बज रहा,
    - |
      हरी ही है आवाज ।
    - |
      तन के तम्बूरे में दो,
    - |
      सांसो की तार बोले ।
    - |
      जय सिया राम राम,
    - |
      जय राधे श्याम श्याम ।
    - |
      तन के तम्बूरे में दो,
    - |
      सांसो की तार बोले ।
    - |
      जय सिया राम राम,
    - |
      जय राधे श्याम श्याम ।
    - |
      अब तो इस मन के मंदिर में,
    - |
      प्रभु का हुआ बसेरा ।
    - |
      मगन हुआ मन मेरा,
    - |
      छूटा जनम जनम का फेरा ।
    - |
      मन की मुरलिया में,
    - |
      सुर का सिंगार बोले ।
    - |
      जय सिया राम राम,
    - |
      जय राधे श्याम श्याम ।
    - |
      तन के तम्बूरे में दो,
    - |
      सांसो की तार बोले ।
    - |
      जय सिया राम राम,
    - |
      जय राधे श्याम श्याम ।
    - |
      लगन लगी लीला धारी से,
    - |
      जगी रे जगमग ज्योति ।
    - |
      राम नाम का हीरा पाया,
    - |
      श्याम नाम का मोती ।
    - |
      प्यासी दो अंखियो में,
    - |
      आंसुओ के धार बोले ।
    - |
      जय सिया राम राम,
    - |
      जय राधे श्याम श्याम ।
    - |
      तन के तम्बूरे में दो,
    - |
      सांसो की तार बोले ।
    - |
      जय सिया राम राम,
    - |
      जय राधे श्याम श्याम ।
