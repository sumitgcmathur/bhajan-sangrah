title: दीनन दुख हरन देव
lyrics:
  sthayi: |
    दीनन दुख हरन देव, संतन हितकारी।
  paragraphs:
    - |
      अजामील गीध व्याध, इनमें कहो कौन साध?
    - |
      पंछी को पद पढ़ात, गनिका सितारी। दीनन दुख हरन देव...
    - |
      ध्रुव के सर छत्र देत, प्रह्लाद को उबार देत
    - |
      भगत हेत बाँध्यो सेतु, लंकपुरी जारी। दीनन दुख हरन देव...
    - |
      गज को जब ग्राह ग्रस्यो, दुस्सासन चीर खस्यो
    - |
      सभा बीच, &quot;कृष्ण-कृष्ण&quot;, द्रौपदी पुकारी। दीनन दुख हरन देव...
    - |
      इतने हरि आए-गए, बसनन आरूढ़ भये
    - |
      सूरदास द्वारे ठाढ़ो, आँधरो भिखारी। दीनन दुख हरन देव...
