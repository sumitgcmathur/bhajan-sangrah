title: मुरली मनोहर गोपाला
romantitle: Muralee Manohara Gopaalaa
lyrics:
  sthayi: |
    मुरली मनोहर गोपाला, गोविन्द राधे गोपाला।
  paragraphs:
    - |
      जय श्री राधे, जय श्री कृष्णा।
      जय गोवर्धन, गोपाला।
    - |
      जय गिरधारी, कुञ्ज बिहारी।
      श्याम मुरारी गोपाला।
    - |
      गोपी वल्लभ, दीन दयाला।
      देवकी नंदन गोपाला।
