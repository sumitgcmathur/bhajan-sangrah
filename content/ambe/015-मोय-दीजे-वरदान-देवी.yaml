title: मोय दीजे वरदान देवी
lyrics:
  sthayi: |
    मोय दीजे वरदान देवी, शरण तोरी आयो रे-२ ।
  paragraphs:
    - |
      हेरी वरनूं, हेरी वरनूं, सुजस मा थारो रे-२,
    - |
      कर वाणी को विकास देवी, शरण तोरी आयो रे-२....मोय दीजे वरदान देवी
    - |
      चरण कमल को, चरण कमल को,
    - |
      राम बालहारी जी राम बलहारी जी,
    - |
      ओ तो कोटि कोटि वार देवी, शरण तोरी आयोरी...मोय दीजे वरदान देवी
