title: पूर है धीरियाणी है
lyrics: |
  (तर्ज: बांगारी कोयल)
  पूर है धीरियाणी है आशा मोरी, आशा है पूरण मनसा पूर॥
  पहली है आशा निरोगी रहे काया, दूजी आशा रहे घर में माया, जोड़ा सहित सुख रहे भरपूर॥ पूर है...
  तीजी है आशा पुत्र हो भागी, इणरी भी काया रहे निरोगी, वृद्ध आयुष और हाये सपूत॥ पूर है...
  चौथी है आशा राज में रहे पासो, सदा है कलम मारी जारी है राखो, जैसे दालिद्र जावे दूर॥ पूर है...
  खास अरज मारी चित दे सुण जो, अंत समय अलग मत रहिजो, चित चरण में राखोजी हजूर॥ पूर है...
  कह &#39;शुशवक&#39; मेहर कर झाँको, पुत्र मात को सो नातो राखो अम्बा, अष्ट पहर दिखलावो नूर॥ पूर है...
