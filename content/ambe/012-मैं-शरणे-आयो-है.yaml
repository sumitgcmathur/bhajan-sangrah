title: मैं शरणे आयो है
lyrics:
  sthayi: |
    (तर्ज-बोलम रही है हे सालू वाली समदण नित नवी है )
  paragraphs:
    - |
      मैं शरणे आयो है, हे थारो ही शाकम्भर में तो दास कहायो है ॥टेर
    - |
      हे तू है म्हारी मालिक अम्बा थारो ही विश्वास,
    - |
      हे आसा पूरण धीरियाणी थे पूरो मन री आस, मात मैं
    - |
      हे और कहा पर जाऊं माता, किनने जाये मनाय,
    - |
      हे थांसे ऊंचो कौन जगत में करने वालो साय, मात मैं
    - |
      हे मैं चाकर अज्ञानी थारो खाने जाद गुलाम,
    - |
      ज्यूं चाहो यूं रखो जननी बन्दे है बिन दाम, मात मैं
    - |
      हे ब्रम्हा ध्यावे, वेद मानावे, विष्णु धर रया ध्यान,
    - |
      हे बलिहारी शोभा चरनन री कब तक करु बखान, मात मैं
    - |
      हे करजोरी &#39;खुशवक्त&#39; नारायण विनबे बारम्बार,
    - |
      हे भवसागर से तारो अम्बा, बेडा कर दो पार
