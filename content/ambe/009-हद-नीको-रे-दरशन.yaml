title: हद नीको रे दरशन
lyrics:
  sthayi: |
    (तर्ज: रस लेवे रे रुख्याली, लेवे रे मिजाजजी हरमल रो )
  paragraphs:
    - |
      हद नीको रे दरशन हद नीको रे दरशन अम्बा रो ॥टेर
    - |
      नारी तन धारयो, महिष मारयो, पुनि सारयो रे कारज,
    - |
      सारयो रे कारज संतन रो ॥१
    - |
      शिव संग ब्राजे, छवि छाजे, हद लाजे रे तेज हद लाजे रे
    - |
      तेज कोटि रवि रो ॥२
    - |
      सुर सब ध्यावे गुन गावे, पर पावे रे पार, पर पावे रे
    - |
      पार थारी महिमा रो ॥३
    - |
      करुणा कर हेरो लेकर तेरो, रख चेरो रे मुझको, रख चेरो रे
    - |
      मुझको चरणन रो ॥४
    - |
      &#39;राम&#39; शिर नावे, गुन गावे, चित चावे रे दान, चित चावे रे
    - |
      दान, सु भगती रो ॥५
