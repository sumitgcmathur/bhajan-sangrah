title: अम्बे का जयकारा
tarz: जब दीप जले आना
swarachit: true
lyrics: |
  अम्बे का जयकारा,
  दुर्गे का जयकारा,
  संग्राम हुआ था, महिषासुर से,
  भूमि भार था उतारा।
  महिषासुर जप तप करने लगा,
  ब्रह्माजी को मनाने लगा,
  कठिन तपस्या, करता रहा,
  वरदान यही चाहा,
  अम्बे का जयकारा…
  अमरत्व महीष ने मांगा था,
  ब्रह्मा जी ने नकारा था,
  पुरुष से मैं न, मारा जाऊँ,
  वरदान यही मांगा,
  अम्बे का जयकारा…
  स्वर्ग सिंहासन डोला था,
  महिषासुर ने धावा बोला था,
  भयाक्रांत देवों ने, वीनती कर,
  त्रिदेव को पुकारा,
  अम्बे का जयकारा…
  तीनों स्रष्टा तब आए थे,
  और शक्ति रूप जगाये थे,
  त्रिदेव की शक्ति ने, जग के लिए,
  शक्ति रूप था उपजाया,
  अम्बे का जयकारा…
  खड्ग, शंख, चक्र, गदा, सब देवों से अपनाया था,
  कर सिंह सवारी दुर्गा ने, वीर सहायक पाया था,
  गरज के मात ने, अपनी शक्ति से,
  ब्रह्मांड को दहलाया,
  अम्बे का जयकारा…
  महिषासुर युद्ध को आया था,
  और रुप बड़े दिखलाया था,
  महीष, सिंह, हाथी, असुर,
  बड़ा भय था फैलाया,
  अम्बे का जयकारा…
  एक-एक सेनाध्यक्ष मारा था,
  महीषासुर को माँ ने तारा था,
  त्रिशूल उठा के, ह्रदय चीर के,
  दैत्य को संहारा,
  अम्बे का जयकारा…
