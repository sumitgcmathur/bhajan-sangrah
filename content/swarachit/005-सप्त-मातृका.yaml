title: सप्त मातृका
tarz: मंगल भवन अमंगल हारी
swarachit: true
lyrics: |
  सप्त मातृका, महा बलधारी,
  करे शिव संग, अंधक संहारी !!१!!
  ब्रह्माणी, हंस वाहन सुहाई,
  कर में कमंडल, ध्यान लगाई !!२!!
  माहेश्वरी, नंदी पर विराजे,
  त्रिशूल धारि, शिव शक्ति साजे !!३!!
  कौमारी, मयूरासन धारी,
  भाले से, रण दैत्य संहारी !!४!!
  वैष्णवी, गरुड़ पे विराजे,
  चक्र गदा धरि, दैत्य संहारे !!५!!
  इंद्राणी, वज्र धारिणी माता,
  जो पूजे वो, सब सुख पाता !!६!!
  वाराही, वराह मुखधारी,
  हल मूसल धरे, दैत्य संहारी !!७!!
  चामुंडा, चंड मुंड विडारे,
  काली रूप धरे, भक्त निवारे !!८!!
  सप्त मातृका, कृपा दृष्टि राखो,
  हमरी पूजा, स्वीकार सुख करहो !!९!!
