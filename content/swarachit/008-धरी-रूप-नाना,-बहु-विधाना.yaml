title: धरी रूप नाना, बहु विधाना
group: अम्बे भजन
tarz: श्री रामचंद्र कृपालु भजुमन
swarachit: true
lyrics: |
  धरी रूप नाना, बहु विधाना, जगत पथ दर्शित करि।
  तुम करि कृपा, जगत माता, भक्त हेतु अवतरि॥१॥
  शिव शक्ति खेला, जग झमेला, बात कुछ ज्यादा बढ़ी।
  क्रोधित थी माता, तब ये ठानी, अन्न सब दुर्लभ करी॥२॥
  सब त्रस्त जनता, रंक राजा, अन्न से जीवन चले।
  भई प्रकट काशी, अन्नपूर्णा, अन्न दे सब सुख करे॥३॥
  मलय-कंचन, माता-पिता, संतान-हित जप-तप करि।
  मदुरै में मीनाक्षी जनमी, वीर-योद्धा रूप धरि॥४॥
  वीरोन्मादिनि, कैलाश पहुँची, देख शिव विस्मृत भई।
  जगत-प्रसिद्ध मीनाक्षी सुन्दर, आदर्श दम्पति बनी॥५॥
  करि विष्णु-भक्ति, वैष्णवी माँ, भैरोनाथ की पीर सही।
  त्रिकूट जा के, सिद्धि पा के, रूप शक्ति तब लही॥६॥
  किया युद्ध भारी, वैष्णो देवी, भैरो माँ की शरण पड़ी।
  त्रिकूट गुफा में, विराजी माता, जग की सब विपदा हरी॥७॥
  बहु रूप धरि जगत-जननी, सहाय प्रतिपल करि।
  रखि कृपा-दृष्टि जगदम्बा, सफल यह जीवन करि॥८॥
