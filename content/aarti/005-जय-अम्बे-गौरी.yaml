title: जय अम्बे गौरी
lyrics:
  sthayi: |
    जय अम्बे गौरी, मैया जय श्यामा गौरी।
    तुमको निशिदिन ध्यावत, हरि ब्रह्मा शिव री॥
  paragraphs:
    - |
      माँग सिंदूर विराजत, टीको मृगमद को।
      उज्ज्वल से दोउ नैना, चंद्रवदन नीको॥
    - |
      कनक समान कलेवर, रक्ताम्बर राजै।
      रक्त-पुष्प गल माला, कण्ठन पर छाजै॥
    - |
      केहरि वाहन राजत, खडग खपर धारी।
      सुर-नर-मुनि-जन सेवत, तिनके दुखहारी॥
    - |
      कानन कुण्डल शोभित, नासाग्रे मोती।
      कोटिक चंद्र दिवाकर, सम राजत ज्योति॥
    - |
      शुम्भ निशुम्भ विडारे, महिषासुर-घाती।
      धूम्रविलोचन नैना, निशिदिन मदमाती॥
    - |
      चण्ड मुण्ड संहारे, शोणितबीज हरे।
      मधु कैटभ दोउ मारे, सुर भयहीन करे॥
    - |
      ब्रह्माणी रुद्राणी तुम कमला रानी।
      आगम-निगम-बखानी, तुम शिव पटरानी॥
    - |
      चौंसठ योगिनि गावत, नृत्य करत भैंरु।
      बाजत ताल मृदंगा, और बाजत, डमरू॥
    - |
      तुम ही जगकी माता, तुम ही हो भरता।
      भक्तनकी दुख हरता, सुख सम्पत्ति करता॥
    - |
      भुजा चार अति शोभित, वर-मुद्रा धारी।
      मनवाञ्छित फल पावत, सेवत नर-नारी॥
    - |
      कंचन थाल विराजत, अगर कपूर बाती।
      (श्री) मालकेतु में राजत, कोटिरतन ज्योति॥
    - |
      (श्री) अम्बेजीकी आरति जो कोई नर गावे।
      कहत शिवानंद स्वामी, सुख सम्पत्ति पावै॥
  dhvani: |
    सर्वमङ्गलमाङ्गल्ये शिवे सर्वार्थसाधिके।
    शरण्ये त्र्यम्बके गौरि नारायणि नमोऽस्तुते॥
