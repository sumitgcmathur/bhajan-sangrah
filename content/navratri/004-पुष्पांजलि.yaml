title: पुष्पांजलि
lyrics:
  sthayi: |
    अयि गिरिनन्दिनि नन्दितमेदिनि विश्वविनोदिनि नन्दिनुते, 
    गिरिवरविन्ध्यशिरोऽधिनिवासिनि विष्णुविलासिनि जिष्णुनुते,
    भगवति हे शितिकण्ठकुटुम्बिनि भूरिकुटुम्बिनि भूरिकृते, 
    जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते।
  sthayi_connect: false
  paragraphs:
    - commentary: |
      हे पर्वत-कन्या! तुम पृथ्वी को आनंदित करती हो, समस्त जगत को प्रसन्न करती हो और नंदी तुम्हारी स्तुति करता है।
      तुम श्रेष्ठ पर्वत तथा विंध्याचल के शिखर पर निवास करती हो, विष्णु की बहन हो और विजयी देवता तुम्हारी महिमा गाते हैं।
      हे भगवती! तुम शिव (शीतकण्ठ) की अर्धांगिनी हो, विशाल कुल की स्वामिनी हो और अनेक महान कार्य कर चुकी हो।
      जय-जय हो तुम्हारी, हे महिषासुर का संहार करने वाली, सुंदर केशों वाली, पर्वत-पुत्री!
    - |
      सुरवरवर्षिणि दुर्धरधर्षिणि दुर्मुखमर्षिणि हर्षरते, 
      त्रिभुवनपोषिणि शङ्करतोषिणि किल्बिषमोषिणि घोषरते,
      दनुजनिरोषिणि दितिसुतरोषिणि दुर्मदशोषिणि सिन्धुसुते, 
      जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते।
    - commentary: |
      हे देवताओं पर वरषा करने वाली! तुम दुष्टों के लिए सहन करना कठिन हो, कुरूप मुखों का नाश करती हो और आनंद देती हो।
      तुम तीनों लोकों का पोषण करती हो, शंकर को प्रसन्न करती हो, पापों को मिटाती हो और यशगान करती हो।
      तुम असुरों पर क्रोधित हो, दिति के पुत्रों के विनाश करती हो, अहंकार को नष्ट करती हो — हे समुद्र-कन्या!
      जय-जय हो तुम्हारी, हे महिषासुरमर्दिनि, सुंदर केशों वाली, पर्वत-पुत्री!
    - |
      अयि जगदम्ब मदम्ब कदम्ब वनप्रियवासिनि हासरते, 
      शिखरि शिरोमणि तुङ्गहिमलय शृङ्गनिजालय मध्यगते,
      मधुमधुरे मधुकैटभगञ्जिनि कैटभभञ्जिनि रासरते, 
      जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते।
    - commentary: |
      हे जगदम्बे! तुम मेरे लिए अम्बा हो, कदंब वन में प्रिय निवास करती हो और हास्य से आनंदित करती हो।
      तुम पर्वतों के मुकुट, ऊँचे हिमालय के शिखरों के बीच में निवास करती हो।
      हे मधुर स्वर वाली! तुम मधु और कैटभ का संहार करती हो और रास-लीला से प्रसन्न करती हो।
      जय-जय हो तुम्हारी, हे महिषासुरमर्दिनि, सुंदर केशों वाली, पर्वत-पुत्री!
    - |
      अयि निजहुङ्कृति मात्रनिराकृत धूम्रविलोचन धूम्रशते, 
      समरविशोषित शोणितबीज समुद्भवशोणित बीजलते,
      शिवशिवशुम्भ निशुम्भमहाहव तर्पितभूत पिशाचरते, 
      जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते।
    - commentary: |
      हे माता! तुम्हारे एक ही हुँकार से धूम्रनेत्र और सैकड़ों धूम्राक्ष असुर नष्ट हो गए।
      युद्ध में रक्तबीज के संहार से उत्पन्न रक्तबीज की लता भी समाप्त हो गई।
      शुम्भ-निशुम्भ के महायुद्ध में तृप्त भूत-प्रेतों की सेना तुम्हारी सेवा में है।
      जय-जय हो तुम्हारी, हे महिषासुरमर्दिनि, सुंदर केशों वाली, पर्वत-पुत्री!
    - |
      अयि शतखण्ड विखण्डितरुण्ड वितुण्डितशुण्द गजाधिपते, 
      रिपुगजगण्ड विदारणचण्ड पराक्रमशुण्ड मृगाधिपते,
      निजभुजदण्ड निपातितखण्ड विपातितमुण्ड भटाधिपते, 
      जय जय हे महिषासुरमर्दिनि रम्यकपर्दिनि शैलसुते।
    - commentary: |
      हे माता! तुमने शतखण्ड असुर के सिर को काटकर उसके हाथी के सूंड को भी विदीर्ण कर दिया।
      तुम शत्रु के हाथी के गाल को फाड़ने वाली, पराक्रमशाली, सिंह-स्वामिनी हो।
      अपने भुजदंड से खंडित किए और शिरों को गिराकर सेनापतियों का संहार किया।
      जय-जय हो तुम्हारी, हे महिषासुरमर्दिनि, सुंदर केशों वाली, पर्वत-पुत्री!
