title: मेहंदी
lyrics:
  sthayi: |
    अम्बा थारी मेहंदी, माणक रंग,
  paragraphs:
    - |
      श्यामा थारी मेहंदी माणक रंग ॥टेर
    - |
      रंग रंगीली हद छटकीली, राची है रंग सुरंग ॥ १
    - |
      आ मेहंदी मन मोहलियो है, मोहयो मोहयो शिवजी रो अंग ॥ २
    - |
      हाथ जोड़ ने करूं हूँ विनती सुण लीजो करने उमंग ॥ ३
