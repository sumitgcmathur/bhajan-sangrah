title: राजभोग
lyrics:
  sthayi: |
    मीठो मीठो भावे, हो राज अम्बाजी ने, मीठो मीठो भावे,
    नव नेवज पकवान, मिठाई माँ,
  paragraphs:
    - |
      सीरो शुद्धि रांधवे, हो राज अम्बाजी ने, मीठो मीठो भावे
    - |
      घेवर छांट धरया, मातंगी माँ,
      रुच रुच भोग लगावे, हो राज अम्बाजी ने
    - |
      षटरस व्यंजन, पाक रसोई माँ,
      जो भावे सोई पावे, हो राज अम्बाजी ने
    - |
      खाजा लाडू ने, सेव इन्दरसा माँ,
      छप्पन भोग लगावे, हो राज अम्बाजी ने
    - |
      मातंगी मनसा सब पूरण, मातंगी ममता सब मोचन,
      हुकम हुकम चलावे, हो राज अम्बाजी ने
    - |
      जो मैयाजी रो जाप जपत है,
      जो जग जननी रो जाप जपत है,
      चन्द्रमिश्र गुण गावे, हो राज अम्बाजी ने
    - |
      जो अम्बाजी ने ध्यावे मनावे,
      जो जग जननी ने ध्यावे मनावे,
      मनवांछित फल पावे, हो राज अम्बाजी ने
    - |
      शक्तियां भर गंगा जल लावे माँ,
      शक्तियां भर यमुना जल लावे माँ,
      आचमन आप करावे, हो राज अम्बाजी ने
    - |
      काथो जी चूनो ने पान सुपारी माँ,
      काथो जी चूनो ने लांग इलायची माँ,
      मोचन आप करावे, हो राज अम्बाजी ने
    - |
      दास मनोरथ करत, वीनती माँ,
      चित चरणा में चावे, हो राज अम्बाजी ने
