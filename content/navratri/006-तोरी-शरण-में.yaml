title: तोरी शरण में
lyrics:
  sthayi: |
    तोरी शरण में तो आन पड़ियो हूँ,
  paragraphs:
    - |
      अम्बा री शरण में तो आन पड़ियो हूँ माँ,
    - |
      राखो नी रखवारी अम्बा, हाँ हो धिरयाणी अम्बा...
    - |
      दारूड़ा री छाटया मानीसा, बेग पधारो ।
    - |
      पग पायल रिमझिम बाजे, सुरा री अम्बे ।
    - |
      तोरी शरण..................
    - |
      सोने री बतक, जड़ाऊ रो प्यालो माँ ।
    - |
      मद पीवो, मतवाली ऐ माँ,सुरा री अम्बे ।
    - |
      तोरी शरण..................
