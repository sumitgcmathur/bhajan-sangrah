title: वारी हो कन्हैया लाल
lyrics: |
  तर्ज : अणवट
  वारी हो कन्हैया लाल, गोपाल लाल, चरणा में चित राखो॥
  जनम लियो मथरा में श्री कष्ण नंदलाल,
  वसुदेव जी गोकल चाल्या, नंद जशोदा री पोल ॥१॥
  जनमत किया चानणास कोई जाग्या नर और नार,
  शिवजी तो दरशन ने आया हरख निरख गुण गाय ॥२॥
  जमुना किनारे धेनु चरावे श्री कृष्ण नंदलाल,
  ग्वाल बाल संम खेल रचायो, नंद जसोदा रो लाल ॥३॥
  कालिंदी में गेंद गिराई श्री कृष्ण नन्दलाल,
  ध्यान लगाकर कूद गया रे, नाग नाथ कर आय ॥४॥
  विदरावन में रास रचायों, श्री कृष्ण नन्दलाल,
  सैंस गोपियां रे बीच मांही, एक नंदजी रो लाल ॥५॥
  कृष्ण सुदामा बालकिया है पढया एक पोशाल,
  चारुं वेद पराण वे तो पढ आया पल रे मांय ॥६॥
  &#39;सोहन सखी&quot; री बीनती जी सुन जो चित्त लगाय,
  हाथ जोडकर करां वीनती अबके जनम सुधार ॥७॥
