title: हे आय गोपियाँ यूँ केवे
romantitle: He Aay Gopiyaa Yoo Keve
tarz: रुणझुणियो
lyrics:
  sthayi: |
    हे आय गोपियाँ यूँ केवे ए जसुमति मैया, 
    तंग कर रह्यो थारो लाल, माखन चोर रह्यो।
  paragraphs:
    - |
      दधि मथ 'कर नावण बैटी ए जसुमति मैया, 
      छिप आयो थारो लाल, माखन चोर रह्यो।
    - |
      हे छीके ऊपर मटकी ए जसुमति मैया, 
      काई जुगत बिटाई थांरो लाल, माखण चोर रयो।
    - |
      हे ग्वालां ऊपर ग्वालो, ए जसुमति मैया, 
      जिणरे ऊपर बाल गोपाल, माखण चोर रयो।
    - |
      हे कुछ खावे कुछ ढोले ए जसुमति मैया, 
      बाकी खावे ग्वाल और बाल माखण चोर रयो।
    - |
      हें बहुरि बरजियो माने ना ए जसुमति मैया, 
      आई हाँ केवण हाल. माखण चोर रयो।
    - |
      हे खा पीकर मटकी फोरे ए जसुमति मैया, 
      खाले तो नहीं है मलाल, माखण ढ़ोल रयो।
    - |
      हे मारे घरे लख गाया केवे जसुमति मैया, 
      थे तो कूड़ रचायो जाल, माखन चोर रयो।
    - |
      हें कूड केवां तो खुद देखेनी जसुमति मैया, 
      हों पकरि ले आई (थारो) लाल, माखण चोर रयो।
    - |
      हे इतरो कयो ने वातो रूसी ए जसुमति मैया, 
      काना रा पकडया कान, माखण क्यूँ चोरयों।
    - |
      हे मैं माखण नहीं खायो ए जसुमति मैया, 
      आतो गोपियां री चाल, माखण चोर कह्यो।
    - |
      हे मुख लिपटायो माखणिये ए जसुमति मैया, 
      साव झूठो थांरो लाल, माखण चोर रह्यो।
    - |
      हे जबरि पकरि लियो मोको ए जसुमति मैया, 
      खुल मल दिया मुख और गाल, माखण चोर कयो।
    - |
      हे सगरी बिगारि भर देस्यू कैवे जसुमति मैया,
      नहीं परोसू भोजन थाल, माखण क्यों चोरयो।
    - |
      हे कर मत हियो थारो काटो ए जसुमति मैया, 
      लागे सोवणो थारो लाल, माखण छो चोरयो।
    - |
      हे विहंसी गोपियाँ हंसदी ए जसुमति मैया, 
      करे लीला बाल गोपाल, माखण चोर रयों।
    - |
      हे बुद्धि सारी हर लीनी ए जसुमति मैया, 
      फैलायो माया जाल, माखण चोर रयों।
