title: सांवरिया प्रेम रस घोल नी रे
lyrics: |
  तर्ज़ : कागलिया गेरो गेरो बोल नी रे....
  सांवरिया प्रेम रस घोल नी रे 2, म्हारे पापां ने काटणियो तू ही एक,
  बावरिया हरि हरि बोल नी रे ॥ टेर ॥
  सांवरिया काल तो चेताव रयो रे 2, म्हारे हिवड़ा में बसियो हे राग द्वेष,
  नागरिया मोह पाश खोल नी रे ।
  सांवरिया भंवर में फंस गयो रे 2, मारी कश्ती ने खेवणियो तू ही एक,
  मोवनिया पार उतारणी रे ।
  सांवरिया जाल में फेलाय दीनो रे 2, इण जाला में खुद ही उलझियो जाय,
  तारणिया भव बंध खोल नी रे ।
  सांवरिया गज तो बचाय लियो रे 2, भगता रे खातिर तू दोड़यो आय,
  सांवरिया भाग म्हारा खोल नी रे ।
  सांवरिया माया सारी थारी रे 2, थारी कृपा बिन सुनो है सारे खेल,
  किसनिया बुद्धि म्हारी फेरे नी रे ।
