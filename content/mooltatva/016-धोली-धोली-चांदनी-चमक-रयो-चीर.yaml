title: धोली-धोली चांदनी चमक रयो चीर
lyrics: |
  तर्ज : पीलो पीलो घाघरो गलाबी रंग चीर...
  धोली-धोली चांदनी चमक रयो चीर,
  रास रचावे कानो जमना रे तीर ।1 टेर ।
  मोर मुकुट पीताम्बर सोहे, बांकी चितवन छिब मन मोहे
  तीखे-तीखे नैणा सँ चलाय रयो तीर । रास. ..
  मूरली बजावे गोपी सुध-बुध भूले, काना री बैयां में झुला झले,
  घूम रहो घाघरो ने उड़ रयो चीर । रास.....
  लीला देखो श्यामजी री मानो या ना मानो,
  एक एक गोपी संग एक एक कानो,
  राधा संग नाचे कानो उड़े है अबीर । रास..
  बिदरावन में रास देखण देव सारे आये,
  खूब हरसाये और फल बरसाये,
  ठाड़़ो ठाड़ो रह गयो युमना रो नीर । रास..
  किसन जी री माया देख बृद्ध चकराये,
  तज तज नीर जीव तीर पर आये,
  श्याम जी री लीला देखण छोडे हे शरीर I रास..
