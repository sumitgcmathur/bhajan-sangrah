title: भगतारे बस में गोपाल
tarz: चिरमी रा डाला चार वारी जाड़ा चिरमी रे....
lyrics:
  sthayi: |
    भगतारे २ में गोपाल, कथा सुनो भगतारी री, । टेर
  paragraphs:
    - |
      बूढतो गजराज बचायो २, दियो ग्राह के मुंह से निकाल । कथा....
    - |
      द्रोपदी रो चीर बढ़ायो २, भयो दुसासन रो बुरो हाल । कथा....
    - |
      भक्त प्रहलाद पुकारियो २, करी ठंङी होली री झाल । कथा....
    - |
      पाण्डु पुत्र ने न्याय दिलाओ २, कौरवां रो बण आयो काल । कथा....
    - |
      रुक्मणी रो हरण कियो २, हाथ मलतो रह्यो शिशुपाल । कथा....
    - |
      विष रो प्यालो पी गई २, होयो मीरां रो बांको न बाल । कथा....
    - |
      भगत नरसी विनय करी २, मायरो भर दियो नन्द जी रो लाल । कथा....
    - |
      शिला अहिल्या शाप मुक्त भई २, हरी चरणां रो देखो कमाल । कथा....
    - |
      सत्यवान ने यम सूँ छुड़ायो २, सावित्री भजियो गोपाल । कथा....
    - |
      हरि नांम रो सुमिरण करले२, छूटेला सब झंझाल । कथा....
