title: जय जय जय बजरंगबली
lyrics:
  sthayi: |
    जय जय जय बजरंगबली,
    जो भी दिल से पुकारे तुमको-२ 
    उसकी विपदा पल मे टली
    जय जय जय बजरंगबली ।
  paragraphs:
    - |
      लक्ष्मण के थे प्राण बचाए, पर्वत हथेली पर ले आए,
      ऐसी बूटी दी लक्ष्मण को, खिल उठी जीवन की कली॥
    - |
      रामजी ने संदेशा भिजवाया, सीता माँ को यकीन ना आया,
      तब हनुमान ने राम अंगूठी, सीता मां की रख दी तली॥
    - |
      सेना ने पूंछ में आग लगाई, सब सोने की लंका जलाई,
      देखते देखते ही पल भर में, सब सोने की लंका जली॥
    - |
      हनुमत जो कोई तुम्हे ध्याता, उसके दुख कभी निकट ना आता,
      कहता है संदीप जलंधरी, करते हो तुम सबकी भली॥
