title: जय जय जय बजरंगबली
lyrics:
  sthayi: |
    जय जय जय बजरंगबली,
    मंगल मूर्ति मारुति नंदन, सकल अमंगल मूल निकंदन-२,
    पवन तनय संतन हितकारी, हृदये विराजत अवधबिहारी,
    महावीर हनुमान गुसाईं, तुम्हरी याद भली, 
    जय जय जय बजरंगबली॥
  paragraphs:
    - |
      साधु संत के हनुमत प्यारे, भक्त हृदय श्री राम दुलारे-२
      राम रसायन पास तुम्हारे, सदा रहो तुम राम द्वारे
      तुम्हारी कृपा से हनुमत वीरा, सगली विपत टली॥
    - |
      तुम्हारी शरण महा सुखदायी, तुम्हारी महिमा तुलसी गाई
      जग जननी सीता महामायी, शिव-शक्ति की तुम्हारी हृदय-२
      ज्योति महान जली॥
    - |
      सियाराम चरणन मतवाले, भक्तन की तू बात न टाले
      पाप अग्नि से सबको बचा ले, फिर आये दुख बादल काले
      बिन तेरे अब कौन बचावे, ऐसी आंधी चली॥
