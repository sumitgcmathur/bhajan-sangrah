title: हे दुःख भन्जन, मारुती नंदन
lyrics:
  sthayi: |
    हे दुःख भन्जन, मारुती नंदन, 
    सुन लो मेरी पुकार, पवनसुत विनती बारम्बार।
  paragraphs:
    - |
      अष्ट सिद्धि, नव निधि के दाता, दुखियों के तुम भाग्यविधाता,
      सियाराम के काज सवारे, मेरा करो उद्धार, पवनसुत विनती बारम्बार॥
    - |
      अपरम्पार है शक्ति तुम्हारी, तुम पर रीझे अवधबिहारी,
      भक्तिभाव से ध्याऊं तोहे, कर दुखों से पार, पवनसुत विनती बारम्बार॥
    - |
      जपूँ निरंतर नाम तिहारा, अब नहीं छोडूं तेरा द्वारा 
      रामभक्त मोहे शरण मे लीजे, भव सागर से तार, पवनसुत विनती बारम्बार॥
