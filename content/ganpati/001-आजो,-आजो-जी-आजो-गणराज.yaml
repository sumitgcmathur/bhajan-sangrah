title: आजो, आजो जी आजो गणराज
romantitle: Aajo, Aajo Ji Aajo Ganaraaj
lyrics:
  sthayi: |
    आजो, आजो जी आजो गणराज हो, गवरां रा लाल दुलारा, हमारे घर आवजो
  paragraphs:
    - |
      राजन रनत भंवर सूं आवजो, थे तो हाये मूसे असवार हो, गवरां रा लाल दुलारा, हमारे घर आवजो
    - |
      मतना आप अकेला आवजो, रिद्ध- सिद्धिने लाईजो लार हो, गवरांरा लाल दुलारा, हमारे घर आवजो
    - |
      चंपो मरुवो सुगन्धित केवडो, देसा कुमकुम अंग चर चाय हो, गवरांरा लाल दुलारा, हमारे घर आवजो
    - |
      दरशन कर मन हरष बधावसां, थाने राखालां हिरदे माँय हो, गवरां रा लाल दुलारा, हमारे घर आवजो
    - |
      रक्षा कर म्हारां विघन विडारजो, कीजो आनन्द ओर उछाव हो, गवरां रा लाल दुलारा, हमारे घर आवजो
