title: नमो नमो हिमगिरी कन्या कुमार
lyrics:
  sthayi: |
    नमो नमो हिमगिरी कन्या कुमार ।। टेर ।l
  paragraphs:
    - |
      गजमुख वंता, अरू इक दंता, मूसक हैं असवार. .नमो नमो
    - |
      मंगल मोद आनन्द बधाावन, रिद्धि-सिद्धि दातार. .नमो नमो
    - |
      जस बरनू जगदम्ब अम्बको, बाधा विघ्न निवार. .नमो नमो
