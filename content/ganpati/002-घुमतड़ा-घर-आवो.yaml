title: घुमतड़ा घर आवो
romantitle: Ghumatadaa Ghar Aavo
lyrics:
  sthayi: |
    घुमतड़ा घर आवो हो, म्हारा प्यारा गजानन॥
  paragraphs:
    - |
      रणत भंवर सूं गणपत पधारो, संग में लाइजो रिद्धि- सिद्धि, हो प्यारा गजानन॥
    - |
      ब्रह्मा पधारो विष्णु पधारो, संग में लाइंजो सरस्वती, हो प्यारा गजानन॥
    - |
      डमरु बजावत शिवजी पधारो, संग में लाइजो पार्वती, हो प्यारा गजानन॥
    - |
      बंशी बजावत कृष्ण पधारो, संग में लाइजो राधारानी, हो प्यारा गजानन॥
    - |
      राम पधारो लक्ष्मण पधारो, संग में लाइजो सीता सती, हो प्यारा गजानन॥
    - |
      सिंह चडी जगदम्बा पधारो, संग में लाइजो बटुक भैरुं, हो प्यारा गजानन॥
    - |
      मीरां के प्रभू गिरधार नागर, हरक निरख गुण गावा हो, प्यारा गजानन॥
