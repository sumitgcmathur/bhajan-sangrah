title: महाराज गजानन्द आवोनी
lyrics:
  sthayi: |
    महाराज गजानन्द आवोनी, म्हारी सभा में रंग बरसावोनी॥
  paragraphs:
    - |
      रणत भंवर सं आवो गजानन्द, रिद्धि-सिद्धि संग में लावोनी, म्हारी सभा में रंग बरसावोनी॥
    - |
      ऊँचे सिंहासन आप बिराजे, केसर तिलक लगावोनी, म्हारी सभा मे रंग बरसावोनी॥
    - |
      धूप दीप नैवेद्य आरती, मोदक भोग लगावोनी, म्हारी सभा मे रंग बरसावोनी॥
    - |
      विघ्न विनायक नाम तिहारो, विघ्नों को दूर भगावोनी, म्हारी सभा में रंग बरसावोनी॥
    - |
      हम सेवक दरशन अभिलाषी, भक्ति रो दान दिरावोजी, म्हारी सभा में रंग बरसावोनी॥
