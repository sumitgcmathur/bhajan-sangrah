title: महाराज गजानन्द आवोनी
lyrics:
  sthayi: |
    महाराज गजानन्द आवोनी, म्हारी सभा में रंग बरसावोनी ।। टेर ।।
  paragraphs:
    - |
      रणत भंवर सं आवो गजानन्द, रिद्ध-सिद्धि संग में लावोनी, म्हारी सभा में रंग बरसावोनी ।।1।।
    - |
      ऊँचे सिंहासन आप बिराजे, केसर तिलक लगावोनी, म्हारी सभा मे रंग बरसावोनी ।। 2।।
    - |
      धूप दीप नैवेद्य आरती, मोदक भोग लगावोनी, म्हारी सभा मे रंग बरसावोनी ।।3।।
    - |
      विघ्न विनायक नाम तिहारो, विघ्नों को दूर भगावानी, म्हारी सभा में रंग बरसावोनी ।।4।।
    - |
      हम सेवक दरशन अभिलाषी, भक्ती रो दान दिरावोजी, म्हारी सभा में रंग बरसावोनी ।।5।।
