title: घुमतड़ा घर आओ२
lyrics:
  sthayi: |
    घुमतड़ा घर आओ हो, मारा प्यारा गजानन,
  paragraphs:
    - |
      रिद्धि सिद्धि संग मे लावो हो मारा प्यारा गजानन,
    - |
      प्यारा गजानन, प्यारा गजानन. .घूमतड़ा घर
    - |
      प्रथम पूजे सब ध्यावे, सुर मुनि सब ध्यान लगावे,
    - |
      भक्ता हित बेगा आवो हो, हो मारा प्यारा गजानन. .घूमतड़ा घर
    - |
      क्रीट मुकुट वालो, काना में कुण्डल वाले,
    - |
      सूख सम्पति सर सावो, हो मारा प्यारा गजानन. .घूमतड़ा घर
    - |
      लम्बोदर नाम कहावे, दुःखाों को दूर भागावे,
    - |
      मोदक भोग लगावों हो, हो मारा प्यारा गजानन. .घूमतड़ा घर
    - |
      अमृत करते हम सेवा, पावे चारू फल मेवा,
    - |
      भक्ति का दान दिरावो हो, हो मारा प्यारा गजानन. .घूमतड़ा घर
