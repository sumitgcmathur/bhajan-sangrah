title: कैसे होरी खेलूं रे इन सांवरिया रे संग
lyrics:
  sthayi: |
    कैसे होरी खेलूं रे इन सांवरिया रे संग, बृज में
  paragraphs:
    - |
      कैसे होरी खेलूं रे इन छोगाला रे संग|
    - |
      कोरा कोरा कलश मंगाया, जिसमें घोलियों रंग
    - |
      भर पिचकारी सन्मुख मारी, चोली हो गई तंग, रंग भर कैसे होरी खेलूं रे...
    - |
      थर थर काया कांपण लागी, धूज रह्यो सब अंग
    - |
      सर्दी के मारे भई दीवानी, जैसे पी ली भंग, रंग भर कैसे होरी खेलूं रे...
    - |
      घर घुमारो पहन घागरो, चोली हो गई तंग
    - |
      सांवरा सा यूं फरमावे, चालो हमारे संग, रंग भर कैसे होरी खेलूं रे...
    - |
      तबला बाज सारंगी बाजी, और बजे मृदंग
    - |
      सांवरिया की बंसी बाजी, राधा जी के संग, रंग भर कैसे होरी खेलूं रे....
    - |
      सूरदास री काली कमलिया, चढ़े न दूजो रंग
    - |
      राधा जी की चुंदड़ भीगी, छोगाला रे संग, रंग भर कैसे होरी खेलूं रे...
