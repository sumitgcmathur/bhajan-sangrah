title: हारे महीनो फागण रो
lyrics:
  sthayi: |
    हारे महीनो फागण रो सांवरिया थारी ओळू आवे रे के... महीनो फागण रो|
  paragraphs:
    - |
      इत गोकुल उत मथुरा नगरी, अब बिच फाग रमाईजे रे के महीनो फागण रो...
    - |
      तू आईजे ने ग्वाला ने लाईजे, अबीर गुलाल उड़ाईजे रे के महीनो फागण रो...
    - |
      सब सखिया थारे संग में लाईजे, हँस हँस फाग रमाईजे रे के महीनो फागण रो...
    - |
      लिख लिख पतिया भेजू श्याम ने, आवली ग्यादस माथे आईजे रे के महीनो फागण रो...
    - |
      चन्द्र सखी भज बाल कृष्ण छवि, ज्योत में ज्योत मिलाईजे रे के महीनो फागण रो...
