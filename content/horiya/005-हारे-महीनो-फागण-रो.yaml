title: हारे महीनो फागण रो
lyrics:
  sthayi: |
    हारे महीनो फागण रो सावरिया थारी ओळू आवे रे, हारे महीनो फागण रो॥
  paragraphs:
    - |
      इत गोकुल उत मथुरा नगरी, अब बिच फाग रमाईजे रे॥
    - |
      तू आईजे ने ग्वाला ने लाईजे, अबीर गुलाल उड़ाईजे रे॥
    - |
      सब सखिया थारे संग में लाईजे, हँस हँस फाग रमाईजे रे॥
    - |
      लिख लिख पतिया भेजू श्याम ने, आवली ग्यादस माथे आईजे रे॥
    - |
      चन्द्र सखी भज बाल कृष्ण छवि, ज्योत में ज्योत मिलाईजे रे॥
