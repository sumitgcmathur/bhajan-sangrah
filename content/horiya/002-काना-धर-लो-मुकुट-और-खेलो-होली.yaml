title: काना धर लो मुकुट और खेलो होली
lyrics:
  sthayi: |
    काना धर लो मुकुट और खेलो होली, काना धर लो
  paragraphs:
    - |
      कित से आए कुंवर कन्हैया, तो कित से आई राधा गौरी...काना धर लो
    - |
      गोकुल से आए कुंवर कन्हैया, तो बरसाने से राधे गौरी...काना धर लो
    - |
      केण रा छे कुंवर कन्हैया, तो केण री छे राधे गौरी...काना धर लो
    - |
      नंद मेहर जी रा कुंवर कन्हैया, तो वृष भानू री राधे गौरी...काना धर लो
    - |
      काय रे करे छे कुंवर कन्हैया, तो काय रे करे छे राधे गौरी...काना धर लो
    - |
      गौआ चरावे कुंवर कन्हैया, तो महिडो बिलोभे राधे गौरी...काना धर लो
    - |
      काय रे अरोगे कुंवर कन्हैया, तो काय रे अरोगे राधे गौरी...काना धर लो
    - |
      लाडू अरोगे कुंवर कन्हैया, तो पेड़ा अरोगे राधे गौरी...काना धर लो
    - |
      कित रे बरस रा कुंवर कन्हैया, तो कितने बरस री राधे गौरी...काना धर लो
    - |
      बारा बरस रा कुंवर कन्हैया, तो तेरा बरस री राधे गौरी...काना धर लो
    - |
      चंद्र सखी भज बाल कृष्ण छवि, चिरंजीवी रे जुगल जोड़ी...काना धर लो
    - |
      काना धर लो मुकुट और खेलो होली, काना धर लो
