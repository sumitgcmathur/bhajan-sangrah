title: रघुवर तुमको मेरी लाज
romantitle: Raghuvara Tumako Meree Laaja
lyrics:
  sthayi: |
    रघुवर तुमको मेरी लाज, सदा सदा मैं शरण तिहारी, तुम हो गरीब निवाज़॥
  paragraphs:
    - |
      पतित उद्धारण विरद तिहारो, श्रवनन सुनी आवाज।
      हूँ तो पतित पुरातन कहिए, पार उतारो जहाज॥
    - |
      अघ खंडन दुःख भन्जन जन के, यही तिहारो काज।
      तुलसीदास पर कृपा कीजे, भक्ति दान देहु आज ॥
