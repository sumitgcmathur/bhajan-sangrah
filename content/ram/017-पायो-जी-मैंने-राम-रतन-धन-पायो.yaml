title: पायो जी मैंने राम रतन धन पायो
romantitle: Paayo Jee Maiंne Raama Ratana Dhana Paayo
lyrics:
  sthayi: |
    पायो जी मैंने राम रतन धन पायो।
  sthayi_connect: false
  paragraphs:
    - |
      वस्तु अमोलिक दी मेरे सतगुरु,
      कृपा करी अपनायो।
    - |
      जनम-जनम की पूंजी पाई
      जग में सभी खुवायो।
    - |
      खर्च ना खूटे, चोर ना लूटे
      दिन-दिन बढत सवायो।
    - |
      सत की नाव खेवटिया सतगुरु
      भवसागर तर आयो।
    - |
      मीरा के प्रभु गिरिधर नागर
      हरख-हरख जस गायो।
