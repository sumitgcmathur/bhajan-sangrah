title: तेरा रामजी करेंगे बेड़ा पार
lyrics: |
  राम नाम सोहि जानिये, जो रमता सकल जहान
  घट घट में जो रम रहा, उसको राम पहचान
  तेरा रामजी करेंगे बेड़ा पार, रे बेड़ा पार रे बेड़ा पार
  तेरा रामजी करेंगे बेड़ा पार, उदासी मन काहे को डरे
  काहे को डरे रे काहे को डरे, काहे को डरे
  नैया तेरी राम हवाले, लहर लहर हरि आप सँभाले
  हरि आप ही उठावे तेरा भार, उदास मन काहे को डरे
  तेरा रामजी करेंगे बेड़ा पार उदासी मन काहे को डरे
  काबू में मँझधार उसी के, हाथों में पतवार उसी के
  तेरी हार भी नहीं है तेरी हार, उदासी मन काहे को डरे
  तेरा रामजी करेंगे बेड़ा पार, उदास मन काहे को डरे
  सहज किनारा मिल जायेगा, परम सहारा मिल जायेगा
  डोरी सौंप के तो देख एक बार, उदास मन काहे को डरे
  तेरा रामजी करेंगे बेड़ा पार, उदास मन काहे को डरे
