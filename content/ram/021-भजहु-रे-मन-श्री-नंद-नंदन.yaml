title: भजहु रे मन श्री नंद-नंदन
romantitle: Bhajahu Re Man Shri Nad-Nadan
lyrics:
  sthayi: |
    भजहु रे मन श्री नंद-नंदन, अभय-चरणारविंद रे
    दुर्लभ मानव-जनम सत्संग, तरहाए भव-सिंधु रे
  paragraphs:
    - |
      शीत आतप वात वरिषण, ए दिन जामिनी जागि रे
      बिफले सेविनु कृपण दुरजन, चपल सुख-लब लागि रे
    - |
      ए धन, यौवन, पुत्र, परिजन, इथे कि आछे परतीति रे,
      कमल-दल-जल, जीवन-टलमल, भजहु हरि-पद नीति रे
    - |
      श्रवण, कीर्तन, स्मरण, वंदन, पाद-सेवन, दास्य रे,
      पूजन, सखीजन, आत्म-निवेदन, गोविंद-दास-अभिलाष रे
