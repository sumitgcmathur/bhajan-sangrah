title: कथा महात्म्य
lyrics: |
  तर्ज – कथरो रस बिंदराबिन सूं आये।
  कथा रो रस सुधा सिंधु सूं आयो हां रे माने माने श्री गुरूनाथ
  कथा रो रस मणि रे द्वीप सूं आयो || टेर ||
  सकल पुरानन बीच बड़ो इक,
  हारे ओ तो देवी पुराण कहायो || १ ||
  इण्रे पढण सुणन रो महात्म,
  हाँ रे ओ तो वेद चार यश गायो || २ ||
  जिण यह कथा सुणी ओ सुणाई,
  हाँ रे वे तो सब तीरथ फल पायो || ३ ||
  वसुदेव और देवकी सुणी जब,
  हाँ रे वे तो कृष्ण सो लाल खिलायो || ४ ||
  इक चित होय सुणो सब भाई,
  हाँ रे सिद्ध कारज हो मन चायो || ५ ||
  &#39;राम&#39; कहे गुरूदेव कृपा कर,
  हाँ रे म्हाने शुभ अवसर बगसायो || ६ ||
  –: कथा समाप्त :–
