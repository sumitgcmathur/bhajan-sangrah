title: अब रक्तबीज उठके
lyrics: |
  तर्ज : क्या भूलिये दिवाने दुनियां में सार नहीं।
  अब रक्तबीज उठके, करने लगा लड़ाई || टेर ||
  हो वैष्णवी के जोड़े, कर क्रोध बाण छोड़े,
  छेदे तिन्हें उसीने निज चक्र को चलाई || १ ||
  यह देख अन्य देवी गण दौड़ दौड़ आई,
  ले अस्त्र-शस्त्र अपने करती भई चढ़ाई || २ ||
  इत रक्तबीज एका, उत देवियां अनेका, घमसान युद्ध होवे,
  डगमग धरा धुजाई || ३ ||
  जो रक्तबीज का है, लोहू धरा गिराई,
  इक बूंद का ही वैसा एक दैत्य हो जाई || ४ ||
  यूं शंभु केरे वर से, हो एक से अनेका,
  लड़ते है रक्तबीजा गई देवियां थकाई || ५ ||
  जबानी – इस प्रकार असंख्य रक्तबीजों के उत्पन्न हो लड़ते देख सब देवगण भयभीत होते हैं और सब देवियां थक कर हताश हो श्री अंबिकाजी के पास जाती है और सब हाल कह सुनाती है तब अंबिकाजी श्री कालिकाजी से इस प्रकार कहती है –
