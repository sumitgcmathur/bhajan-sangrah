title: सहाय जगदम्बे कीजो हमारी सहाय
lyrics: |
  तर्ज - बहार मेरे प्यारे फलन की लेलो बहार ।
  सहाय जगदम्बे कीजो हमारी सहाय, आये है हम तो शरण तिहारी, कीजो हमारी सहाय || टेर ||
  महिमा तिहारी अगम्य अपारी, गावे है वेद पुराण, पुराण, जगदंबे कीजो हमारी सहाय || १ ||
  विश्व चराचर को कर कर के पालन, देती हो अंत खपाय, खपाय, जगदंबे कीजो हमारी सहाय || २ ||
  ब्रह्मा ओ विष्णु महेश रटत है, पावे नहीं कोई पार, पार, जगदंबे कीजो हमारी सहाय || ३ ||
  हमतो अज्ञानी कछ नहीं जाने, भक्ति को नाम निशान, निशान, जगदंबे कीजो हमारी सहाय || ४ ||
  शुंभादि दैत्य बड़े अभिमानी, देते है द.ख अपार, अपार, जगदंबे कीजो हमारी सहाय || ५ ||
  आकर मां शीघ्र ही इनको संघारों, देवो भू भार उतार, उतार, जगदंबे कीजो हमारी सहाय || ६ ||
  जबानी - इस प्रकार देवताओं की स्तुति सुनकर देवी प्रकट होती है
