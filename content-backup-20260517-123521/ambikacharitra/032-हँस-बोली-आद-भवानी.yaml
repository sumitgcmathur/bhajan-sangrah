title: हँस बोली आद भवानी
lyrics: |
  राग – कालिंगडा
  तर्ज : लालु लाज हमारी रखरे।
  हँस बोली आद भवानी || टेर ||
  देखो अब ये लड़ने कारण, आये हैं अभिमानी || १ ||
  देखत जिनके वंश खपायो, तो भी हमें न पछानी || २ ||
  कछु नांही हित जानत अपनो, कैसे है अज्ञानी || ३ ||
  ये ही हमारी माया जग में, है सब जगत भुलानी || ४ ||
  जबानी – इस प्रकार श्री भगवतीजी द्वारा श्री कालिकाजी के प्रति कहे हुये वचन सुन निशुंभ क्रोधकर बाण चलाता है –
