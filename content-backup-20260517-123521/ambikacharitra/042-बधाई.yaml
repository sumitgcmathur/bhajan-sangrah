title: बधाई
lyrics: |
  तर्ज – रंगीली आज की धरियां।
  रंगीली आज की धरियां || टेर ||
  बजत है इन्द्र के बाजे, लगी रंग प्रेम की झरियां || १ ||
  छवि दरबार की नीकी, करत है नाच सुरपरियां || २ ||
  चले सब चाल ठिमठिमरी, करे झंकार नूपरियां || ३ ||
  कहूँ क्या बात जलसे की, जातबलि &#39;राम&#39; किंकरियां || ४ ||
