title: हँस बोली आद भवानी
lyrics: |
  राग – भैरवी
  तर्ज : काहु विध मिलजा गिरधारी।
  हँस बोली आद भवानी || टेर ||
  कारन रूप करन सुर कारज, मैं हूँ यूं प्रकटानी || १ ||
  यह मेरा ही और रूप है, काली काल निशानी || २ ||
  याके संग में युद्ध करो तुम, है यह तुमरे ही समानी || ३ ||
  – दोहा –
  अस कहि बोली अंबिका, काली से समझाय।
  जाओ तुम संग्राम कर देवो शुंभ खपाय||
  जबानी – इस प्रकार काल रूपिणी कालिका काल से प्रेरित किये जाने पर वेग से गदा उठाके संग्राम में खड़ी होती हैं और शुंभ व कालिका के बीच भयंकर युद्ध होता है।
