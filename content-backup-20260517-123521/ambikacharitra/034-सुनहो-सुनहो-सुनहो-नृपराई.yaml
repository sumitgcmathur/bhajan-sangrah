title: सुनहो सुनहो सुनहो नृपराई
lyrics: |
  राग – सोहनी
  तर्ज : हेरी यशोदा तोसे करूंगी लड़ाई, तेरे काननें मुरली चुराई।
  सुनहो सुनहो सुनहो नृपराई, समर हाल हम देत सुनाई || टेर ||
  अति दारूण संग्राम हुवो हां, जीते सुर सब दैत्य हराई || १ ||
  तात निशुम्भ महाबल धारी, और बांकी सेना सारी, चंडी ने सब दिये है खपाई || २ ||
  वह नाही साधारण नारी, कर देखा हमने निरधारी, है जग जननी वह महामाई || ३ ||
  मानो मानो मानो मारी, छोड़ो छोड़ो छोड़ो रारी, भाग चलो इसही में भलाई || ४ ||
  जबानी – इस प्रकार उन दैत्यों के वचन सुन शुंभ क्रोध करता है और इस प्रकार वचन बोलता है –
