title: युद्ध को हाल कहे क्या
lyrics: |
  राग - काफी
  तर्ज : कोई दिन याद करोगे रमता रामता फकीर
  युद्ध को हाल कहे क्या, सुनिये शुंभ महाराज || टेर ||
  काली संग संग्राम हुओ सब, हारे दैत्य समाज || १ ||
  सूरवीर रण खेत रहे सब, हम आये है भाज || २ ||
  धूमर लोचन भस्म हुओ सब, हूँ काली की आवाज || ३ ||
  जबानी - धूम्रलोचन के भस्म हुए जाने के समाचार सुन कर शुंभ अपने छोटे भाई निशुंभ को बुलाकर सलाह करता है ।
  -: विश्राम :-
