title: खेले माडाणी होली रो रसियो
lyrics: |
  खेले माडाणी होली रो रसियो कानो साचाणी कि खेले माडाणी।
  पिणहारिया आवे ने कानो लारे वारे जावे सा, उडावे गुलाल छैलो गाई गावे रे, खेले माडाणी।
  अबीर अगरचा गुलाल की दड़ीया भर भर मुठिया उडावे रे, मस्त होइ गोपीयन के संग में धूम मचावे रे, खेले माडाणी।
  राधा संग सखीयन को लेकर ब्रज में धूम मचावे रे, सुंदर नारी देख के कानो उन्हें भिगोवे रे, खेले माडाणी।
  दास भक्त होली के दिन में मन ही मन हरसावे रे, ब्रज मंडल की देख छवि में खूब सरावे रे, खेले माडाणी।
