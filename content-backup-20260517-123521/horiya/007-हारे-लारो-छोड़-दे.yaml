title: हारे लारो छोड़ दे
lyrics: |
  हारे लारो छोड़ दे, सांवरिया थारे पाए लागू रे...कि लारो छोड़ दे|
  मैं जल जमुना भरन जात री, लारे लारे आवे रे
  आय अचानक मटकी फोड़ी, एडो नागो रे...कि लारो छोड़ दे|
  मैं दधि बेचन जात वृंदावन, औ कई लारे लागो रे
  कंकड़ मार मटकी फोड़ी, कर दियो भागो रे...कि लारो छोड़ दे
  दही ढोल माखन खा जावे, और मचावे हाको रे
  ग्वालन टोली में अपनो, राखी ठागो रे...कि लारो छोड़ दे
  जाए कहूँ मैं नंद रानी ने, जायो पूत सवायो रे
  थारे लाल ने तू समझा दे, लागे दागो रे...कि लारो छोड़ दे
  बहू बुहारी लाज न राखे, औ कई लारे लागो रे
  जाए कहूँ मैं कंस राज ने, होवे खराबो रे...कि लारो छोड़ दे
  सासु ननद मोरी देवरानी जिठानी, नित जा करे लड़ाया रे
  बार बार समझाऊँ वो मोहन, हो जा आगो रे...कि लारो छोड़ दे
  दास भगत यूँ कहवे ग्वालन, भाग तिहारी जागो रे
  तीन लोक रो नाथ श्याम ने, मत कर आगो रे...कि लारो छोड़ दे
