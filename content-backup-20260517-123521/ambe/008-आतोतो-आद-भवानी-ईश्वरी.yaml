title: आतोतो आद भवानी ईश्वरी
lyrics: |
  (तर्ज: आतोतो उत्तर दिशा री पीपली)
  आतो आद भवानी ईश्वरी, आतो संतन जन प्रतिपाल हो राज,
  दल दानव मारन, संत उबारन, कारज सारन,
  आय के अम्बा आवतरी ॥टेर॥
  आतो रम्भा रूप बनावियो, हो आई होय सिंह असवार हो राज, दल दानव मारन ॥१॥
  आतो अष्टायुद्ध भुज धारिया, दीने शुभ निशुभ खपाय हो राज, दल दानव मारन ॥२॥
  आतो रक्त बीज को पछारियो, कर चंड मुंड सब चूर हो राज, दल दानव मारन ॥३॥
  आतो शंकर की अरधांगिनी, आतो श्री गणपत की मात हो राज, दल दानव मारन ॥४॥
  यां की महिमा सुर नर गाय थके, सब थाके वेद पुरान हो राज, दल दानव मारन ॥५॥
  आतो दास &#39;राम&#39; यूँ बीनवे, म्हारा सिद्ध करो सब काज हो राज, दल दानव मारन ॥६॥
