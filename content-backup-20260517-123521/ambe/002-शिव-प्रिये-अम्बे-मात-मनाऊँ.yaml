title: शिव प्रिये अम्बे मात मनाऊँ
lyrics: |
  शिव प्रिये अम्बे मात मनाऊँ, हाँ रे मैं तो रट रट रट रट ध्याऊँ, हर प्रिये अम्बे मात मनाऊँ॥
  गंगा जल असनान कराऊँ, हाँ रे मैं तो भूषण बसन पेराऊँ॥ शिव प्रिये...
  केसर कुंकुम अतर अरगचा, हाँ रे मैं तो अक्षत पुष्प चढ़ाऊँ॥ शिव प्रिये...
  धूप दीप नैवेद्य आचमन, हाँ रे मैं तो तांबूल मुख पदाराऊँ॥ शिव प्रिये...
  भेंट सुपारी अरु मुद्रार्पण, हाँ रे मैं तो मूल मंत्र जप जाऊँ॥ शिव प्रिये...
  ताल मृदंग बजत सब बाजा, हाँ रे मैं तो आरती कर सुख पाऊँ॥ अम्बे अम्बे ...
  तर्पण ध्यान पान कर पूरन, हाँ रे मैं तो अजर अमर हो जाऊँ॥ अम्बे अम्बे ...
  दास राम की यही है विनती, हाँ रे मैं तो मनवांछित फल पाऊँ॥ अम्बे अम्बे ...
