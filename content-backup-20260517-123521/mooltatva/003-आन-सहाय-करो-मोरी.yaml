title: आन सहाय करो मोरी
lyrics: |
  तर्ज : दल बादल बिच चमके जी तारा.........
  मैं महा पापी, खल अरु कामी,
  पाप विमोचिनी आप हो गौरी,
  आन सहाय करो मोरी,
  अब क्यूँ बैर करो होरी ॥ स्स्थाईही ॥
  पूत कपूत तो होता ही आया,
  माता ना जानी कबहुँ निगोरी ॥ आन सहाय.........
  तेरा ही पूत कवन ढिग जाऊँ
  चरणा री छैया रहूँ कर जोरी ॥ आन सहाय.........
  ध्यान, समाधि, सच्चा तरण,
  पूजन पाठ में मन ना रमेरी ॥ आन सहाय.........
  इस मुख में मैं जो भी उचारु,
  सुमिरण मात को जानो सुखारी ॥ आन सहाय.........
  जो भी निवालो उदर में डालूँ,
  हवन की आहुति आप बिचारी ॥ आन सहाय.........
  जब मैं सोवन जात शैय्या पर,
  दण्डवत मन माँहि आप चितोरी ॥ आन सहाय........
  इन अंखियाँ से जो जो देखूँ,
  दर्शन तुमरा ही मान लेओरी ॥ आन सहाय........
  इन्द्रियन से कर्म जो करता,
  पूजा ओ पाठ उसे समझोरी ॥ आन सहाय........
  एही विधि, मोहि को निवारो,
  बुद्धि प्रकाश शरण में तोरी ॥ आन सहाय........
