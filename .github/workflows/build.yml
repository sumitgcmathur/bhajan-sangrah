name: Build site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        run: node scripts/build.js

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          single-commit: true

      - name: Enable GitHub Pages (if not configured yet)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          HDR=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
          CODE=$(curl -s -o /tmp/pages.json -w "%{http_code}" "${HDR[@]}" "$API")
          echo "Pages API status: $CODE"
          if [ "$CODE" = "404" ]; then
            curl -sf -X POST "${HDR[@]}" "$API" \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
            echo "GitHub Pages enabled → https://sumitgcmathur.github.io/bhajan-sangrah/"
          elif [ "$CODE" = "200" ]; then
            curl -sf -X PUT "${HDR[@]}" "$API" \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
            echo "GitHub Pages source set to gh-pages / (root)"
          else
            cat /tmp/pages.json
            exit 1
          fi