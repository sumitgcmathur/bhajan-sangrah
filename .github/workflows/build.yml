name: Build site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        run: node scripts/build.js

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          single-commit: true

      - name: Pages setup reminder
        run: |
          echo "::notice::If https://sumitgcmathur.github.io/bhajan-sangrah/ returns 404,"
          echo "::notice::enable Pages once: Settings → Pages → Deploy from branch → gh-pages → / (root)"
          echo "Site files are on the gh-pages branch. GitHub cannot auto-enable Pages from Actions (API 403/422)."