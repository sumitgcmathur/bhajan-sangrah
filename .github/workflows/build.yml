name: Build site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Strip UTF-8 BOM from scripts
        run: |
          node -e "const fs=require('fs');for(const p of['scripts/export-pdf.js']){const b=fs.readFileSync(p);if(b[0]===0xef&&b[1]===0xbb&&b[2]===0xbf){fs.writeFileSync(p,b.subarray(3));console.log('Stripped BOM:',p);}}"

      - name: Export PDF
        run: node scripts/export-pdf.js

      - name: Build static site
        run: node scripts/build.js

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          single-commit: true

      - name: Pages setup reminder
        run: |
          echo "::notice::If https://sumitgcmathur.github.io/bhajan-sangrah/ returns 404,"
          echo "::notice::enable Pages once: Settings → Pages → Deploy from branch → gh-pages → / (root)"
          echo "Site files are on the gh-pages branch. GitHub cannot auto-enable Pages from Actions (API 403/422)."