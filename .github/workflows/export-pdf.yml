# Generate bhajan-sangrah.pdf on demand (not part of site deploy).
# GitHub → Actions → Export PDF → Run workflow → download artifact "bhajan-sangrah-pdf".

name: Export PDF

on:
  workflow_dispatch:

jobs:
  export-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Strip UTF-8 BOM from scripts
        run: |
          node -e "const fs=require('fs');for(const p of['scripts/export-pdf.js','scripts/lib/pdf-chunk-render.js','scripts/lib/pdf-chunk-print.js','scripts/lib/pdf-merge.js','scripts/lib/pdf-page-spec.js']){const b=fs.readFileSync(p);if(b[0]===0xef&&b[1]===0xbb&&b[2]===0xbf){fs.writeFileSync(p,b.subarray(3));console.log('Stripped BOM:',p);}}"

      - name: Export PDF
        run: node scripts/export-pdf.js
        env:
          CI: true
          PDF_RENDER_TIMEOUT_MS: 600000

      - name: Verify PDF output
        run: |
          test -f output/bhajan-sangrah.pdf
          ls -lh output/bhajan-sangrah.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: bhajan-sangrah-pdf
          path: output/bhajan-sangrah.pdf
          if-no-files-found: error
          retention-days: 90

      - name: Download instructions
        run: |
          echo "## PDF ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Open this workflow run on GitHub." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Under **Artifacts**, download **bhajan-sangrah-pdf** (contains \`bhajan-sangrah.pdf\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Re-run after content changes. Site deploy does not build the PDF." >> "$GITHUB_STEP_SUMMARY"
